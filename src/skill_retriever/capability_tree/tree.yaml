  - id: treatment-plans
    name: treatment-plans
    description: Generate concise (3-4 page), focused medical treatment plans in LaTeX/PDF format for all clinical specialties.
      Supports general medical treatment, rehabilitation therapy, mental health care, chronic disease management, perioperative
      care, and pain management. Includes SMART goal frameworks, evidence-based interventions with minimal text citations,
      regulatory compliance (HIPAA), and professional formatting. Prioritizes brevity and clinical actionability.
    skill_path: data/skill_seeds/treatment-plans/SKILL.md
    content: "# Treatment Plan Writing\n\n## Overview\n\nTreatment plan writing is the systematic documentation of clinical\
      \ care strategies designed to address patient health conditions through evidence-based interventions, measurable goals,\
      \ and structured follow-up. This skill provides comprehensive LaTeX templates and validation tools for creating **concise,\
      \ focused** treatment plans (3-4 pages standard) across all medical specialties with full regulatory compliance.\n\n\
      **Critical Principles:**\n1. **CONCISE & ACTIONABLE**: Treatment plans default to 3-4 pages maximum, focusing only on\
      \ clinically essential information that impacts care decisions\n2. **Patient-Centered**: Plans must be evidence-based,\
      \ measurable, and compliant with healthcare regulations (HIPAA, documentation standards)\n3. **Minimal Citations**:\
      \ Use brief in-text citations only when needed to support clinical recommendations; avoid extensive bibliographies\n\
      \nEvery treatment plan should include clear goals, specific interventions, defined timelines, monitoring parameters,\
      \ and expected outcomes that align with patient preferences and current clinical guidelines - all presented as efficiently\
      \ as possible.\n\n## When to Use This Skill\n\nThis skill should be used when:\n- Creating individualized treatment\
      \ plans for patient care\n- Documenting therapeutic interventions for chronic disease management\n- Developing rehabilitation\
      \ programs (physical therapy, occupational therapy, cardiac rehab)\n- Writing mental health and psychiatric treatment\
      \ plans\n- Planning perioperative and surgical care pathways\n- Establishing pain management protocols\n- Setting patient-centered\
      \ goals using SMART criteria\n- Coordinating multidisciplinary care across specialties\n- Ensuring regulatory compliance\
      \ in treatment documentation\n- Generating professional treatment plans for medical records\n\n## Visual Enhancement\
      \ with Scientific Schematics\n\n**⚠️ MANDATORY: Every treatment plan MUST include at least 1 AI-generated figure using\
      \ the scientific-schematics skill.**\n\nThis is not optional. Treatment plans benefit greatly from visual elements.\
      \ Before finalizing any document:\n1. Generate at minimum ONE schematic or diagram (e.g., treatment pathway flowchart,\
      \ care coordination diagram, or therapy timeline)\n2. For complex plans: include decision algorithm flowchart\n3. For\
      \ rehabilitation plans: include milestone progression diagram\n\n**How to generate figures:**\n- Use the **scientific-schematics**\
      \ skill to generate AI-powered publication-quality diagrams\n- Simply describe your desired diagram in natural language\n\
      - Nano Banana Pro will automatically generate, review, and refine the schematic\n\n**How to generate schematics:**\n\
      ```bash\npython scripts/generate_schematic.py \"your diagram description\" -o figures/output.png\n```\n\nThe AI will\
      \ automatically:\n- Create publication-quality images with proper formatting\n- Review and refine through multiple iterations\n\
      - Ensure accessibility (colorblind-friendly, high contrast)\n- Save outputs in the figures/ directory\n\n**When to add\
      \ schematics:**\n- Treatment pathway flowcharts\n- Care coordination diagrams\n- Therapy progression timelines\n- Multidisciplinary\
      \ team interaction diagrams\n- Medication management flowcharts\n- Rehabilitation protocol visualizations\n- Clinical\
      \ decision algorithm diagrams\n- Any complex concept that benefits from visualization\n\nFor detailed guidance on creating\
      \ schematics, refer to the scientific-schematics skill documentation.\n\n---\n\n## Document Format and Best Practices\n\
      \n### Document Length Options\n\nTreatment plans come in three format options based on clinical complexity and use case:\n\
      \n#### Option 1: One-Page Treatment Plan (PREFERRED for most cases)\n\n**When to use**: Straightforward clinical scenarios,\
      \ standard protocols, busy clinical settings\n\n**Format**: Single page containing all essential treatment information\
      \ in scannable sections\n- No table of contents needed\n- No extensive narratives\n- Focused on actionable items only\n\
      - Similar to precision oncology reports or treatment recommendation cards\n\n**Required sections** (all on one page):\n\
      1. **Header Box**: Patient info, diagnosis, date, molecular/risk profile if applicable\n2. **Treatment Regimen**: Numbered\
      \ list of specific interventions\n3. **Supportive Care**: Brief bullet points\n4. **Rationale**: 1-2 sentence justification\
      \ (optional for standard protocols)\n5. **Monitoring**: Key parameters and frequency\n6. **Evidence Level**: Guideline\
      \ reference or evidence grade (e.g., \"Level 1, FDA approved\")\n7. **Expected Outcome**: Timeline and success metrics\n\
      \n**Design principles**:\n- Use small boxes/tables for organization (like the clinical treatment recommendation card\
      \ format)\n- Eliminate all non-essential text\n- Use abbreviations familiar to clinicians\n- Dense information layout\
      \ - maximize information per square inch\n- Think \"quick reference card\" not \"comprehensive documentation\"\n\n**Example\
      \ structure**:\n```latex\n[Patient ID/Diagnosis Box at top]\n\nTARGET PATIENT POPULATION\n  Number of patients, demographics,\
      \ key features\n\nPRIMARY TREATMENT REGIMEN\n  • Medication 1: dose, frequency, duration\n  • Procedure: specific details\n\
      \  • Monitoring: what and when\n\nSUPPORTIVE CARE\n  • Key supportive medications\n\nRATIONALE\n  Brief clinical justification\n\
      \nMOLECULAR TARGETS / RISK FACTORS\n  Relevant biomarkers or risk stratification\n\nEVIDENCE LEVEL\n  Guideline reference,\
      \ trial data\n\nMONITORING REQUIREMENTS\n  Key labs/vitals, frequency\n\nEXPECTED CLINICAL BENEFIT\n  Primary endpoint,\
      \ timeline\n```\n\n#### Option 2: Standard 3-4 Page Format\n\n**When to use**: Moderate complexity, need for patient\
      \ education materials, multidisciplinary coordination\n\nUses the Foundation Medicine first-page summary model with\
      \ 2-3 additional pages of details.\n\n#### Option 3: Extended 5-6 Page Format\n\n**When to use**: Complex comorbidities,\
      \ research protocols, extensive safety monitoring required\n\n### First Page Summary (Foundation Medicine Model)\n\n\
      **CRITICAL REQUIREMENT: All treatment plans MUST have a complete executive summary on the first page ONLY, before any\
      \ table of contents or detailed sections.**\n\nFollowing the Foundation Medicine model for precision medicine reporting\
      \ and clinical summary documents, treatment plans begin with a one-page executive summary that provides immediate access\
      \ to key actionable information. This entire summary must fit on the first page.\n\n**Required First Page Structure\
      \ (in order):**\n\n1. **Title and Subtitle**\n   - Main title: Treatment plan type (e.g., \"Comprehensive Treatment\
      \ Plan\")\n   - Subtitle: Specific condition or focus (e.g., \"Type 2 Diabetes Mellitus - Young Adult Patient\")\n\n\
      2. **Report Information Box** (using `\\begin{infobox}` or `\\begin{patientinfo}`)\n   - Report type/document purpose\n\
      \   - Date of plan creation\n   - Patient demographics (age, sex, de-identified)\n   - Primary diagnosis with ICD-10\
      \ code\n   - Report author/clinic (if applicable)\n   - Analysis approach or framework used\n\n3. **Key Findings or\
      \ Treatment Highlights** (2-4 colored boxes using appropriate box types)\n   - **Primary Treatment Goals** (using `\\\
      begin{goalbox}`)\n     - 2-3 SMART goals in bullet format\n   - **Main Interventions** (using `\\begin{keybox}` or `\\\
      begin{infobox}`)\n     - 2-3 key interventions (pharmacological, non-pharmacological, monitoring)\n   - **Critical Decision\
      \ Points** (using `\\begin{warningbox}` if urgent)\n     - Important monitoring thresholds or safety considerations\n\
      \   - **Timeline Overview** (using `\\begin{infobox}`)\n     - Brief treatment duration/phases\n     - Key milestone\
      \ dates\n\n**Visual Format Requirements:**\n- Use `\\thispagestyle{empty}` to remove page numbers from first page\n\
      - All content must fit on page 1 (before `\\newpage`)\n- Use colored boxes (tcolorbox package) with different colors\
      \ for different information types\n- Boxes should be visually prominent and easy to scan\n- Use concise, bullet-point\
      \ format\n- Table of contents (if included) starts on page 2\n- Detailed sections start on page 3\n\n**Example First\
      \ Page Structure:**\n```latex\n\\maketitle\n\\thispagestyle{empty}\n\n% Report Information Box\n\\begin{patientinfo}\n\
      \  Report Type, Date, Patient Info, Diagnosis, etc.\n\\end{patientinfo}\n\n% Key Finding #1: Treatment Goals\n\\begin{goalbox}[Primary\
      \ Treatment Goals]\n  • Goal 1\n  • Goal 2\n  • Goal 3\n\\end{goalbox}\n\n% Key Finding #2: Main Interventions\n\\begin{keybox}[Core\
      \ Interventions]\n  • Intervention 1\n  • Intervention 2\n  • Intervention 3\n\\end{keybox}\n\n% Key Finding #3: Critical\
      \ Monitoring (if applicable)\n\\begin{warningbox}[Critical Decision Points]\n  • Decision point 1\n  • Decision point\
      \ 2\n\\end{warningbox}\n\n\\newpage\n\\tableofcontents  % TOC on page 2\n\\newpage  % Detailed content starts page 3\n\
      ```\n\n### Concise Documentation\n\n**CRITICAL: Treatment plans MUST prioritize brevity and clinical relevance. Default\
      \ to 3-4 pages maximum unless clinical complexity absolutely demands more detail.**\n\nTreatment plans should prioritize\
      \ **clarity and actionability** over exhaustive detail:\n\n- **Focused**: Include only clinically essential information\
      \ that impacts care decisions\n- **Actionable**: Emphasize what needs to be done, when, and why\n- **Efficient**: Facilitate\
      \ quick decision-making without sacrificing clinical quality\n- **Target length options**:\n  - **1-page format** (preferred\
      \ for straightforward cases): Quick-reference card with all essential information\n  - **3-4 pages standard**: Standard\
      \ format with first-page summary + supporting details\n  - **5-6 pages** (rare): Only for highly complex cases with\
      \ multiple comorbidities or multidisciplinary interventions\n\n**Streamlining Guidelines:**\n- **First Page Summary**:\
      \ Use individual colored boxes to consolidate key information (goals, interventions, decision points) - this alone can\
      \ often convey the essential treatment plan\n- **Eliminate Redundancy**: If information is in the first-page summary,\
      \ don't repeat it verbatim in detailed sections\n- **Patient Education section**: 3-5 key bullet points on critical\
      \ topics and warning signs only\n- **Risk Mitigation section**: Highlight only critical medication safety concerns and\
      \ emergency actions (not exhaustive lists)\n- **Expected Outcomes section**: 2-3 concise statements on anticipated responses\
      \ and timelines\n- **Interventions**: Focus on primary interventions; secondary/supportive measures in brief bullet\
      \ format\n- **Use tables and bullet points** extensively for efficient presentation\n- **Avoid narrative prose** where\
      \ structured lists suffice\n- **Combine related sections** when appropriate to reduce page count\n\n### Quality Over\
      \ Quantity\n\nThe goal is professional, clinically complete documentation that respects clinicians' time while ensuring\
      \ comprehensive patient care. Every section should add value; remove or condense sections that don't directly inform\
      \ treatment decisions.\n\n### Citations and Evidence Support\n\n**Use minimal, targeted citations to support clinical\
      \ recommendations:**\n\n- **Text Citations Preferred**: Use brief in-text citations (Author Year) or simple references\
      \ rather than extensive bibliographies unless specifically requested\n- **When to Cite**:\n  - Clinical practice guideline\
      \ recommendations (e.g., \"per ADA 2024 guidelines\")\n  - Specific medication dosing or protocols (e.g., \"ACC/AHA\
      \ recommendations\")\n  - Novel or controversial interventions requiring evidence support\n  - Risk stratification tools\
      \ or validated assessment scales\n- **When NOT to Cite**:\n  - Standard-of-care interventions widely accepted in the\
      \ field\n  - Basic medical facts and routine clinical practices\n  - General patient education content\n- **Citation\
      \ Format**: \n  - Inline: \"Initiate metformin as first-line therapy (ADA Standards of Care 2024)\"\n  - Minimal: \"\
      Treatment follows ACC/AHA heart failure guidelines\"\n  - Avoid formal numbered references and extensive bibliography\
      \ sections unless document is for academic/research purposes\n- **Keep it Brief**: A 3-4 page treatment plan should\
      \ have 0-3 citations maximum, only where essential for clinical credibility or novel recommendations\n\n## Core Capabilities\n\
      \n### 1. General Medical Treatment Plans\n\nGeneral medical treatment plans address common chronic conditions and acute\
      \ medical issues requiring structured therapeutic interventions.\n\n#### Standard Components\n\n**Patient Information\
      \ (De-identified)**\n- Demographics (age, sex, relevant medical background)\n- Active medical conditions and comorbidities\n\
      - Current medications and allergies\n- Relevant social and family history\n- Functional status and baseline assessments\n\
      - **HIPAA Compliance**: Remove all 18 identifiers per Safe Harbor method\n\n**Diagnosis and Assessment Summary**\n-\
      \ Primary diagnosis with ICD-10 code\n- Secondary diagnoses and comorbidities\n- Severity classification and staging\n\
      - Functional limitations and quality of life impact\n- Risk stratification (e.g., cardiovascular risk, fall risk)\n\
      - Prognostic indicators\n\n**Treatment Goals (SMART Format)**\n\nShort-term goals (1-3 months):\n- **Specific**: Clearly\
      \ defined outcome (e.g., \"Reduce HbA1c to <7%\")\n- **Measurable**: Quantifiable metrics (e.g., \"Decrease systolic\
      \ BP by 10 mmHg\")\n- **Achievable**: Realistic given patient capabilities\n- **Relevant**: Aligned with patient priorities\
      \ and values\n- **Time-bound**: Specific timeframe (e.g., \"within 8 weeks\")\n\nLong-term goals (6-12 months):\n- Disease\
      \ control or remission targets\n- Functional improvement objectives\n- Quality of life enhancement\n- Prevention of\
      \ complications\n- Maintenance of independence\n\n**Interventions**\n\n*Pharmacological*:\n- Medications with specific\
      \ dosages, routes, frequencies\n- Titration schedules and target doses\n- Drug-drug interaction considerations\n- Monitoring\
      \ for adverse effects\n- Medication reconciliation\n\n*Non-pharmacological*:\n- Lifestyle modifications (diet, exercise,\
      \ smoking cessation)\n- Behavioral interventions\n- Patient education and self-management\n- Monitoring and self-tracking\
      \ (glucose, blood pressure, weight)\n- Assistive devices or adaptive equipment\n\n*Procedural*:\n- Planned procedures\
      \ or interventions\n- Referrals to specialists\n- Diagnostic testing schedule\n- Preventive care (vaccinations, screenings)\n\
      \n**Timeline and Schedule**\n- Treatment phases with specific timeframes\n- Appointment frequency (weekly, monthly,\
      \ quarterly)\n- Milestone assessments and goal evaluations\n- Medication adjustments schedule\n- Expected duration of\
      \ treatment\n\n**Monitoring Parameters**\n- Clinical outcomes to track (vital signs, lab values, symptoms)\n- Assessment\
      \ tools and scales (e.g., PHQ-9, pain scales)\n- Frequency of monitoring\n- Thresholds for intervention or escalation\n\
      - Patient-reported outcomes\n\n**Expected Outcomes**\n- Primary outcome measures\n- Success criteria and benchmarks\n\
      - Expected timeline for improvement\n- Criteria for treatment modification\n- Long-term prognosis\n\n**Follow-up Plan**\n\
      - Scheduled appointments and reassessments\n- Communication plan (phone calls, secure messaging)\n- Emergency contact\
      \ procedures\n- Criteria for urgent evaluation\n- Transition or discharge planning\n\n**Patient Education**\n- Understanding\
      \ of condition and treatment rationale\n- Self-management skills training\n- Medication administration and adherence\n\
      - Warning signs and when to seek help\n- Resources and support services\n\n**Risk Mitigation**\n- Potential adverse\
      \ effects and management\n- Drug interactions and contraindications\n- Fall prevention, infection prevention\n- Emergency\
      \ action plans\n- Safety monitoring\n\n#### Common Applications\n\n- Diabetes mellitus management\n- Hypertension control\n\
      - Heart failure treatment\n- COPD management\n- Asthma care plans\n- Hyperlipidemia treatment\n- Osteoarthritis management\n\
      - Chronic kidney disease\n\n### 2. Rehabilitation Treatment Plans\n\nRehabilitation plans focus on restoring function,\
      \ improving mobility, and enhancing quality of life through structured therapeutic programs.\n\n#### Core Components\n\
      \n**Functional Assessment**\n- Baseline functional status (ADLs, IADLs)\n- Range of motion, strength, balance, endurance\n\
      - Gait analysis and mobility assessment\n- Standardized measures (FIM, Barthel Index, Berg Balance Scale)\n- Environmental\
      \ assessment (home safety, accessibility)\n\n**Rehabilitation Goals**\n\n*Impairment-level goals*:\n- Improve shoulder\
      \ flexion to 140 degrees\n- Increase quadriceps strength by 2/5 MMT grades\n- Enhance balance (Berg Score >45/56)\n\n\
      *Activity-level goals*:\n- Independent ambulation 150 feet with assistive device\n- Climb 12 stairs with handrail supervision\n\
      - Transfer bed-to-chair independently\n\n*Participation-level goals*:\n- Return to work with modifications\n- Resume\
      \ recreational activities\n- Independent community mobility\n\n**Therapeutic Interventions**\n\n*Physical Therapy*:\n\
      - Therapeutic exercises (strengthening, stretching, endurance)\n- Manual therapy techniques\n- Gait training and balance\
      \ activities\n- Modalities (heat, ice, electrical stimulation, ultrasound)\n- Assistive device training\n\n*Occupational\
      \ Therapy*:\n- ADL training (bathing, dressing, grooming, feeding)\n- Upper extremity strengthening and coordination\n\
      - Adaptive equipment and modifications\n- Energy conservation techniques\n- Cognitive rehabilitation\n\n*Speech-Language\
      \ Pathology*:\n- Swallowing therapy and dysphagia management\n- Communication strategies and augmentative devices\n\
      - Cognitive-linguistic therapy\n- Voice therapy\n\n*Other Services*:\n- Recreational therapy\n- Aquatic therapy\n- Cardiac\
      \ rehabilitation\n- Pulmonary rehabilitation\n- Vestibular rehabilitation\n\n**Treatment Schedule**\n- Frequency: 3x/week\
      \ PT, 2x/week OT (example)\n- Session duration: 45-60 minutes\n- Treatment phase durations (acute, subacute, maintenance)\n\
      - Expected total duration: 8-12 weeks\n- Reassessment intervals\n\n**Progress Monitoring**\n- Weekly functional assessments\n\
      - Standardized outcome measures\n- Goal attainment scaling\n- Pain and symptom tracking\n- Patient satisfaction\n\n\
      **Home Exercise Program**\n- Specific exercises with repetitions/sets/frequency\n- Precautions and safety instructions\n\
      - Progression criteria\n- Self-monitoring strategies\n\n#### Specialty Rehabilitation\n\n- Post-stroke rehabilitation\n\
      - Orthopedic rehabilitation (joint replacement, fracture)\n- Cardiac rehabilitation (post-MI, post-surgery)\n- Pulmonary\
      \ rehabilitation\n- Vestibular rehabilitation\n- Neurological rehabilitation\n- Sports injury rehabilitation\n\n###\
      \ 3. Mental Health Treatment Plans\n\nMental health treatment plans address psychiatric conditions through integrated\
      \ psychotherapeutic, pharmacological, and psychosocial interventions.\n\n#### Essential Components\n\n**Psychiatric\
      \ Assessment**\n- Primary psychiatric diagnosis (DSM-5 criteria)\n- Symptom severity and functional impairment\n- Co-occurring\
      \ mental health conditions\n- Substance use assessment\n- Suicide/homicide risk assessment\n- Trauma history and PTSD\
      \ screening\n- Social determinants of mental health\n\n**Treatment Goals**\n\n*Symptom reduction*:\n- Decrease depression\
      \ severity (PHQ-9 score from 18 to <10)\n- Reduce anxiety symptoms (GAD-7 score <5)\n- Improve sleep quality (Pittsburgh\
      \ Sleep Quality Index)\n- Stabilize mood (reduced mood episodes)\n\n*Functional improvement*:\n- Return to work or school\n\
      - Improve social relationships and support\n- Enhance coping skills and emotional regulation\n- Increase engagement\
      \ in meaningful activities\n\n*Recovery-oriented goals*:\n- Build resilience and self-efficacy\n- Develop crisis management\
      \ skills\n- Establish sustainable wellness routines\n- Achieve personal recovery goals\n\n**Therapeutic Interventions**\n\
      \n*Psychotherapy*:\n- Evidence-based modality (CBT, DBT, ACT, psychodynamic, IPT)\n- Session frequency (weekly, biweekly)\n\
      - Treatment duration (12-16 weeks, ongoing)\n- Specific techniques and targets\n- Group therapy participation\n\n*Psychopharmacology*:\n\
      - Medication class and rationale\n- Starting dose and titration schedule\n- Target symptoms\n- Expected response timeline\
      \ (2-4 weeks for antidepressants)\n- Side effect monitoring\n- Combination therapy considerations\n\n*Psychosocial Interventions*:\n\
      - Case management services\n- Peer support programs\n- Family therapy or psychoeducation\n- Vocational rehabilitation\n\
      - Supported housing or community integration\n- Substance abuse treatment\n\n**Safety Planning**\n- Crisis contacts\
      \ and emergency services\n- Warning signs and triggers\n- Coping strategies and self-soothing techniques\n- Safe environment\
      \ modifications\n- Means restriction (firearms, medications)\n- Support system activation\n\n**Monitoring and Assessment**\n\
      - Symptom rating scales (weekly or biweekly)\n- Medication adherence and side effects\n- Suicidal ideation screening\n\
      - Functional status assessments\n- Treatment engagement and therapeutic alliance\n\n**Patient and Family Education**\n\
      - Psychoeducation about diagnosis\n- Treatment rationale and expectations\n- Medication information\n- Relapse prevention\
      \ strategies\n- Community resources\n\n#### Mental Health Conditions\n\n- Major depressive disorder\n- Anxiety disorders\
      \ (GAD, panic, social anxiety)\n- Bipolar disorder\n- Schizophrenia and psychotic disorders\n- PTSD and trauma-related\
      \ disorders\n- Eating disorders\n- Substance use disorders\n- Personality disorders\n\n### 4. Chronic Disease Management\
      \ Plans\n\nComprehensive long-term care plans for chronic conditions requiring ongoing monitoring, treatment adjustments,\
      \ and multidisciplinary coordination.\n\n#### Key Features\n\n**Disease-Specific Targets**\n- Evidence-based treatment\
      \ goals per guidelines\n- Stage-appropriate interventions\n- Complication prevention strategies\n- Disease progression\
      \ monitoring\n\n**Self-Management Support**\n- Patient activation and engagement\n- Shared decision-making\n- Action\
      \ plans for symptom changes\n- Technology-enabled monitoring (apps, remote monitoring)\n\n**Care Coordination**\n- Primary\
      \ care physician oversight\n- Specialist consultations and co-management\n- Care transitions (hospital to home)\n- Medication\
      \ management across providers\n- Communication protocols\n\n**Population Health Integration**\n- Registry tracking and\
      \ outreach\n- Preventive care and screening schedules\n- Quality measure reporting\n- Care gaps identification\n\n####\
      \ Applicable Conditions\n\n- Type 1 and Type 2 diabetes\n- Cardiovascular disease (CHF, CAD)\n- Chronic respiratory\
      \ diseases (COPD, asthma)\n- Chronic kidney disease\n- Inflammatory bowel disease\n- Rheumatoid arthritis and autoimmune\
      \ conditions\n- HIV/AIDS\n- Cancer survivorship care\n\n### 5. Perioperative Care Plans\n\nStructured plans for surgical\
      \ and procedural patients covering preoperative preparation, intraoperative management, and postoperative recovery.\n\
      \n#### Components\n\n**Preoperative Assessment**\n- Surgical indication and planned procedure\n- Preoperative risk stratification\
      \ (ASA class, cardiac risk)\n- Optimization of medical conditions\n- Medication management (continuation, discontinuation)\n\
      - Preoperative testing and clearances\n- Informed consent and patient education\n\n**Perioperative Interventions**\n\
      - Enhanced recovery after surgery (ERAS) protocols\n- Venous thromboembolism prophylaxis\n- Antibiotic prophylaxis\n\
      - Glycemic control strategies\n- Pain management plan (multimodal analgesia)\n\n**Postoperative Care**\n- Immediate\
      \ recovery goals (24-48 hours)\n- Early mobilization protocols\n- Diet advancement\n- Wound care and drain management\n\
      - Pain control regimen\n- Complication monitoring\n\n**Discharge Planning**\n- Activity restrictions and progression\n\
      - Medication reconciliation\n- Follow-up appointments\n- Home health or rehabilitation services\n- Return-to-work timeline\n\
      \n### 6. Pain Management Plans\n\nMultimodal approaches to acute and chronic pain using evidence-based interventions\
      \ and opioid-sparing strategies.\n\n#### Comprehensive Components\n\n**Pain Assessment**\n- Pain location, quality,\
      \ intensity (0-10 scale)\n- Temporal pattern (constant, intermittent, breakthrough)\n- Aggravating and alleviating factors\n\
      - Functional impact (sleep, activities, mood)\n- Previous treatments and responses\n- Psychosocial contributors\n\n\
      **Multimodal Interventions**\n\n*Pharmacological*:\n- Non-opioid analgesics (acetaminophen, NSAIDs)\n- Adjuvant medications\
      \ (antidepressants, anticonvulsants, muscle relaxants)\n- Topical agents (lidocaine, capsaicin, diclofenac)\n- Opioid\
      \ therapy (when appropriate, with risk mitigation)\n- Titration and rotation strategies\n\n*Interventional Procedures*:\n\
      - Nerve blocks and injections\n- Radiofrequency ablation\n- Spinal cord stimulation\n- Intrathecal drug delivery\n\n\
      *Non-pharmacological*:\n- Physical therapy and exercise\n- Cognitive-behavioral therapy for pain\n- Mindfulness and\
      \ relaxation techniques\n- Acupuncture\n- TENS units\n\n**Opioid Safety (when prescribed)**\n- Indication and planned\
      \ duration\n- Prescription drug monitoring program (PDMP) check\n- Opioid risk assessment tools\n- Naloxone prescription\n\
      - Treatment agreements\n- Random urine drug screening\n- Frequent follow-up and reassessment\n\n**Functional Goals**\n\
      - Specific activity improvements\n- Sleep quality enhancement\n- Reduced pain interference\n- Improved quality of life\n\
      - Return to work or meaningful activities\n\n## Best Practices\n\n### Brevity and Focus (HIGHEST PRIORITY)\n\n**Treatment\
      \ plans MUST be concise and focused on actionable clinical information:**\n\n- **1-page format is PREFERRED**: For most\
      \ clinical scenarios, a single-page treatment plan (like precision oncology reports) provides all necessary information\n\
      - **Default to shortest format possible**: Start with 1-page; only expand if clinical complexity genuinely requires\
      \ it\n- **Every sentence must add value**: If a section doesn't change clinical decision-making, omit it entirely\n\
      - **Think \"quick reference card\" not \"comprehensive textbook\"**: Busy clinicians need scannable, dense information\n\
      - **Avoid academic verbosity**: This is clinical documentation, not a literature review or teaching document\n- **Maximum\
      \ lengths by complexity**:\n  - Simple/standard cases: 1 page\n  - Moderate complexity: 3-4 pages (first-page summary\
      \ + details)\n  - High complexity (rare): 5-6 pages maximum\n\n### First Page Summary (Most Important)\n\n**ALWAYS create\
      \ a one-page executive summary as the first page:**\n- The first page must contain ONLY: Title, Report Info Box, and\
      \ Key Findings boxes\n- This provides an at-a-glance overview similar to precision medicine reports\n- Table of contents\
      \ and detailed sections start on page 2 or later\n- Think of it as a \"clinical highlights\" page that a busy clinician\
      \ can scan in 30 seconds\n- Use 2-4 colored boxes for different key findings (goals, interventions, decision points)\n\
      - **A strong first page can often stand alone** - subsequent pages are for details, not repetition\n\n### SMART Goal\
      \ Setting\n\nAll treatment goals should meet SMART criteria:\n\n- **Specific**: \"Improve HbA1c to <7%\" not \"Better\
      \ diabetes control\"\n- **Measurable**: Use quantifiable metrics, validated scales, objective measures\n- **Achievable**:\
      \ Consider patient capabilities, resources, social support\n- **Relevant**: Align with patient values, priorities, and\
      \ life circumstances\n- **Time-bound**: Define clear timeframes for goal achievement and reassessment\n\n### Patient-Centered\
      \ Care\n\n✓ **Shared Decision-Making**: Involve patients in goal-setting and treatment choices  \n✓ **Cultural Competence**:\
      \ Respect cultural beliefs, language preferences, health literacy  \n✓ **Patient Preferences**: Honor treatment preferences\
      \ and personal values  \n✓ **Individualization**: Tailor plans to patient's unique circumstances  \n✓ **Empowerment**:\
      \ Support patient activation and self-management  \n\n### Evidence-Based Practice\n\n✓ **Clinical Guidelines**: Follow\
      \ current specialty society recommendations  \n✓ **Quality Measures**: Incorporate HEDIS, CMS quality measures  \n✓\
      \ **Comparative Effectiveness**: Use treatments with proven efficacy  \n✓ **Avoid Low-Value Care**: Eliminate unnecessary\
      \ tests and interventions  \n✓ **Stay Current**: Update plans based on emerging evidence  \n\n### Documentation Standards\n\
      \n✓ **Completeness**: Include all required elements  \n✓ **Clarity**: Use clear, professional medical language  \n✓\
      \ **Accuracy**: Ensure factual correctness and current information  \n✓ **Timeliness**: Document plans promptly  \n\
      ✓ **Legibility**: Professional formatting and organization  \n✓ **Signature and Date**: Authenticate all treatment plans\
      \  \n\n### Regulatory Compliance\n\n✓ **HIPAA Privacy**: De-identify all protected health information  \n✓ **Informed\
      \ Consent**: Document patient understanding and agreement  \n✓ **Billing Support**: Include documentation to support\
      \ medical necessity  \n✓ **Quality Reporting**: Enable extraction of quality metrics  \n✓ **Legal Protection**: Maintain\
      \ defensible clinical documentation  \n\n### Multidisciplinary Coordination\n\n✓ **Team Communication**: Share plans\
      \ across care team  \n✓ **Role Clarity**: Define responsibilities for each team member  \n✓ **Care Transitions**: Ensure\
      \ continuity across settings  \n✓ **Specialist Integration**: Coordinate with subspecialty care  \n✓ **Patient-Centered\
      \ Medical Home**: Align with PCMH principles  \n\n## LaTeX Template Usage\n\n### Template Selection\n\nChoose the appropriate\
      \ template based on clinical context and desired length:\n\n#### Concise Templates (PREFERRED)\n\n1. **one_page_treatment_plan.tex**\
      \ - **FIRST CHOICE** for most cases\n   - All clinical specialties\n   - Standard protocols and straightforward cases\n\
      \   - Quick-reference format similar to precision oncology reports\n   - Dense, scannable, clinician-focused\n   - Use\
      \ this unless complexity demands more detail\n\n#### Standard Templates (3-4 pages)\n\nUse only when one-page format\
      \ is insufficient due to complexity:\n\n2. **general_medical_treatment_plan.tex** - Primary care, chronic disease, general\
      \ medicine\n3. **rehabilitation_treatment_plan.tex** - PT/OT, post-surgery, injury recovery\n4. **mental_health_treatment_plan.tex**\
      \ - Psychiatric conditions, behavioral health\n5. **chronic_disease_management_plan.tex** - Complex chronic diseases,\
      \ multiple conditions\n6. **perioperative_care_plan.tex** - Surgical patients, procedural care\n7. **pain_management_plan.tex**\
      \ - Acute or chronic pain conditions\n\n**Note**: Even when using standard templates, adapt them to be concise (3-4\
      \ pages max) by removing non-essential sections.\n\n### Template Structure\n\nAll LaTeX templates include:\n- Professional\
      \ formatting with appropriate margins and fonts\n- Structured sections for all required components\n- Tables for medications,\
      \ interventions, timelines\n- Goal-tracking sections with SMART criteria\n- Space for provider signatures and dates\n\
      - HIPAA-compliant de-identification guidance\n- Comments with detailed instructions\n\n### Generating PDFs\n\n```bash\n\
      # Compile LaTeX template to PDF\npdflatex general_medical_treatment_plan.tex\n\n# For templates with references\npdflatex\
      \ treatment_plan.tex\nbibtex treatment_plan\npdflatex treatment_plan.tex\npdflatex treatment_plan.tex\n```\n\n## Validation\
      \ and Quality Assurance\n\n### Completeness Checking\n\nUse validation scripts to ensure all required sections are present:\n\
      \n```bash\npython check_completeness.py my_treatment_plan.tex\n```\n\nThe script checks for:\n- Patient information\
      \ section\n- Diagnosis and assessment\n- SMART goals (short-term and long-term)\n- Interventions (pharmacological, non-pharmacological)\n\
      - Timeline and schedule\n- Monitoring parameters\n- Expected outcomes\n- Follow-up plan\n- Patient education\n- Risk\
      \ mitigation\n\n### Treatment Plan Validation\n\nComprehensive validation of treatment plan quality:\n\n```bash\npython\
      \ validate_treatment_plan.py my_treatment_plan.tex\n```\n\nValidation includes:\n- SMART goal criteria assessment\n\
      - Evidence-based intervention verification\n- Timeline feasibility check\n- Monitoring parameter adequacy\n- Safety\
      \ and risk mitigation review\n- Regulatory compliance check\n\n### Quality Checklist\n\nReview treatment plans against\
      \ the quality checklist (`quality_checklist.md`):\n\n**Clinical Quality**\n- [ ] Diagnosis is accurate and properly\
      \ coded (ICD-10)\n- [ ] Goals are SMART and patient-centered\n- [ ] Interventions are evidence-based and guideline-concordant\n\
      - [ ] Timeline is realistic and clearly defined\n- [ ] Monitoring plan is comprehensive\n- [ ] Safety considerations\
      \ are addressed\n\n**Patient-Centered Care**\n- [ ] Patient preferences and values incorporated\n- [ ] Shared decision-making\
      \ documented\n- [ ] Health literacy appropriate language\n- [ ] Cultural considerations addressed\n- [ ] Patient education\
      \ plan included\n\n**Regulatory Compliance**\n- [ ] HIPAA-compliant de-identification\n- [ ] Medical necessity documented\n\
      - [ ] Informed consent noted\n- [ ] Provider signature and credentials\n- [ ] Date of plan creation/revision\n\n**Coordination\
      \ and Communication**\n- [ ] Specialist referrals documented\n- [ ] Care team roles defined\n- [ ] Follow-up schedule\
      \ clear\n- [ ] Emergency contacts provided\n- [ ] Transition planning addressed\n\n## Integration with Other Skills\n\
      \n### Clinical Reports Integration\n\nTreatment plans often accompany other clinical documentation:\n\n- **SOAP Notes**\
      \ (`clinical-reports` skill): Document ongoing implementation\n- **H&P** (`clinical-reports` skill): Initial assessment\
      \ informs treatment plan\n- **Discharge Summaries** (`clinical-reports` skill): Summarize treatment plan execution\n\
      - **Progress Notes**: Track goal achievement and plan modifications\n\n### Scientific Writing Integration\n\nEvidence-based\
      \ treatment planning requires literature support:\n\n- **Citation Management** (`citation-management` skill): Reference\
      \ clinical guidelines\n- **Literature Review** (`literature-review` skill): Understand treatment evidence base\n- **Research\
      \ Lookup** (`research-lookup` skill): Find current best practices\n\n### Research Integration\n\nTreatment plans may\
      \ be developed for clinical trials or research studies:\n\n- **Research Grants** (`research-grants` skill): Treatment\
      \ protocols for funded studies\n- **Clinical Trial Reports** (`clinical-reports` skill): Intervention documentation\n\
      \n## Common Use Cases\n\n### Example 1: Type 2 Diabetes Management\n\n**Scenario**: 58-year-old patient with newly diagnosed\
      \ Type 2 diabetes, HbA1c 8.5%, BMI 32\n\n**Template**: `general_medical_treatment_plan.tex`\n\n**Goals**:\n- Short-term:\
      \ Reduce HbA1c to <7.5% in 3 months\n- Long-term: Achieve HbA1c <7%, lose 15 pounds in 6 months\n\n**Interventions**:\n\
      - Pharmacological: Metformin 500mg BID, titrate to 1000mg BID\n- Lifestyle: Mediterranean diet, 150 min/week moderate\
      \ exercise\n- Education: Diabetes self-management education, glucose monitoring\n\n### Example 2: Post-Stroke Rehabilitation\n\
      \n**Scenario**: 70-year-old patient s/p left MCA stroke with right hemiparesis\n\n**Template**: `rehabilitation_treatment_plan.tex`\n\
      \n**Goals**:\n- Short-term: Improve right arm strength 2/5 to 3/5 in 4 weeks\n- Long-term: Independent ambulation 150\
      \ feet with cane in 12 weeks\n\n**Interventions**:\n- PT 3x/week: Gait training, balance, strengthening\n- OT 3x/week:\
      \ ADL training, upper extremity function\n- SLP 2x/week: Dysphagia therapy\n\n### Example 3: Major Depressive Disorder\n\
      \n**Scenario**: 35-year-old with moderate depression, PHQ-9 score 16\n\n**Template**: `mental_health_treatment_plan.tex`\n\
      \n**Goals**:\n- Short-term: Reduce PHQ-9 to <10 in 8 weeks\n- Long-term: Achieve remission (PHQ-9 <5), return to work\n\
      \n**Interventions**:\n- Psychotherapy: CBT weekly sessions\n- Medication: Sertraline 50mg daily, titrate to 100mg\n\
      - Lifestyle: Sleep hygiene, exercise 30 min 5x/week\n\n### Example 4: Total Knee Arthroplasty\n\n**Scenario**: 68-year-old\
      \ scheduled for right TKA for osteoarthritis\n\n**Template**: `perioperative_care_plan.tex`\n\n**Preoperative Goals**:\n\
      - Optimize diabetes control (glucose <180)\n- Discontinue anticoagulation per protocol\n- Complete medical clearance\n\
      \n**Postoperative Goals**:\n- Ambulate 50 feet by POD 1\n- 90-degree knee flexion by POD 3\n- Discharge home with PT\
      \ services by POD 2-3\n\n### Example 5: Chronic Low Back Pain\n\n**Scenario**: 45-year-old with chronic non-specific\
      \ low back pain, pain 7/10\n\n**Template**: `pain_management_plan.tex`\n\n**Goals**:\n- Short-term: Reduce pain to 4/10\
      \ in 6 weeks\n- Long-term: Return to work full-time, pain 2-3/10\n\n**Interventions**:\n- Pharmacological: Gabapentin\
      \ 300mg TID, duloxetine 60mg daily\n- PT: Core strengthening, McKenzie exercises 2x/week x 8 weeks\n- Behavioral: CBT\
      \ for pain, mindfulness meditation\n- Interventional: Consider lumbar ESI if inadequate response\n\n## Professional\
      \ Standards and Guidelines\n\nTreatment plans should align with:\n\n### General Medicine\n- American Diabetes Association\
      \ (ADA) Standards of Care\n- ACC/AHA Cardiovascular Guidelines\n- GOLD COPD Guidelines\n- JNC-8 Hypertension Guidelines\n\
      - KDIGO Chronic Kidney Disease Guidelines\n\n### Rehabilitation\n- APTA Clinical Practice Guidelines\n- AOTA Practice\
      \ Guidelines\n- Cardiac Rehabilitation Guidelines (AHA/AACVPR)\n- Stroke Rehabilitation Guidelines\n\n### Mental Health\n\
      - APA Practice Guidelines\n- VA/DoD Clinical Practice Guidelines\n- NICE Guidelines (National Institute for Health and\
      \ Care Excellence)\n- Cochrane Reviews for psychiatric interventions\n\n### Pain Management\n- CDC Opioid Prescribing\
      \ Guidelines\n- AAPM/APS Chronic Pain Guidelines\n- WHO Pain Ladder\n- Multimodal Analgesia Best Practices\n\n## Timeline\
      \ Generation\n\nUse the timeline generator script to create visual treatment timelines:\n\n```bash\npython timeline_generator.py\
      \ --plan my_treatment_plan.tex --output timeline.pdf\n```\n\nGenerates:\n- Gantt chart of treatment phases\n- Milestone\
      \ markers for goal assessments\n- Medication titration schedules\n- Follow-up appointment calendar\n- Intervention intensity\
      \ over time\n\n## Support and Resources\n\n### Template Generation\n\nInteractive template selection:\n\n```bash\ncd\
      \ .claude/skills/treatment-plans/scripts\npython generate_template.py\n\n# Or specify type directly\npython generate_template.py\
      \ --type mental_health --output depression_treatment_plan.tex\n```\n\n### Validation Workflow\n\n1. **Create treatment\
      \ plan** using appropriate LaTeX template\n2. **Check completeness**: `python check_completeness.py plan.tex`\n3. **Validate\
      \ quality**: `python validate_treatment_plan.py plan.tex`\n4. **Review checklist**: Compare against `quality_checklist.md`\n\
      5. **Generate PDF**: `pdflatex plan.tex`\n6. **Review with patient**: Ensure understanding and agreement\n7. **Implement\
      \ and document**: Track progress in clinical notes\n\n### Additional Resources\n\n- Clinical practice guidelines from\
      \ specialty societies\n- AHRQ Effective Health Care Program\n- Cochrane Library for intervention evidence\n- UpToDate\
      \ and DynaMed for treatment recommendations\n- CMS Quality Measures and HEDIS specifications\n\n## Professional Document\
      \ Styling\n\n### Overview\n\nTreatment plans can be enhanced with professional medical document styling using the `medical_treatment_plan.sty`\
      \ LaTeX package. This custom style transforms plain academic documents into visually appealing, color-coded clinical\
      \ documents that maintain scientific rigor while improving readability and usability.\n\n### Medical Treatment Plan\
      \ Style Package\n\nThe `medical_treatment_plan.sty` package (located in `assets/medical_treatment_plan.sty`) provides:\n\
      \n**Professional Color Scheme**\n- **Primary Blue** (RGB: 0, 102, 153): Headers, section titles, primary accents\n-\
      \ **Secondary Blue** (RGB: 102, 178, 204): Light backgrounds, subtle accents\n- **Accent Blue** (RGB: 0, 153, 204):\
      \ Hyperlinks, key highlights\n- **Success Green** (RGB: 0, 153, 76): Goals, positive outcomes\n- **Warning Red** (RGB:\
      \ 204, 0, 0): Warnings, critical information\n- **Dark Gray** (RGB: 64, 64, 64): Body text\n- **Light Gray** (RGB: 245,\
      \ 245, 245): Background fills\n\n**Styled Elements**\n- Custom colored headers and footers with professional rules\n\
      - Blue section titles with underlines for clear hierarchy\n- Enhanced table formatting with colored headers and alternating\
      \ rows\n- Optimized list spacing with colored bullets and numbering\n- Professional page layout with appropriate margins\n\
      \n### Custom Information Boxes\n\nThe style package includes five specialized box environments for organizing clinical\
      \ information:\n\n#### 1. Info Box (Blue Border, Light Gray Background)\n\nFor general information, clinical assessments,\
      \ and testing schedules:\n\n```latex\n\\begin{infobox}[Title]\n  \\textbf{Key Information:}\n  \\begin{itemize}\n  \
      \  \\item Clinical assessment details\n    \\item Testing schedules\n    \\item General guidance\n  \\end{itemize}\n\
      \\end{infobox}\n```\n\n**Use cases**: Metabolic status, baseline assessments, monitoring schedules, titration protocols\n\
      \n#### 2. Warning Box (Red Border, Yellow Background)\n\nFor critical decision points, safety protocols, and alerts:\n\
      \n```latex\n\\begin{warningbox}[Alert Title]\n  \\textbf{Important Safety Information:}\n  \\begin{itemize}\n    \\\
      item Critical drug interactions\n    \\item Safety monitoring requirements\n    \\item Red flag symptoms requiring immediate\
      \ action\n  \\end{itemize}\n\\end{warningbox}\n```\n\n**Use cases**: Medication safety, decision points, contraindications,\
      \ emergency protocols\n\n#### 3. Goal Box (Green Border, Green-Tinted Background)\n\nFor treatment goals, targets, and\
      \ success criteria:\n\n```latex\n\\begin{goalbox}[Treatment Goals]\n  \\textbf{Primary Objectives:}\n  \\begin{itemize}\n\
      \    \\item Reduce HbA1c to <7\\% within 3 months\n    \\item Achieve 5-7\\% weight loss in 12 weeks\n    \\item Complete\
      \ diabetes education program\n  \\end{itemize}\n\\end{goalbox}\n```\n\n**Use cases**: SMART goals, target outcomes,\
      \ success metrics, CGM goals\n\n#### 4. Key Points Box (Blue Background)\n\nFor executive summaries, key takeaways,\
      \ and important recommendations:\n\n```latex\n\\begin{keybox}[Key Highlights]\n  \\textbf{Essential Points:}\n  \\begin{itemize}\n\
      \    \\item Main therapeutic approach\n    \\item Critical patient instructions\n    \\item Priority interventions\n\
      \  \\end{itemize}\n\\end{keybox}\n```\n\n**Use cases**: Plan overview, plate method instructions, important dietary\
      \ guidelines\n\n#### 5. Emergency Box (Large Red Design)\n\nFor emergency contacts and urgent protocols:\n\n```latex\n\
      \\begin{emergencybox}\n  \\begin{itemize}\n    \\item \\textbf{Emergency Services:} 911\n    \\item \\textbf{Endocrinology\
      \ Office:} [Phone] (business hours)\n    \\item \\textbf{After-Hours Hotline:} [Phone] (nights/weekends)\n    \\item\
      \ \\textbf{Pharmacy:} [Phone and location]\n  \\end{itemize}\n\\end{emergencybox}\n```\n\n**Use cases**: Emergency contacts,\
      \ critical hotlines, urgent resource information\n\n#### 6. Patient Info Box (White with Blue Border)\n\nFor patient\
      \ demographics and baseline information:\n\n```latex\n\\begin{patientinfo}\n  \\begin{tabular}{ll}\n    \\textbf{Age:}\
      \ & 23 years \\\\\n    \\textbf{Sex:} & Male \\\\\n    \\textbf{Diagnosis:} & Type 2 Diabetes Mellitus \\\\\n    \\\
      textbf{Plan Start Date:} & \\today \\\\\n  \\end{tabular}\n\\end{patientinfo}\n```\n\n**Use cases**: Patient information\
      \ sections, demographic data\n\n### Professional Table Formatting\n\nEnhanced table environment with medical styling:\n\
      \n```latex\n\\begin{medtable}{Caption Text}\n\\begin{tabular}{|p{5cm}|p{4cm}|p{4.5cm}|}\n\\hline\n\\tableheadercolor\
      \  % Blue header with white text\n\\textcolor{white}{\\textbf{Column 1}} & \n\\textcolor{white}{\\textbf{Column 2}}\
      \ & \n\\textcolor{white}{\\textbf{Column 3}} \\\\\n\\hline\nData row 1 content & Value 1 & Details 1 \\\\\n\\hline\n\
      \\tablerowcolor  % Alternating light gray row\nData row 2 content & Value 2 & Details 2 \\\\\n\\hline\nData row 3 content\
      \ & Value 3 & Details 3 \\\\\n\\hline\n\\end{tabular}\n\\caption{Table caption}\n\\end{medtable}\n```\n\n**Features:**\n\
      - Blue headers with white text for visual prominence\n- Alternating row colors (`\\tablerowcolor`) for improved readability\n\
      - Automatic centering and spacing\n- Professional borders and padding\n\n### Using the Style Package\n\n#### Basic Setup\n\
      \n1. **Add to document preamble:**\n\n```latex\n% !TEX program = xelatex\n\\documentclass[11pt,letterpaper]{article}\n\
      \n% Use custom medical treatment plan style\n\\usepackage{medical_treatment_plan}\n\\usepackage{natbib}\n\n\\begin{document}\n\
      \\maketitle\n% Your content here\n\\end{document}\n```\n\n2. **Ensure style file is in same directory** as your `.tex`\
      \ file, or install to LaTeX path\n\n3. **Compile with XeLaTeX** (recommended for best results):\n\n```bash\nxelatex\
      \ treatment_plan.tex\nbibtex treatment_plan\nxelatex treatment_plan.tex\nxelatex treatment_plan.tex\n```\n\n#### Custom\
      \ Title Page\n\nThe package automatically formats the title with a professional blue header:\n\n```latex\n\\title{\\\
      textbf{Individualized Diabetes Treatment Plan}\\\\\n\\large{23-Year-Old Male Patient with Type 2 Diabetes}}\n\\author{Comprehensive\
      \ Care Plan}\n\\date{\\today}\n\n\\begin{document}\n\\maketitle\n```\n\nThis creates an eye-catching blue box with white\
      \ text and clear hierarchy.\n\n### Compilation Requirements\n\n**Required LaTeX Packages** (automatically loaded by\
      \ the style):\n- `geometry` - Page layout and margins\n- `xcolor` - Color support\n- `tcolorbox` with `[most]` library\
      \ - Custom colored boxes\n- `tikz` - Graphics and drawing\n- `fontspec` - Font management (XeLaTeX/LuaLaTeX)\n- `fancyhdr`\
      \ - Custom headers and footers\n- `titlesec` - Section styling\n- `enumitem` - Enhanced list formatting\n- `booktabs`\
      \ - Professional table rules\n- `longtable` - Multi-page tables\n- `array` - Enhanced table features\n- `colortbl` -\
      \ Colored table cells\n- `hyperref` - Hyperlinks and PDF metadata\n- `natbib` - Bibliography management\n\n**Recommended\
      \ Compilation:**\n\n```bash\n# Using XeLaTeX (best font support)\nxelatex document.tex\nbibtex document\nxelatex document.tex\n\
      xelatex document.tex\n\n# Using PDFLaTeX (alternative)\npdflatex document.tex\nbibtex document\npdflatex document.tex\n\
      pdflatex document.tex\n```\n\n### Customization Options\n\n#### Changing Colors\n\nEdit the style file to modify the\
      \ color scheme:\n\n```latex\n% In medical_treatment_plan.sty\n\\definecolor{primaryblue}{RGB}{0, 102, 153}      % Modify\
      \ these\n\\definecolor{secondaryblue}{RGB}{102, 178, 204}\n\\definecolor{accentblue}{RGB}{0, 153, 204}\n\\definecolor{successgreen}{RGB}{0,\
      \ 153, 76}\n\\definecolor{warningred}{RGB}{204, 0, 0}\n```\n\n#### Adjusting Page Layout\n\nModify geometry settings\
      \ in the style file:\n\n```latex\n\\RequirePackage[margin=1in, top=1.2in, bottom=1.2in]{geometry}\n```\n\n#### Custom\
      \ Fonts (XeLaTeX only)\n\nUncomment and modify in the style file:\n\n```latex\n\\setmainfont{Your Preferred Font}\n\\\
      setsansfont{Your Sans-Serif Font}\n```\n\n#### Header/Footer Customization\n\nModify in the style file:\n\n```latex\n\
      \\fancyhead[L]{\\color{primaryblue}\\sffamily\\small\\textbf{Treatment Plan Title}}\n\\fancyhead[R]{\\color{darkgray}\\\
      sffamily\\small Patient Info}\n```\n\n### Style Package Download and Installation\n\n#### Option 1: Copy to Project\
      \ Directory\n\nCopy `assets/medical_treatment_plan.sty` to the same directory as your `.tex` file.\n\n#### Option 2:\
      \ Install to User TeX Directory\n\n```bash\n# Find your local texmf directory\nkpsewhich -var-value TEXMFHOME\n\n# Copy\
      \ to appropriate location (usually ~/texmf/tex/latex/)\nmkdir -p ~/texmf/tex/latex/medical_treatment_plan\ncp assets/medical_treatment_plan.sty\
      \ ~/texmf/tex/latex/medical_treatment_plan/\n\n# Update TeX file database\ntexhash ~/texmf\n```\n\n#### Option 3: System-Wide\
      \ Installation\n\n```bash\n# Copy to system texmf directory (requires sudo)\nsudo cp assets/medical_treatment_plan.sty\
      \ /usr/local/texlive/texmf-local/tex/latex/\nsudo texhash\n```\n\n### Additional Professional Styles (Optional)\n\n\
      Other medical/clinical document styles available from CTAN:\n\n**Journal Styles:**\n```bash\n# Install via TeX Live\
      \ Manager\ntlmgr install nejm        # New England Journal of Medicine\ntlmgr install jama        # JAMA style\ntlmgr\
      \ install bmj         # British Medical Journal\n```\n\n**General Professional Styles:**\n```bash\ntlmgr install apa7\
      \        # APA 7th edition (health sciences)\ntlmgr install IEEEtran    # IEEE (medical devices/engineering)\ntlmgr\
      \ install springer    # Springer journals\n```\n\n**Download from CTAN:**\n- Visit: https://ctan.org/\n- Search for\
      \ medical document classes\n- Download and install per package instructions\n\n### Troubleshooting\n\n**Issue: Package\
      \ not found**\n```bash\n# Install missing packages via TeX Live Manager\nsudo tlmgr update --self\nsudo tlmgr install\
      \ tcolorbox tikz pgf\n```\n\n**Issue: Missing characters (✓, ≥, etc.)**\n- Use XeLaTeX instead of PDFLaTeX\n- Or replace\
      \ with LaTeX commands: `$\\checkmark$`, `$\\geq$`\n- Requires `amssymb` package for math symbols\n\n**Issue: Header\
      \ height warnings**\n- Style file sets `\\setlength{\\headheight}{22pt}`\n- Adjust if needed for your content\n\n**Issue:\
      \ Boxes not rendering**\n```bash\n# Ensure complete tcolorbox installation\nsudo tlmgr install tcolorbox tikz pgf\n\
      ```\n\n**Issue: Font not found (XeLaTeX)**\n- Comment out custom font lines in .sty file\n- Or install specified fonts\
      \ on your system\n\n### Best Practices for Styled Documents\n\n1. **Appropriate Box Usage**\n   - Match box type to\
      \ content purpose (goals→green, warnings→yellow/red)\n   - Don't overuse boxes; reserve for truly important information\n\
      \   - Keep box content concise and focused\n\n2. **Visual Hierarchy**\n   - Use section styling for structure\n   -\
      \ Boxes for emphasis and organization\n   - Tables for comparative data\n   - Lists for sequential or grouped items\n\
      \n3. **Color Consistency**\n   - Stick to defined color scheme\n   - Use `\\textcolor{primaryblue}{\\textbf{Text}}`\
      \ for emphasis\n   - Maintain consistent meaning (red=warning, green=goals)\n\n4. **White Space**\n   - Don't overcrowd\
      \ pages with boxes\n   - Use `\\vspace{0.5cm}` between major sections\n   - Allow breathing room around colored elements\n\
      \n5. **Professional Appearance**\n   - Maintain readability as top priority\n   - Ensure sufficient contrast for accessibility\n\
      \   - Test print output in grayscale\n   - Keep styling consistent throughout document\n\n6. **Table Formatting**\n\
      \   - Use `\\tableheadercolor` for all header rows\n   - Apply `\\tablerowcolor` to alternating rows in tables >3 rows\n\
      \   - Keep column widths balanced\n   - Use `\\small\\sffamily` for large tables\n\n### Example: Styled Treatment Plan\
      \ Structure\n\n```latex\n% !TEX program = xelatex\n\\documentclass[11pt,letterpaper]{article}\n\\usepackage{medical_treatment_plan}\n\
      \\usepackage{natbib}\n\n\\title{\\textbf{Comprehensive Treatment Plan}\\\\\n\\large{Patient-Centered Care Strategy}}\n\
      \\author{Multidisciplinary Care Team}\n\\date{\\today}\n\n\\begin{document}\n\\maketitle\n\n\\section*{Patient Information}\n\
      \\begin{patientinfo}\n  % Demographics table\n\\end{patientinfo}\n\n\\section{Executive Summary}\n\\begin{keybox}[Plan\
      \ Overview]\n  % Key highlights\n\\end{keybox}\n\n\\section{Treatment Goals}\n\\begin{goalbox}[SMART Goals - 3 Months]\n\
      \  \\begin{medtable}{Primary Treatment Targets}\n    % Goals table with colored headers\n  \\end{medtable}\n\\end{goalbox}\n\
      \n\\section{Medication Plan}\n\\begin{infobox}[Titration Schedule]\n  % Medication instructions\n\\end{infobox}\n\n\\\
      begin{warningbox}[Critical Decision Point]\n  % Important safety information\n\\end{warningbox}\n\n\\section{Emergency\
      \ Protocols}\n\\begin{emergencybox}\n  % Emergency contacts\n\\end{emergencybox}\n\n\\bibliographystyle{plainnat}\n\\\
      bibliography{references}\n\\end{document}\n```\n\n### Benefits of Professional Styling\n\n**Clinical Practice:**\n-\
      \ Faster information scanning during patient encounters\n- Clear visual hierarchy for critical vs. routine information\n\
      - Professional appearance suitable for patient-facing documents\n- Color-coded sections reduce cognitive load\n\n**Educational\
      \ Use:**\n- Enhanced readability for teaching materials\n- Visual differentiation of concept types (goals, warnings,\
      \ procedures)\n- Professional presentation for case discussions\n- Print and digital-ready formats\n\n**Documentation\
      \ Quality:**\n- Modern, polished appearance\n- Maintains clinical accuracy while improving aesthetics\n- Standardized\
      \ formatting across treatment plans\n- Easy to customize for institutional branding\n\n**Patient Engagement:**\n- More\
      \ approachable than dense text documents\n- Color coding helps patients identify key sections\n- Professional appearance\
      \ builds trust\n- Clear organization facilitates understanding\n\n## Ethical Considerations\n\n### Informed Consent\n\
      All treatment plans should involve patient understanding and voluntary agreement to proposed interventions.\n\n### Cultural\
      \ Sensitivity\nTreatment plans must respect diverse cultural beliefs, health practices, and communication styles.\n\n\
      ### Health Equity\nConsider social determinants of health, access barriers, and health disparities when developing plans.\n\
      \n### Privacy Protection\nMaintain strict HIPAA compliance; de-identify all protected health information in shared documents.\n\
      \n### Autonomy and Beneficence\nBalance medical recommendations with patient autonomy and values while promoting patient\
      \ welfare.\n\n## License\n\nPart of the Claude Scientific Writer project. See main LICENSE file."
