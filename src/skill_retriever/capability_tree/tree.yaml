      skill_path: data/skill_seeds/api-integration-specialist/SKILL.md
      content: "# API Integration Specialist\n\nExpert guidance for integrating external APIs into applications with production-ready\
        \ patterns, security best practices, and comprehensive error handling.\n\n## When to Use This Skill\n\nUse this skill\
        \ when:\n- Integrating third-party APIs (Stripe, Twilio, SendGrid, etc.)\n- Building API client libraries or wrappers\n\
        - Implementing OAuth 2.0, API keys, or JWT authentication\n- Setting up webhooks and event-driven integrations\n-\
        \ Handling rate limits, retries, and circuit breakers\n- Transforming API responses for application use\n- Debugging\
        \ API integration issues\n\n## Core Integration Principles\n\n### 1. Authentication & Security\n\n**API Key Management:**\n\
        ```javascript\n// Store keys in environment variables, never in code\nconst apiClient = new APIClient({\n  apiKey:\
        \ process.env.SERVICE_API_KEY,\n  baseURL: process.env.SERVICE_BASE_URL\n});\n```\n\n**OAuth 2.0 Flow:**\n```javascript\n\
        // Authorization Code Flow\nconst oauth = new OAuth2Client({\n  clientId: process.env.CLIENT_ID,\n  clientSecret:\
        \ process.env.CLIENT_SECRET,\n  redirectUri: process.env.REDIRECT_URI,\n  scopes: ['read:users', 'write:data']\n});\n\
        \n// Get authorization URL\nconst authUrl = oauth.getAuthorizationUrl();\n\n// Exchange code for tokens\nconst tokens\
        \ = await oauth.exchangeCode(code);\n```\n\n### 2. Request/Response Handling\n\n**Standardized Request Structure:**\n\
        ```javascript\nasync function makeRequest(endpoint, options = {}) {\n  const defaultHeaders = {\n    'Content-Type':\
        \ 'application/json',\n    'Authorization': `Bearer ${apiKey}`,\n    'User-Agent': 'MyApp/1.0.0'\n  };\n\n  const\
        \ response = await fetch(`${baseURL}${endpoint}`, {\n    ...options,\n    headers: { ...defaultHeaders, ...options.headers\
        \ }\n  });\n\n  if (!response.ok) {\n    throw new APIError(response.status, await response.json());\n  }\n\n  return\
        \ response.json();\n}\n```\n\n**Response Transformation:**\n```javascript\nclass APIClient {\n  async getUser(userId)\
        \ {\n    const raw = await this.request(`/users/${userId}`);\n\n    // Transform external API format to internal model\n\
        \    return {\n      id: raw.user_id,\n      email: raw.email_address,\n      name: `${raw.first_name} ${raw.last_name}`,\n\
        \      createdAt: new Date(raw.created_timestamp)\n    };\n  }\n}\n```\n\n### 3. Error Handling\n\n**Structured Error\
        \ Types:**\n```javascript\nclass APIError extends Error {\n  constructor(status, body) {\n    super(`API Error: ${status}`);\n\
        \    this.status = status;\n    this.body = body;\n    this.isAPIError = true;\n  }\n\n  isRateLimited() {\n    return\
        \ this.status === 429;\n  }\n\n  isUnauthorized() {\n    return this.status === 401;\n  }\n\n  isServerError() {\n\
        \    return this.status >= 500;\n  }\n}\n```\n\n**Retry Logic with Exponential Backoff:**\n```javascript\nasync function\
        \ retryWithBackoff(fn, maxRetries = 3) {\n  for (let i = 0; i < maxRetries; i++) {\n    try {\n      return await\
        \ fn();\n    } catch (error) {\n      if (!error.isAPIError || !error.isServerError()) {\n        throw error; //\
        \ Don't retry client errors\n      }\n\n      if (i === maxRetries - 1) throw error;\n\n      const delay = Math.pow(2,\
        \ i) * 1000; // 1s, 2s, 4s\n      await sleep(delay);\n    }\n  }\n}\n```\n\n### 4. Rate Limiting\n\n**Client-Side\
        \ Rate Limiter:**\n```javascript\nclass RateLimiter {\n  constructor(maxRequests, windowMs) {\n    this.maxRequests\
        \ = maxRequests;\n    this.windowMs = windowMs;\n    this.requests = [];\n  }\n\n  async acquire() {\n    const now\
        \ = Date.now();\n    this.requests = this.requests.filter(t => now - t < this.windowMs);\n\n    if (this.requests.length\
        \ >= this.maxRequests) {\n      const oldestRequest = this.requests[0];\n      const waitTime = this.windowMs - (now\
        \ - oldestRequest);\n      await sleep(waitTime);\n      return this.acquire();\n    }\n\n    this.requests.push(now);\n\
        \  }\n}\n\nconst limiter = new RateLimiter(100, 60000); // 100 requests per minute\n\nasync function rateLimitedRequest(endpoint,\
        \ options) {\n  await limiter.acquire();\n  return makeRequest(endpoint, options);\n}\n```\n\n### 5. Webhook Handling\n\
        \n**Webhook Verification:**\n```javascript\nfunction verifyWebhookSignature(payload, signature, secret) {\n  const\
        \ expectedSignature = crypto\n    .createHmac('sha256', secret)\n    .update(payload)\n    .digest('hex');\n\n  return\
        \ crypto.timingSafeEqual(\n    Buffer.from(signature),\n    Buffer.from(expectedSignature)\n  );\n}\n\napp.post('/webhooks/stripe',\
        \ express.raw({ type: 'application/json' }), (req, res) => {\n  const signature = req.headers['stripe-signature'];\n\
        \n  if (!verifyWebhookSignature(req.body, signature, process.env.STRIPE_WEBHOOK_SECRET)) {\n    return res.status(401).send('Invalid\
        \ signature');\n  }\n\n  const event = JSON.parse(req.body);\n  handleWebhookEvent(event);\n\n  res.status(200).send('Received');\n\
        });\n```\n\n## Integration Patterns\n\n### REST API Client Pattern\n\n```javascript\nclass ServiceAPIClient {\n  constructor(config)\
        \ {\n    this.apiKey = config.apiKey;\n    this.baseURL = config.baseURL;\n    this.timeout = config.timeout || 30000;\n\
        \  }\n\n  async request(method, endpoint, data = null) {\n    const options = {\n      method,\n      headers: {\n\
        \        'Authorization': `Bearer ${this.apiKey}`,\n        'Content-Type': 'application/json'\n      },\n      timeout:\
        \ this.timeout\n    };\n\n    if (data) {\n      options.body = JSON.stringify(data);\n    }\n\n    const response\
        \ = await retryWithBackoff(() =>\n      fetch(`${this.baseURL}${endpoint}`, options)\n    );\n\n    return response.json();\n\
        \  }\n\n  // Resource methods\n  async getResource(id) {\n    return this.request('GET', `/resources/${id}`);\n  }\n\
        \n  async createResource(data) {\n    return this.request('POST', '/resources', data);\n  }\n\n  async updateResource(id,\
        \ data) {\n    return this.request('PUT', `/resources/${id}`, data);\n  }\n\n  async deleteResource(id) {\n    return\
        \ this.request('DELETE', `/resources/${id}`);\n  }\n}\n```\n\n### Pagination Handling\n\n```javascript\nasync function*\
        \ fetchAllPages(endpoint, pageSize = 100) {\n  let cursor = null;\n\n  do {\n    const params = new URLSearchParams({\n\
        \      limit: pageSize,\n      ...(cursor && { cursor })\n    });\n\n    const response = await apiClient.request('GET',\
        \ `${endpoint}?${params}`);\n\n    yield response.data;\n\n    cursor = response.pagination?.next_cursor;\n  } while\
        \ (cursor);\n}\n\n// Usage\nfor await (const page of fetchAllPages('/users')) {\n  processUsers(page);\n}\n```\n\n\
        ## Best Practices\n\n### Security\n- Store API keys in environment variables or secrets management\n- Use HTTPS for\
        \ all API calls\n- Verify webhook signatures\n- Implement request signing for sensitive operations\n- Rotate API keys\
        \ regularly\n\n### Reliability\n- Implement exponential backoff retry logic\n- Handle rate limits gracefully\n- Set\
        \ appropriate timeouts\n- Use circuit breakers for failing services\n- Log all API interactions for debugging\n\n\
        ### Performance\n- Cache responses when appropriate\n- Batch requests when the API supports it\n- Use streaming for\
        \ large responses\n- Implement connection pooling\n- Monitor API usage and costs\n\n### Monitoring\n- Track API response\
        \ times\n- Alert on error rate increases\n- Monitor rate limit consumption\n- Log failed requests with context\n-\
        \ Set up health checks for critical integrations\n\n## Common Integration Examples\n\n### Stripe Payment Processing\n\
        ```javascript\nconst stripe = require('stripe')(process.env.STRIPE_SECRET_KEY);\n\nasync function createPaymentIntent(amount,\
        \ currency = 'usd') {\n  return await stripe.paymentIntents.create({\n    amount,\n    currency,\n    automatic_payment_methods:\
        \ { enabled: true }\n  });\n}\n```\n\n### SendGrid Email Sending\n```javascript\nconst sgMail = require('@sendgrid/mail');\n\
        sgMail.setApiKey(process.env.SENDGRID_API_KEY);\n\nasync function sendEmail(to, subject, html) {\n  await sgMail.send({\n\
        \    to,\n    from: process.env.FROM_EMAIL,\n    subject,\n    html\n  });\n}\n```\n\n### Twilio SMS\n```javascript\n\
        const twilio = require('twilio')(\n  process.env.TWILIO_ACCOUNT_SID,\n  process.env.TWILIO_AUTH_TOKEN\n);\n\nasync\
        \ function sendSMS(to, body) {\n  await twilio.messages.create({\n    to,\n    from: process.env.TWILIO_PHONE_NUMBER,\n\
        \    body\n  });\n}\n```\n\n## Troubleshooting\n\n### Authentication Issues\n- Verify API keys are correctly set\n\
        - Check token expiration\n- Ensure proper OAuth scopes\n- Validate signature generation\n\n### Rate Limiting\n- Implement\
        \ client-side rate limiting\n- Use batch endpoints when available\n- Spread requests over time\n- Consider upgrading\
        \ API tier\n\n### Timeout Errors\n- Increase timeout values for slow endpoints\n- Implement request cancellation\n\
        - Use streaming for large payloads\n- Check network connectivity\n\nWhen integrating APIs, prioritize security, reliability,\
        \ and maintainability. Always test error scenarios and edge cases before production deployment."
