  - id: employment-contract-templates
    name: employment-contract-templates
    description: Create employment contracts, offer letters, and HR policy documents following legal best practices. Use when
      drafting employment agreements, creating HR policies, or standardizing employment documentation.
    skill_path: data/skill_seeds/employment-contract-templates/SKILL.md
    content: "# Employment Contract Templates\n\nTemplates and patterns for creating legally sound employment documentation\
      \ including contracts, offer letters, and HR policies.\n\n## When to Use This Skill\n\n- Drafting employment contracts\n\
      - Creating offer letters\n- Writing employee handbooks\n- Developing HR policies\n- Standardizing employment documentation\n\
      - Onboarding documentation\n\n## Core Concepts\n\n### 1. Employment Document Types\n\n| Document | Purpose | When Used\
      \ |\n|----------|---------|-----------|\n| **Offer Letter** | Initial job offer | Pre-hire |\n| **Employment Contract**\
      \ | Formal agreement | Hire |\n| **Employee Handbook** | Policies & procedures | Onboarding |\n| **NDA** | Confidentiality\
      \ | Before access |\n| **Non-Compete** | Competition restriction | Hire/Exit |\n\n### 2. Key Legal Considerations\n\n\
      ```\nEmployment Relationship:\n├── At-Will vs. Contract\n├── Employee vs. Contractor\n├── Full-Time vs. Part-Time\n\
      ├── Exempt vs. Non-Exempt\n└── Jurisdiction-Specific Requirements\n```\n\n**DISCLAIMER: These templates are for informational\
      \ purposes only and do not constitute legal advice. Consult with qualified legal counsel before using any employment\
      \ documents.**\n\n## Templates\n\n### Template 1: Offer Letter\n\n```markdown\n# EMPLOYMENT OFFER LETTER\n\n[Company\
      \ Letterhead]\n\nDate: [DATE]\n\n[Candidate Name]\n[Address]\n[City, State ZIP]\n\nDear [Candidate Name],\n\nWe are\
      \ pleased to extend an offer of employment for the position of [JOB TITLE]\nat [COMPANY NAME]. We believe your skills\
      \ and experience will be valuable\nadditions to our team.\n\n## Position Details\n\n**Title:** [Job Title]\n**Department:**\
      \ [Department]\n**Reports To:** [Manager Name/Title]\n**Location:** [Office Location / Remote]\n**Start Date:** [Proposed\
      \ Start Date]\n**Employment Type:** [Full-Time/Part-Time], [Exempt/Non-Exempt]\n\n## Compensation\n\n**Base Salary:**\
      \ $[AMOUNT] per [year/hour], paid [bi-weekly/semi-monthly/monthly]\n**Bonus:** [Eligible for annual bonus of up to X%\
      \ based on company and individual\nperformance / Not applicable]\n**Equity:** [X shares of stock options vesting over\
      \ 4 years with 1-year cliff /\nNot applicable]\n\n## Benefits\n\nYou will be eligible for our standard benefits package,\
      \ including:\n- Health insurance (medical, dental, vision) effective [date]\n- 401(k) with [X]% company match\n- [X]\
      \ days paid time off per year\n- [X] paid holidays\n- [Other benefits]\n\nFull details will be provided during onboarding.\n\
      \n## Contingencies\n\nThis offer is contingent upon:\n- Successful completion of background check\n- Verification of\
      \ your right to work in [Country]\n- Execution of required employment documents including:\n  - Confidentiality Agreement\n\
      \  - [Non-Compete Agreement, if applicable]\n  - [IP Assignment Agreement]\n\n## At-Will Employment\n\nPlease note that\
      \ employment with [Company Name] is at-will. This means that\neither you or the Company may terminate the employment\
      \ relationship at any time,\nwith or without cause or notice. This offer letter does not constitute a\ncontract of employment\
      \ for any specific period.\n\n## Acceptance\n\nTo accept this offer, please sign below and return by [DEADLINE DATE].\
      \ This\noffer will expire if not accepted by that date.\n\nWe are excited about the possibility of you joining our team.\
      \ If you have any\nquestions, please contact [HR Contact] at [email/phone].\n\nSincerely,\n\n_________________________\n\
      [Hiring Manager Name]\n[Title]\n[Company Name]\n\n---\n\n## ACCEPTANCE\n\nI accept this offer of employment and agree\
      \ to the terms stated above.\n\nSignature: _________________________\n\nPrinted Name: _________________________\n\n\
      Date: _________________________\n\nAnticipated Start Date: _________________________\n```\n\n### Template 2: Employment\
      \ Agreement (Contract Position)\n\n```markdown\n# EMPLOYMENT AGREEMENT\n\nThis Employment Agreement (\"Agreement\")\
      \ is entered into as of [DATE]\n(\"Effective Date\") by and between:\n\n**Employer:** [COMPANY LEGAL NAME], a [State]\
      \ [corporation/LLC]\nwith principal offices at [Address] (\"Company\")\n\n**Employee:** [EMPLOYEE NAME], an individual\
      \ residing at [Address] (\"Employee\")\n\n## 1. EMPLOYMENT\n\n1.1 **Position.** The Company agrees to employ Employee\
      \ as [JOB TITLE],\nreporting to [Manager Title]. Employee accepts such employment subject to\nthe terms of this Agreement.\n\
      \n1.2 **Duties.** Employee shall perform duties consistent with their position,\nincluding but not limited to:\n- [Primary\
      \ duty 1]\n- [Primary duty 2]\n- [Primary duty 3]\n- Other duties as reasonably assigned\n\n1.3 **Best Efforts.** Employee\
      \ agrees to devote their full business time,\nattention, and best efforts to the Company's business during employment.\n\
      \n1.4 **Location.** Employee's primary work location shall be [Location/Remote].\n[Travel requirements, if any.]\n\n\
      ## 2. TERM\n\n2.1 **Employment Period.** This Agreement shall commence on [START DATE] and\ncontinue until terminated\
      \ as provided herein.\n\n2.2 **At-Will Employment.** [FOR AT-WILL STATES] Notwithstanding anything\nherein, employment\
      \ is at-will and may be terminated by either party at any\ntime, with or without cause or notice.\n\n[OR FOR FIXED TERM:]\n\
      2.2 **Fixed Term.** This Agreement is for a fixed term of [X] months/years,\nending on [END DATE], unless terminated\
      \ earlier as provided herein or extended\nby mutual written agreement.\n\n## 3. COMPENSATION\n\n3.1 **Base Salary.**\
      \ Employee shall receive a base salary of $[AMOUNT] per year,\npayable in accordance with the Company's standard payroll\
      \ practices, subject to\napplicable withholdings.\n\n3.2 **Bonus.** Employee may be eligible for an annual discretionary\
      \ bonus of up\nto [X]% of base salary, based on [criteria]. Bonus payments are at Company's\nsole discretion and require\
      \ active employment at payment date.\n\n3.3 **Equity.** [If applicable] Subject to Board approval and the Company's\n\
      equity incentive plan, Employee shall be granted [X shares/options] under the\nterms of a separate Stock Option Agreement.\n\
      \n3.4 **Benefits.** Employee shall be entitled to participate in benefit plans\noffered to similarly situated employees,\
      \ subject to plan terms and eligibility\nrequirements.\n\n3.5 **Expenses.** Company shall reimburse Employee for reasonable\
      \ business\nexpenses incurred in accordance with Company policy.\n\n## 4. CONFIDENTIALITY\n\n4.1 **Confidential Information.**\
      \ Employee acknowledges access to confidential\nand proprietary information including: trade secrets, business plans,\
      \ customer\nlists, financial data, technical information, and other non-public information\n(\"Confidential Information\"\
      ).\n\n4.2 **Non-Disclosure.** During and after employment, Employee shall not\ndisclose, use, or permit use of any Confidential\
      \ Information except as required\nfor their duties or with prior written consent.\n\n4.3 **Return of Materials.** Upon\
      \ termination, Employee shall immediately return\nall Company property and Confidential Information in any form.\n\n\
      4.4 **Survival.** Confidentiality obligations survive termination indefinitely\nfor trade secrets and for [3] years\
      \ for other Confidential Information.\n\n## 5. INTELLECTUAL PROPERTY\n\n5.1 **Work Product.** All inventions, discoveries,\
      \ works, and developments\ncreated by Employee during employment, relating to Company's business, or using\nCompany\
      \ resources (\"Work Product\") shall be Company's sole property.\n\n5.2 **Assignment.** Employee hereby assigns to Company\
      \ all rights in Work\nProduct, including all intellectual property rights.\n\n5.3 **Assistance.** Employee agrees to\
      \ execute documents and take actions\nnecessary to perfect Company's rights in Work Product.\n\n5.4 **Prior Inventions.**\
      \ Attached as Exhibit A is a list of any prior\ninventions that Employee wishes to exclude from this Agreement.\n\n\
      ## 6. NON-COMPETITION AND NON-SOLICITATION\n\n[NOTE: Enforceability varies by jurisdiction. Consult local counsel.]\n\
      \n6.1 **Non-Competition.** During employment and for [12] months after\ntermination, Employee shall not, directly or\
      \ indirectly, engage in any business\ncompetitive with Company's business within [Geographic Area].\n\n6.2 **Non-Solicitation\
      \ of Customers.** During employment and for [12] months\nafter termination, Employee shall not solicit any customer\
      \ of the Company for\ncompeting products or services.\n\n6.3 **Non-Solicitation of Employees.** During employment and\
      \ for [12] months\nafter termination, Employee shall not recruit or solicit any Company employee\nto leave Company employment.\n\
      \n## 7. TERMINATION\n\n7.1 **By Company for Cause.** Company may terminate immediately for Cause,\ndefined as:\n(a)\
      \ Material breach of this Agreement\n(b) Conviction of a felony\n(c) Fraud, dishonesty, or gross misconduct\n(d) Failure\
      \ to perform duties after written notice and cure period\n\n7.2 **By Company Without Cause.** Company may terminate\
      \ without Cause upon\n[30] days written notice.\n\n7.3 **By Employee.** Employee may terminate upon [30] days written\
      \ notice.\n\n7.4 **Severance.** [If applicable] Upon termination without Cause, Employee\nshall receive [X] weeks base\
      \ salary as severance, contingent upon execution\nof a release agreement.\n\n7.5 **Effect of Termination.** Upon termination:\n\
      - All compensation earned through termination date shall be paid\n- Unvested equity shall be forfeited\n- Benefits terminate\
      \ per plan terms\n- Sections 4, 5, 6, 8, and 9 survive termination\n\n## 8. GENERAL PROVISIONS\n\n8.1 **Entire Agreement.**\
      \ This Agreement constitutes the entire agreement and\nsupersedes all prior negotiations, representations, and agreements.\n\
      \n8.2 **Amendments.** This Agreement may be amended only by written agreement\nsigned by both parties.\n\n8.3 **Governing\
      \ Law.** This Agreement shall be governed by the laws of [State],\nwithout regard to conflicts of law principles.\n\n\
      8.4 **Dispute Resolution.** [Arbitration clause or jurisdiction selection]\n\n8.5 **Severability.** If any provision\
      \ is unenforceable, it shall be modified\nto the minimum extent necessary, and remaining provisions shall remain in\
      \ effect.\n\n8.6 **Notices.** Notices shall be in writing and delivered to addresses above.\n\n8.7 **Assignment.** Employee\
      \ may not assign this Agreement. Company may assign\nto a successor.\n\n8.8 **Waiver.** Failure to enforce any provision\
      \ shall not constitute waiver.\n\n## 9. ACKNOWLEDGMENTS\n\nEmployee acknowledges:\n- Having read and understood this\
      \ Agreement\n- Having opportunity to consult with counsel\n- Agreeing to all terms voluntarily\n\n---\n\nIN WITNESS\
      \ WHEREOF, the parties have executed this Agreement as of the\nEffective Date.\n\n**[COMPANY NAME]**\n\nBy: _________________________\n\
      Name: [Authorized Signatory]\nTitle: [Title]\nDate: _________________________\n\n**EMPLOYEE**\n\nSignature: _________________________\n\
      Name: [Employee Name]\nDate: _________________________\n\n---\n\n## EXHIBIT A: PRIOR INVENTIONS\n\n[Employee to list\
      \ any prior inventions, if any, or write \"None\"]\n\n_________________________\n```\n\n### Template 3: Employee Handbook\
      \ Policy Section\n\n```markdown\n# EMPLOYEE HANDBOOK - POLICY SECTION\n\n## EMPLOYMENT POLICIES\n\n### Equal Employment\
      \ Opportunity\n\n[Company Name] is an equal opportunity employer. We do not discriminate based on\nrace, color, religion,\
      \ sex, sexual orientation, gender identity, national\norigin, age, disability, veteran status, or any other protected\
      \ characteristic.\n\nThis policy applies to all employment practices including:\n- Recruitment and hiring\n- Compensation\
      \ and benefits\n- Training and development\n- Promotions and transfers\n- Termination\n\n### Anti-Harassment Policy\n\
      \n[Company Name] is committed to providing a workplace free from harassment.\nHarassment based on any protected characteristic\
      \ is strictly prohibited.\n\n**Prohibited Conduct Includes:**\n- Unwelcome sexual advances or requests for sexual favors\n\
      - Offensive comments, jokes, or slurs\n- Physical conduct such as assault or unwanted touching\n- Visual conduct such\
      \ as displaying offensive images\n- Threatening, intimidating, or hostile acts\n\n**Reporting Procedure:**\n1. Report\
      \ to your manager, HR, or any member of leadership\n2. Reports may be made verbally or in writing\n3. Anonymous reports\
      \ are accepted via [hotline/email]\n\n**Investigation:**\nAll reports will be promptly investigated. Retaliation against\
      \ anyone who\nreports harassment is strictly prohibited and will result in disciplinary\naction up to termination.\n\
      \n### Work Hours and Attendance\n\n**Standard Hours:** [8:00 AM - 5:00 PM, Monday through Friday]\n**Core Hours:** [10:00\
      \ AM - 3:00 PM] - Employees expected to be available\n**Flexible Work:** [Policy on remote work, flexible scheduling]\n\
      \n**Attendance Expectations:**\n- Notify your manager as soon as possible if you will be absent\n- Excessive unexcused\
      \ absences may result in disciplinary action\n- [X] unexcused absences in [Y] days considered excessive\n\n### Paid\
      \ Time Off (PTO)\n\n**PTO Accrual:**\n| Years of Service | Annual PTO Days |\n|------------------|-----------------|\n\
      | 0-2 years        | 15 days         |\n| 3-5 years        | 20 days         |\n| 6+ years         | 25 days       \
      \  |\n\n**PTO Guidelines:**\n- PTO accrues per pay period\n- Maximum accrual: [X] days (use it or lose it after)\n-\
      \ Request PTO at least [2] weeks in advance\n- Manager approval required\n- PTO may not be taken during [blackout periods]\n\
      \n### Sick Leave\n\n- [X] days sick leave per year\n- May be used for personal illness or family member care\n- Doctor's\
      \ note required for absences exceeding [3] days\n\n### Holidays\n\nThe following paid holidays are observed:\n- New\
      \ Year's Day\n- Martin Luther King Jr. Day\n- Presidents Day\n- Memorial Day\n- Independence Day\n- Labor Day\n- Thanksgiving\
      \ Day\n- Day after Thanksgiving\n- Christmas Day\n- [Floating holiday]\n\n### Code of Conduct\n\nAll employees are expected\
      \ to:\n- Act with integrity and honesty\n- Treat colleagues, customers, and partners with respect\n- Protect company\
      \ confidential information\n- Avoid conflicts of interest\n- Comply with all laws and regulations\n- Report any violations\
      \ of this code\n\n**Violations may result in disciplinary action up to and including termination.**\n\n### Technology\
      \ and Communication\n\n**Acceptable Use:**\n- Company technology is for business purposes\n- Limited personal use is\
      \ permitted if it doesn't interfere with work\n- No illegal activities or viewing inappropriate content\n\n**Monitoring:**\n\
      - Company reserves the right to monitor company systems\n- Employees should have no expectation of privacy on company\
      \ devices\n\n**Security:**\n- Use strong passwords and enable 2FA\n- Report security incidents immediately\n- Lock devices\
      \ when unattended\n\n### Social Media Policy\n\n**Personal Social Media:**\n- Clearly state opinions are your own, not\
      \ the company's\n- Do not share confidential company information\n- Be respectful and professional\n\n**Company Social\
      \ Media:**\n- Only authorized personnel may post on behalf of the company\n- Follow brand guidelines\n- Escalate negative\
      \ comments to [Marketing/PR]\n\n---\n\n## ACKNOWLEDGMENT\n\nI acknowledge that I have received a copy of the Employee\
      \ Handbook and\nunderstand that:\n\n1. I am responsible for reading and understanding its contents\n2. The handbook\
      \ does not create a contract of employment\n3. Policies may be changed at any time at the company's discretion\n4. Employment\
      \ is at-will [if applicable]\n\nI agree to abide by the policies and procedures outlined in this handbook.\n\nEmployee\
      \ Signature: _________________________\n\nEmployee Name (Print): _________________________\n\nDate: _________________________\n\
      ```\n\n## Best Practices\n\n### Do's\n- **Consult legal counsel** - Employment law varies by jurisdiction\n- **Keep\
      \ copies signed** - Document all agreements\n- **Update regularly** - Laws and policies change\n- **Be clear and specific**\
      \ - Avoid ambiguity\n- **Train managers** - On policies and procedures\n\n### Don'ts\n- **Don't use generic templates**\
      \ - Customize for your jurisdiction\n- **Don't make promises** - That could create implied contracts\n- **Don't discriminate**\
      \ - In language or application\n- **Don't forget at-will language** - Where applicable\n- **Don't skip review** - Have\
      \ legal counsel review all documents\n\n## Resources\n\n- [SHRM Employment Templates](https://www.shrm.org/)\n- [Department\
      \ of Labor](https://www.dol.gov/)\n- [EEOC Guidance](https://www.eeoc.gov/)\n- State-specific labor departments"
