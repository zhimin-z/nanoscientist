    - id: generate-image
      name: generate-image
      description: Generate or edit images using AI models (FLUX, Gemini). Use for general-purpose image generation including
        photos, illustrations, artwork, visual assets, concept art, and any image that isn't a technical diagram or schematic.
        For flowcharts, circuits, pathways, and technical diagrams, use the scientific-schematics skill instead.
      skill_path: data/skill_seeds/generate-image/SKILL.md
      content: "# Generate Image\n\nGenerate and edit high-quality images using OpenRouter's image generation models including\
        \ FLUX.2 Pro and Gemini 3 Pro.\n\n## When to Use This Skill\n\n**Use generate-image for:**\n- Photos and photorealistic\
        \ images\n- Artistic illustrations and artwork\n- Concept art and visual concepts\n- Visual assets for presentations\
        \ or documents\n- Image editing and modifications\n- Any general-purpose image generation needs\n\n**Use scientific-schematics\
        \ instead for:**\n- Flowcharts and process diagrams\n- Circuit diagrams and electrical schematics\n- Biological pathways\
        \ and signaling cascades\n- System architecture diagrams\n- CONSORT diagrams and methodology flowcharts\n- Any technical/schematic\
        \ diagrams\n\n## Quick Start\n\nUse the `scripts/generate_image.py` script to generate or edit images:\n\n```bash\n\
        # Generate a new image\npython scripts/generate_image.py \"A beautiful sunset over mountains\"\n\n# Edit an existing\
        \ image\npython scripts/generate_image.py \"Make the sky purple\" --input photo.jpg\n```\n\nThis generates/edits an\
        \ image and saves it as `generated_image.png` in the current directory.\n\n## API Key Setup\n\n**CRITICAL**: The script\
        \ requires an OpenRouter API key. Before running, check if the user has configured their API key:\n\n1. Look for a\
        \ `.env` file in the project directory or parent directories\n2. Check for `OPENROUTER_API_KEY=<key>` in the `.env`\
        \ file\n3. If not found, inform the user they need to:\n   - Create a `.env` file with `OPENROUTER_API_KEY=your-api-key-here`\n\
        \   - Or set the environment variable: `export OPENROUTER_API_KEY=your-api-key-here`\n   - Get an API key from: https://openrouter.ai/keys\n\
        \nThe script will automatically detect the `.env` file and provide clear error messages if the API key is missing.\n\
        \n## Model Selection\n\n**Default model**: `google/gemini-3-pro-image-preview` (high quality, recommended)\n\n**Available\
        \ models for generation and editing**:\n- `google/gemini-3-pro-image-preview` - High quality, supports generation\
        \ + editing\n- `black-forest-labs/flux.2-pro` - Fast, high quality, supports generation + editing\n\n**Generation\
        \ only**:\n- `black-forest-labs/flux.2-flex` - Fast and cheap, but not as high quality as pro\n\nSelect based on:\n\
        - **Quality**: Use gemini-3-pro or flux.2-pro\n- **Editing**: Use gemini-3-pro or flux.2-pro (both support image editing)\n\
        - **Cost**: Use flux.2-flex for generation only\n\n## Common Usage Patterns\n\n### Basic generation\n```bash\npython\
        \ scripts/generate_image.py \"Your prompt here\"\n```\n\n### Specify model\n```bash\npython scripts/generate_image.py\
        \ \"A cat in space\" --model \"black-forest-labs/flux.2-pro\"\n```\n\n### Custom output path\n```bash\npython scripts/generate_image.py\
        \ \"Abstract art\" --output artwork.png\n```\n\n### Edit an existing image\n```bash\npython scripts/generate_image.py\
        \ \"Make the background blue\" --input photo.jpg\n```\n\n### Edit with a specific model\n```bash\npython scripts/generate_image.py\
        \ \"Add sunglasses to the person\" --input portrait.png --model \"black-forest-labs/flux.2-pro\"\n```\n\n### Edit\
        \ with custom output\n```bash\npython scripts/generate_image.py \"Remove the text from the image\" --input screenshot.png\
        \ --output cleaned.png\n```\n\n### Multiple images\nRun the script multiple times with different prompts or output\
        \ paths:\n```bash\npython scripts/generate_image.py \"Image 1 description\" --output image1.png\npython scripts/generate_image.py\
        \ \"Image 2 description\" --output image2.png\n```\n\n## Script Parameters\n\n- `prompt` (required): Text description\
        \ of the image to generate, or editing instructions\n- `--input` or `-i`: Input image path for editing (enables edit\
        \ mode)\n- `--model` or `-m`: OpenRouter model ID (default: google/gemini-3-pro-image-preview)\n- `--output` or `-o`:\
        \ Output file path (default: generated_image.png)\n- `--api-key`: OpenRouter API key (overrides .env file)\n\n## Example\
        \ Use Cases\n\n### For Scientific Documents\n```bash\n# Generate a conceptual illustration for a paper\npython scripts/generate_image.py\
        \ \"Microscopic view of cancer cells being attacked by immunotherapy agents, scientific illustration style\" --output\
        \ figures/immunotherapy_concept.png\n\n# Create a visual for a presentation\npython scripts/generate_image.py \"DNA\
        \ double helix structure with highlighted mutation site, modern scientific visualization\" --output slides/dna_mutation.png\n\
        ```\n\n### For Presentations and Posters\n```bash\n# Title slide background\npython scripts/generate_image.py \"Abstract\
        \ blue and white background with subtle molecular patterns, professional presentation style\" --output slides/background.png\n\
        \n# Poster hero image\npython scripts/generate_image.py \"Laboratory setting with modern equipment, photorealistic,\
        \ well-lit\" --output poster/hero.png\n```\n\n### For General Visual Content\n```bash\n# Website or documentation\
        \ images\npython scripts/generate_image.py \"Professional team collaboration around a digital whiteboard, modern office\"\
        \ --output docs/team_collaboration.png\n\n# Marketing materials\npython scripts/generate_image.py \"Futuristic AI\
        \ brain concept with glowing neural networks\" --output marketing/ai_concept.png\n```\n\n## Error Handling\n\nThe\
        \ script provides clear error messages for:\n- Missing API key (with setup instructions)\n- API errors (with status\
        \ codes)\n- Unexpected response formats\n- Missing dependencies (requests library)\n\nIf the script fails, read the\
        \ error message and address the issue before retrying.\n\n## Notes\n\n- Images are returned as base64-encoded data\
        \ URLs and automatically saved as PNG files\n- The script supports both `images` and `content` response formats from\
        \ different OpenRouter models\n- Generation time varies by model (typically 5-30 seconds)\n- For image editing, the\
        \ input image is encoded as base64 and sent to the model\n- Supported input image formats: PNG, JPEG, GIF, WebP\n\
        - Check OpenRouter pricing for cost information: https://openrouter.ai/models\n\n## Image Editing Tips\n\n- Be specific\
        \ about what changes you want (e.g., \"change the sky to sunset colors\" vs \"edit the sky\")\n- Reference specific\
        \ elements in the image when possible\n- For best results, use clear and detailed editing instructions\n- Both Gemini\
        \ 3 Pro and FLUX.2 Pro support image editing through OpenRouter\n\n## Integration with Other Skills\n\n- **scientific-schematics**:\
        \ Use for technical diagrams, flowcharts, circuits, pathways\n- **generate-image**: Use for photos, illustrations,\
        \ artwork, visual concepts\n- **scientific-slides**: Combine with generate-image for visually rich presentations\n\
        - **latex-posters**: Use generate-image for poster visuals and hero images"
      github_url: https://github.com/davila7/claude-code-templates/tree/main/cli-tool/components/skills/scientific/generate-image
