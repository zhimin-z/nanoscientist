    skills:
    - id: prompt-engineering-patterns
      name: prompt-engineering-patterns
      description: Master advanced prompt engineering techniques to maximize LLM performance, reliability, and controllability
        in production. Use when optimizing prompts, improving LLM outputs, or designing production prompt templates.
      skill_path: data/skill_seeds/prompt-engineering-patterns/SKILL.md
      content: "# Prompt Engineering Patterns\n\nMaster advanced prompt engineering techniques to maximize LLM performance,\
        \ reliability, and controllability.\n\n## When to Use This Skill\n\n- Designing complex prompts for production LLM\
        \ applications\n- Optimizing prompt performance and consistency\n- Implementing structured reasoning patterns (chain-of-thought,\
        \ tree-of-thought)\n- Building few-shot learning systems with dynamic example selection\n- Creating reusable prompt\
        \ templates with variable interpolation\n- Debugging and refining prompts that produce inconsistent outputs\n- Implementing\
        \ system prompts for specialized AI assistants\n\n## Core Capabilities\n\n### 1. Few-Shot Learning\n- Example selection\
        \ strategies (semantic similarity, diversity sampling)\n- Balancing example count with context window constraints\n\
        - Constructing effective demonstrations with input-output pairs\n- Dynamic example retrieval from knowledge bases\n\
        - Handling edge cases through strategic example selection\n\n### 2. Chain-of-Thought Prompting\n- Step-by-step reasoning\
        \ elicitation\n- Zero-shot CoT with \"Let's think step by step\"\n- Few-shot CoT with reasoning traces\n- Self-consistency\
        \ techniques (sampling multiple reasoning paths)\n- Verification and validation steps\n\n### 3. Prompt Optimization\n\
        - Iterative refinement workflows\n- A/B testing prompt variations\n- Measuring prompt performance metrics (accuracy,\
        \ consistency, latency)\n- Reducing token usage while maintaining quality\n- Handling edge cases and failure modes\n\
        \n### 4. Template Systems\n- Variable interpolation and formatting\n- Conditional prompt sections\n- Multi-turn conversation\
        \ templates\n- Role-based prompt composition\n- Modular prompt components\n\n### 5. System Prompt Design\n- Setting\
        \ model behavior and constraints\n- Defining output formats and structure\n- Establishing role and expertise\n- Safety\
        \ guidelines and content policies\n- Context setting and background information\n\n## Quick Start\n\n```python\nfrom\
        \ prompt_optimizer import PromptTemplate, FewShotSelector\n\n# Define a structured prompt template\ntemplate = PromptTemplate(\n\
        \    system=\"You are an expert SQL developer. Generate efficient, secure SQL queries.\",\n    instruction=\"Convert\
        \ the following natural language query to SQL:\\n{query}\",\n    few_shot_examples=True,\n    output_format=\"SQL\
        \ code block with explanatory comments\"\n)\n\n# Configure few-shot learning\nselector = FewShotSelector(\n    examples_db=\"\
        sql_examples.jsonl\",\n    selection_strategy=\"semantic_similarity\",\n    max_examples=3\n)\n\n# Generate optimized\
        \ prompt\nprompt = template.render(\n    query=\"Find all users who registered in the last 30 days\",\n    examples=selector.select(query=\"\
        user registration date filter\")\n)\n```\n\n## Key Patterns\n\n### Progressive Disclosure\nStart with simple prompts,\
        \ add complexity only when needed:\n\n1. **Level 1**: Direct instruction\n   - \"Summarize this article\"\n\n2. **Level\
        \ 2**: Add constraints\n   - \"Summarize this article in 3 bullet points, focusing on key findings\"\n\n3. **Level\
        \ 3**: Add reasoning\n   - \"Read this article, identify the main findings, then summarize in 3 bullet points\"\n\n\
        4. **Level 4**: Add examples\n   - Include 2-3 example summaries with input-output pairs\n\n### Instruction Hierarchy\n\
        ```\n[System Context] → [Task Instruction] → [Examples] → [Input Data] → [Output Format]\n```\n\n### Error Recovery\n\
        Build prompts that gracefully handle failures:\n- Include fallback instructions\n- Request confidence scores\n- Ask\
        \ for alternative interpretations when uncertain\n- Specify how to indicate missing information\n\n## Best Practices\n\
        \n1. **Be Specific**: Vague prompts produce inconsistent results\n2. **Show, Don't Tell**: Examples are more effective\
        \ than descriptions\n3. **Test Extensively**: Evaluate on diverse, representative inputs\n4. **Iterate Rapidly**:\
        \ Small changes can have large impacts\n5. **Monitor Performance**: Track metrics in production\n6. **Version Control**:\
        \ Treat prompts as code with proper versioning\n7. **Document Intent**: Explain why prompts are structured as they\
        \ are\n\n## Common Pitfalls\n\n- **Over-engineering**: Starting with complex prompts before trying simple ones\n-\
        \ **Example pollution**: Using examples that don't match the target task\n- **Context overflow**: Exceeding token\
        \ limits with excessive examples\n- **Ambiguous instructions**: Leaving room for multiple interpretations\n- **Ignoring\
        \ edge cases**: Not testing on unusual or boundary inputs\n\n## Integration Patterns\n\n### With RAG Systems\n```python\n\
        # Combine retrieved context with prompt engineering\nprompt = f\"\"\"Given the following context:\n{retrieved_context}\n\
        \n{few_shot_examples}\n\nQuestion: {user_question}\n\nProvide a detailed answer based solely on the context above.\
        \ If the context doesn't contain enough information, explicitly state what's missing.\"\"\"\n```\n\n### With Validation\n\
        ```python\n# Add self-verification step\nprompt = f\"\"\"{main_task_prompt}\n\nAfter generating your response, verify\
        \ it meets these criteria:\n1. Answers the question directly\n2. Uses only information from provided context\n3. Cites\
        \ specific sources\n4. Acknowledges any uncertainty\n\nIf verification fails, revise your response.\"\"\"\n```\n\n\
        ## Performance Optimization\n\n### Token Efficiency\n- Remove redundant words and phrases\n- Use abbreviations consistently\
        \ after first definition\n- Consolidate similar instructions\n- Move stable content to system prompts\n\n### Latency\
        \ Reduction\n- Minimize prompt length without sacrificing quality\n- Use streaming for long-form outputs\n- Cache\
        \ common prompt prefixes\n- Batch similar requests when possible\n\n## Resources\n\n- **references/few-shot-learning.md**:\
        \ Deep dive on example selection and construction\n- **references/chain-of-thought.md**: Advanced reasoning elicitation\
        \ techniques\n- **references/prompt-optimization.md**: Systematic refinement workflows\n- **references/prompt-templates.md**:\
        \ Reusable template patterns\n- **references/system-prompts.md**: System-level prompt design\n- **assets/prompt-template-library.md**:\
        \ Battle-tested prompt templates\n- **assets/few-shot-examples.json**: Curated example datasets\n- **scripts/optimize-prompt.py**:\
        \ Automated prompt optimization tool\n\n## Success Metrics\n\nTrack these KPIs for your prompts:\n- **Accuracy**:\
        \ Correctness of outputs\n- **Consistency**: Reproducibility across similar inputs\n- **Latency**: Response time (P50,\
        \ P95, P99)\n- **Token Usage**: Average tokens per request\n- **Success Rate**: Percentage of valid outputs\n- **User\
        \ Satisfaction**: Ratings and feedback\n\n## Next Steps\n\n1. Review the prompt template library for common patterns\n\
        2. Experiment with few-shot learning for your specific use case\n3. Implement prompt versioning and A/B testing\n\
        4. Set up automated evaluation pipelines\n5. Document your prompt engineering decisions and learnings"
      github_url: https://github.com/wshobson/agents/tree/main/plugins/llm-application-dev/skills/prompt-engineering-patterns
