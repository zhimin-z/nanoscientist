      skill_path: data/skill_seeds/pptx/SKILL.md
      content: "# PPTX creation, editing, and analysis\n\n## Overview\n\nA user may ask you to create, edit, or analyze the\
        \ contents of a .pptx file. A .pptx file is essentially a ZIP archive containing XML files and other resources that\
        \ you can read or edit. You have different tools and workflows available for different tasks.\n\n## Reading and analyzing\
        \ content\n\n### Text extraction\nIf you just need to read the text contents of a presentation, you should convert\
        \ the document to markdown:\n\n```bash\n# Convert document to markdown\npython -m markitdown path-to-file.pptx\n```\n\
        \n### Raw XML access\nYou need raw XML access for: comments, speaker notes, slide layouts, animations, design elements,\
        \ and complex formatting. For any of these features, you'll need to unpack a presentation and read its raw XML contents.\n\
        \n#### Unpacking a file\n`python ooxml/scripts/unpack.py <office_file> <output_dir>`\n\n**Note**: The unpack.py script\
        \ is located at `skills/pptx/ooxml/scripts/unpack.py` relative to the project root. If the script doesn't exist at\
        \ this path, use `find . -name \"unpack.py\"` to locate it.\n\n#### Key file structures\n* `ppt/presentation.xml`\
        \ - Main presentation metadata and slide references\n* `ppt/slides/slide{N}.xml` - Individual slide contents (slide1.xml,\
        \ slide2.xml, etc.)\n* `ppt/notesSlides/notesSlide{N}.xml` - Speaker notes for each slide\n* `ppt/comments/modernComment_*.xml`\
        \ - Comments for specific slides\n* `ppt/slideLayouts/` - Layout templates for slides\n* `ppt/slideMasters/` - Master\
        \ slide templates\n* `ppt/theme/` - Theme and styling information\n* `ppt/media/` - Images and other media files\n\
        \n#### Typography and color extraction\n**When given an example design to emulate**: Always analyze the presentation's\
        \ typography and colors first using the methods below:\n1. **Read theme file**: Check `ppt/theme/theme1.xml` for colors\
        \ (`<a:clrScheme>`) and fonts (`<a:fontScheme>`)\n2. **Sample slide content**: Examine `ppt/slides/slide1.xml` for\
        \ actual font usage (`<a:rPr>`) and colors\n3. **Search for patterns**: Use grep to find color (`<a:solidFill>`, `<a:srgbClr>`)\
        \ and font references across all XML files\n\n## Creating a new PowerPoint presentation **without a template**\n\n\
        When creating a new PowerPoint presentation from scratch, use the **html2pptx** workflow to convert HTML slides to\
        \ PowerPoint with accurate positioning.\n\n### Design Principles\n\n**CRITICAL**: Before creating any presentation,\
        \ analyze the content and choose appropriate design elements:\n1. **Consider the subject matter**: What is this presentation\
        \ about? What tone, industry, or mood does it suggest?\n2. **Check for branding**: If the user mentions a company/organization,\
        \ consider their brand colors and identity\n3. **Match palette to content**: Select colors that reflect the subject\n\
        4. **State your approach**: Explain your design choices before writing code\n\n**Requirements**:\n- ✅ State your content-informed\
        \ design approach BEFORE writing code\n- ✅ Use web-safe fonts only: Arial, Helvetica, Times New Roman, Georgia, Courier\
        \ New, Verdana, Tahoma, Trebuchet MS, Impact\n- ✅ Create clear visual hierarchy through size, weight, and color\n\
        - ✅ Ensure readability: strong contrast, appropriately sized text, clean alignment\n- ✅ Be consistent: repeat patterns,\
        \ spacing, and visual language across slides\n\n#### Color Palette Selection\n\n**Choosing colors creatively**:\n\
        - **Think beyond defaults**: What colors genuinely match this specific topic? Avoid autopilot choices.\n- **Consider\
        \ multiple angles**: Topic, industry, mood, energy level, target audience, brand identity (if mentioned)\n- **Be adventurous**:\
        \ Try unexpected combinations - a healthcare presentation doesn't have to be green, finance doesn't have to be navy\n\
        - **Build your palette**: Pick 3-5 colors that work together (dominant colors + supporting tones + accent)\n- **Ensure\
        \ contrast**: Text must be clearly readable on backgrounds\n\n**Example color palettes** (use these to spark creativity\
        \ - choose one, adapt it, or create your own):\n\n1. **Classic Blue**: Deep navy (#1C2833), slate gray (#2E4053),\
        \ silver (#AAB7B8), off-white (#F4F6F6)\n2. **Teal & Coral**: Teal (#5EA8A7), deep teal (#277884), coral (#FE4447),\
        \ white (#FFFFFF)\n3. **Bold Red**: Red (#C0392B), bright red (#E74C3C), orange (#F39C12), yellow (#F1C40F), green\
        \ (#2ECC71)\n4. **Warm Blush**: Mauve (#A49393), blush (#EED6D3), rose (#E8B4B8), cream (#FAF7F2)\n5. **Burgundy Luxury**:\
        \ Burgundy (#5D1D2E), crimson (#951233), rust (#C15937), gold (#997929)\n6. **Deep Purple & Emerald**: Purple (#B165FB),\
        \ dark blue (#181B24), emerald (#40695B), white (#FFFFFF)\n7. **Cream & Forest Green**: Cream (#FFE1C7), forest green\
        \ (#40695B), white (#FCFCFC)\n8. **Pink & Purple**: Pink (#F8275B), coral (#FF574A), rose (#FF737D), purple (#3D2F68)\n\
        9. **Lime & Plum**: Lime (#C5DE82), plum (#7C3A5F), coral (#FD8C6E), blue-gray (#98ACB5)\n10. **Black & Gold**: Gold\
        \ (#BF9A4A), black (#000000), cream (#F4F6F6)\n11. **Sage & Terracotta**: Sage (#87A96B), terracotta (#E07A5F), cream\
        \ (#F4F1DE), charcoal (#2C2C2C)\n12. **Charcoal & Red**: Charcoal (#292929), red (#E33737), light gray (#CCCBCB)\n\
        13. **Vibrant Orange**: Orange (#F96D00), light gray (#F2F2F2), charcoal (#222831)\n14. **Forest Green**: Black (#191A19),\
        \ green (#4E9F3D), dark green (#1E5128), white (#FFFFFF)\n15. **Retro Rainbow**: Purple (#722880), pink (#D72D51),\
        \ orange (#EB5C18), amber (#F08800), gold (#DEB600)\n16. **Vintage Earthy**: Mustard (#E3B448), sage (#CBD18F), forest\
        \ green (#3A6B35), cream (#F4F1DE)\n17. **Coastal Rose**: Old rose (#AD7670), beaver (#B49886), eggshell (#F3ECDC),\
        \ ash gray (#BFD5BE)\n18. **Orange & Turquoise**: Light orange (#FC993E), grayish turquoise (#667C6F), white (#FCFCFC)\n\
        \n#### Visual Details Options\n\n**Geometric Patterns**:\n- Diagonal section dividers instead of horizontal\n- Asymmetric\
        \ column widths (30/70, 40/60, 25/75)\n- Rotated text headers at 90° or 270°\n- Circular/hexagonal frames for images\n\
        - Triangular accent shapes in corners\n- Overlapping shapes for depth\n\n**Border & Frame Treatments**:\n- Thick single-color\
        \ borders (10-20pt) on one side only\n- Double-line borders with contrasting colors\n- Corner brackets instead of\
        \ full frames\n- L-shaped borders (top+left or bottom+right)\n- Underline accents beneath headers (3-5pt thick)\n\n\
        **Typography Treatments**:\n- Extreme size contrast (72pt headlines vs 11pt body)\n- All-caps headers with wide letter\
        \ spacing\n- Numbered sections in oversized display type\n- Monospace (Courier New) for data/stats/technical content\n\
        - Condensed fonts (Arial Narrow) for dense information\n- Outlined text for emphasis\n\n**Chart & Data Styling**:\n\
        - Monochrome charts with single accent color for key data\n- Horizontal bar charts instead of vertical\n- Dot plots\
        \ instead of bar charts\n- Minimal gridlines or none at all\n- Data labels directly on elements (no legends)\n- Oversized\
        \ numbers for key metrics\n\n**Layout Innovations**:\n- Full-bleed images with text overlays\n- Sidebar column (20-30%\
        \ width) for navigation/context\n- Modular grid systems (3×3, 4×4 blocks)\n- Z-pattern or F-pattern content flow\n\
        - Floating text boxes over colored shapes\n- Magazine-style multi-column layouts\n\n**Background Treatments**:\n-\
        \ Solid color blocks occupying 40-60% of slide\n- Gradient fills (vertical or diagonal only)\n- Split backgrounds\
        \ (two colors, diagonal or vertical)\n- Edge-to-edge color bands\n- Negative space as a design element\n\n### Layout\
        \ Tips\n**When creating slides with charts or tables:**\n- **Two-column layout (PREFERRED)**: Use a header spanning\
        \ the full width, then two columns below - text/bullets in one column and the featured content in the other. This\
        \ provides better balance and makes charts/tables more readable. Use flexbox with unequal column widths (e.g., 40%/60%\
        \ split) to optimize space for each content type.\n- **Full-slide layout**: Let the featured content (chart/table)\
        \ take up the entire slide for maximum impact and readability\n- **NEVER vertically stack**: Do not place charts/tables\
        \ below text in a single column - this causes poor readability and layout issues\n\n### Workflow\n1. **MANDATORY -\
        \ READ ENTIRE FILE**: Read [`html2pptx.md`](html2pptx.md) completely from start to finish. **NEVER set any range limits\
        \ when reading this file.** Read the full file content for detailed syntax, critical formatting rules, and best practices\
        \ before proceeding with presentation creation.\n2. Create an HTML file for each slide with proper dimensions (e.g.,\
        \ 720pt × 405pt for 16:9)\n   - Use `<p>`, `<h1>`-`<h6>`, `<ul>`, `<ol>` for all text content\n   - Use `class=\"\
        placeholder\"` for areas where charts/tables will be added (render with gray background for visibility)\n   - **CRITICAL**:\
        \ Rasterize gradients and icons as PNG images FIRST using Sharp, then reference in HTML\n   - **LAYOUT**: For slides\
        \ with charts/tables/images, use either full-slide layout or two-column layout for better readability\n3. Create and\
        \ run a JavaScript file using the [`html2pptx.js`](scripts/html2pptx.js) library to convert HTML slides to PowerPoint\
        \ and save the presentation\n   - Use the `html2pptx()` function to process each HTML file\n   - Add charts and tables\
        \ to placeholder areas using PptxGenJS API\n   - Save the presentation using `pptx.writeFile()`\n4. **Visual validation**:\
        \ Generate thumbnails and inspect for layout issues\n   - Create thumbnail grid: `python scripts/thumbnail.py output.pptx\
        \ workspace/thumbnails --cols 4`\n   - Read and carefully examine the thumbnail image for:\n     - **Text cutoff**:\
        \ Text being cut off by header bars, shapes, or slide edges\n     - **Text overlap**: Text overlapping with other\
        \ text or shapes\n     - **Positioning issues**: Content too close to slide boundaries or other elements\n     - **Contrast\
        \ issues**: Insufficient contrast between text and backgrounds\n   - If issues found, adjust HTML margins/spacing/colors\
        \ and regenerate the presentation\n   - Repeat until all slides are visually correct\n\n## Editing an existing PowerPoint\
        \ presentation\n\nWhen edit slides in an existing PowerPoint presentation, you need to work with the raw Office Open\
        \ XML (OOXML) format. This involves unpacking the .pptx file, editing the XML content, and repacking it.\n\n### Workflow\n\
        1. **MANDATORY - READ ENTIRE FILE**: Read [`ooxml.md`](ooxml.md) (~500 lines) completely from start to finish.  **NEVER\
        \ set any range limits when reading this file.**  Read the full file content for detailed guidance on OOXML structure\
        \ and editing workflows before any presentation editing.\n2. Unpack the presentation: `python ooxml/scripts/unpack.py\
        \ <office_file> <output_dir>`\n3. Edit the XML files (primarily `ppt/slides/slide{N}.xml` and related files)\n4. **CRITICAL**:\
        \ Validate immediately after each edit and fix any validation errors before proceeding: `python ooxml/scripts/validate.py\
        \ <dir> --original <file>`\n5. Pack the final presentation: `python ooxml/scripts/pack.py <input_directory> <office_file>`\n\
        \n## Creating a new PowerPoint presentation **using a template**\n\nWhen you need to create a presentation that follows\
        \ an existing template's design, you'll need to duplicate and re-arrange template slides before then replacing placeholder\
        \ context.\n\n### Workflow\n1. **Extract template text AND create visual thumbnail grid**:\n   * Extract text: `python\
        \ -m markitdown template.pptx > template-content.md`\n   * Read `template-content.md`: Read the entire file to understand\
        \ the contents of the template presentation. **NEVER set any range limits when reading this file.**\n   * Create thumbnail\
        \ grids: `python scripts/thumbnail.py template.pptx`\n   * See [Creating Thumbnail Grids](#creating-thumbnail-grids)\
        \ section for more details\n\n2. **Analyze template and save inventory to a file**:\n   * **Visual Analysis**: Review\
        \ thumbnail grid(s) to understand slide layouts, design patterns, and visual structure\n   * Create and save a template\
        \ inventory file at `template-inventory.md` containing:\n     ```markdown\n     # Template Inventory Analysis\n  \
        \   **Total Slides: [count]**\n     **IMPORTANT: Slides are 0-indexed (first slide = 0, last slide = count-1)**\n\n\
        \     ## [Category Name]\n     - Slide 0: [Layout code if available] - Description/purpose\n     - Slide 1: [Layout\
        \ code] - Description/purpose\n     - Slide 2: [Layout code] - Description/purpose\n     [... EVERY slide must be\
        \ listed individually with its index ...]\n     ```\n   * **Using the thumbnail grid**: Reference the visual thumbnails\
        \ to identify:\n     - Layout patterns (title slides, content layouts, section dividers)\n     - Image placeholder\
        \ locations and counts\n     - Design consistency across slide groups\n     - Visual hierarchy and structure\n   *\
        \ This inventory file is REQUIRED for selecting appropriate templates in the next step\n\n3. **Create presentation\
        \ outline based on template inventory**:\n   * Review available templates from step 2.\n   * Choose an intro or title\
        \ template for the first slide. This should be one of the first templates.\n   * Choose safe, text-based layouts for\
        \ the other slides.\n   * **CRITICAL: Match layout structure to actual content**:\n     - Single-column layouts: Use\
        \ for unified narrative or single topic\n     - Two-column layouts: Use ONLY when you have exactly 2 distinct items/concepts\n\
        \     - Three-column layouts: Use ONLY when you have exactly 3 distinct items/concepts\n     - Image + text layouts:\
        \ Use ONLY when you have actual images to insert\n     - Quote layouts: Use ONLY for actual quotes from people (with\
        \ attribution), never for emphasis\n     - Never use layouts with more placeholders than you have content\n     -\
        \ If you have 2 items, don't force them into a 3-column layout\n     - If you have 4+ items, consider breaking into\
        \ multiple slides or using a list format\n   * Count your actual content pieces BEFORE selecting the layout\n   *\
        \ Verify each placeholder in the chosen layout will be filled with meaningful content\n   * Select one option representing\
        \ the **best** layout for each content section.\n   * Save `outline.md` with content AND template mapping that leverages\
        \ available designs\n   * Example template mapping:\n      ```\n      # Template slides to use (0-based indexing)\n\
        \      # WARNING: Verify indices are within range! Template with 73 slides has indices 0-72\n      # Mapping: slide\
        \ numbers from outline -> template slide indices\n      template_mapping = [\n          0,   # Use slide 0 (Title/Cover)\n\
        \          34,  # Use slide 34 (B1: Title and body)\n          34,  # Use slide 34 again (duplicate for second B1)\n\
        \          50,  # Use slide 50 (E1: Quote)\n          54,  # Use slide 54 (F2: Closing + Text)\n      ]\n      ```\n\
        \n4. **Duplicate, reorder, and delete slides using `rearrange.py`**:\n   * Use the `scripts/rearrange.py` script to\
        \ create a new presentation with slides in the desired order:\n     ```bash\n     python scripts/rearrange.py template.pptx\
        \ working.pptx 0,34,34,50,52\n     ```\n   * The script handles duplicating repeated slides, deleting unused slides,\
        \ and reordering automatically\n   * Slide indices are 0-based (first slide is 0, second is 1, etc.)\n   * The same\
        \ slide index can appear multiple times to duplicate that slide\n\n5. **Extract ALL text using the `inventory.py`\
        \ script**:\n   * **Run inventory extraction**:\n     ```bash\n     python scripts/inventory.py working.pptx text-inventory.json\n\
        \     ```\n   * **Read text-inventory.json**: Read the entire text-inventory.json file to understand all shapes and\
        \ their properties. **NEVER set any range limits when reading this file.**\n\n   * The inventory JSON structure:\n\
        \      ```json\n        {\n          \"slide-0\": {\n            \"shape-0\": {\n              \"placeholder_type\"\
        : \"TITLE\",  // or null for non-placeholders\n              \"left\": 1.5,                  // position in inches\n\
        \              \"top\": 2.0,\n              \"width\": 7.5,\n              \"height\": 1.2,\n              \"paragraphs\"\
        : [\n                {\n                  \"text\": \"Paragraph text\",\n                  // Optional properties\
        \ (only included when non-default):\n                  \"bullet\": true,           // explicit bullet detected\n \
        \                 \"level\": 0,               // only included when bullet is true\n                  \"alignment\"\
        : \"CENTER\",    // CENTER, RIGHT (not LEFT)\n                  \"space_before\": 10.0,     // space before paragraph\
        \ in points\n                  \"space_after\": 6.0,       // space after paragraph in points\n                  \"\
        line_spacing\": 22.4,     // line spacing in points\n                  \"font_name\": \"Arial\",     // from first\
        \ run\n                  \"font_size\": 14.0,        // in points\n                  \"bold\": true,\n           \
        \       \"italic\": false,\n                  \"underline\": false,\n                  \"color\": \"FF0000\"     \
        \    // RGB color\n                }\n              ]\n            }\n          }\n        }\n      ```\n\n   * Key\
        \ features:\n     - **Slides**: Named as \"slide-0\", \"slide-1\", etc.\n     - **Shapes**: Ordered by visual position\
        \ (top-to-bottom, left-to-right) as \"shape-0\", \"shape-1\", etc.\n     - **Placeholder types**: TITLE, CENTER_TITLE,\
        \ SUBTITLE, BODY, OBJECT, or null\n     - **Default font size**: `default_font_size` in points extracted from layout\
        \ placeholders (when available)\n     - **Slide numbers are filtered**: Shapes with SLIDE_NUMBER placeholder type\
        \ are automatically excluded from inventory\n     - **Bullets**: When `bullet: true`, `level` is always included (even\
        \ if 0)\n     - **Spacing**: `space_before`, `space_after`, and `line_spacing` in points (only included when set)\n\
        \     - **Colors**: `color` for RGB (e.g., \"FF0000\"), `theme_color` for theme colors (e.g., \"DARK_1\")\n     -\
        \ **Properties**: Only non-default values are included in the output\n\n6. **Generate replacement text and save the\
        \ data to a JSON file**\n   Based on the text inventory from the previous step:\n   - **CRITICAL**: First verify which\
        \ shapes exist in the inventory - only reference shapes that are actually present\n   - **VALIDATION**: The replace.py\
        \ script will validate that all shapes in your replacement JSON exist in the inventory\n     - If you reference a\
        \ non-existent shape, you'll get an error showing available shapes\n     - If you reference a non-existent slide,\
        \ you'll get an error indicating the slide doesn't exist\n     - All validation errors are shown at once before the\
        \ script exits\n   - **IMPORTANT**: The replace.py script uses inventory.py internally to identify ALL text shapes\n\
        \   - **AUTOMATIC CLEARING**: ALL text shapes from the inventory will be cleared unless you provide \"paragraphs\"\
        \ for them\n   - Add a \"paragraphs\" field to shapes that need content (not \"replacement_paragraphs\")\n   - Shapes\
        \ without \"paragraphs\" in the replacement JSON will have their text cleared automatically\n   - Paragraphs with\
        \ bullets will be automatically left aligned. Don't set the `alignment` property on when `\"bullet\": true`\n   -\
        \ Generate appropriate replacement content for placeholder text\n   - Use shape size to determine appropriate content\
        \ length\n   - **CRITICAL**: Include paragraph properties from the original inventory - don't just provide text\n\
        \   - **IMPORTANT**: When bullet: true, do NOT include bullet symbols (•, -, *) in text - they're added automatically\n\
        \   - **ESSENTIAL FORMATTING RULES**:\n     - Headers/titles should typically have `\"bold\": true`\n     - List items\
        \ should have `\"bullet\": true, \"level\": 0` (level is required when bullet is true)\n     - Preserve any alignment\
        \ properties (e.g., `\"alignment\": \"CENTER\"` for centered text)\n     - Include font properties when different\
        \ from default (e.g., `\"font_size\": 14.0`, `\"font_name\": \"Lora\"`)\n     - Colors: Use `\"color\": \"FF0000\"\
        ` for RGB or `\"theme_color\": \"DARK_1\"` for theme colors\n     - The replacement script expects **properly formatted\
        \ paragraphs**, not just text strings\n     - **Overlapping shapes**: Prefer shapes with larger default_font_size\
        \ or more appropriate placeholder_type\n   - Save the updated inventory with replacements to `replacement-text.json`\n\
        \   - **WARNING**: Different template layouts have different shape counts - always check the actual inventory before\
        \ creating replacements\n\n   Example paragraphs field showing proper formatting:\n   ```json\n   \"paragraphs\":\
        \ [\n     {\n       \"text\": \"New presentation title text\",\n       \"alignment\": \"CENTER\",\n       \"bold\"\
        : true\n     },\n     {\n       \"text\": \"Section Header\",\n       \"bold\": true\n     },\n     {\n       \"text\"\
        : \"First bullet point without bullet symbol\",\n       \"bullet\": true,\n       \"level\": 0\n     },\n     {\n\
        \       \"text\": \"Red colored text\",\n       \"color\": \"FF0000\"\n     },\n     {\n       \"text\": \"Theme colored\
        \ text\",\n       \"theme_color\": \"DARK_1\"\n     },\n     {\n       \"text\": \"Regular paragraph text without\
        \ special formatting\"\n     }\n   ]\n   ```\n\n   **Shapes not listed in the replacement JSON are automatically cleared**:\n\
        \   ```json\n   {\n     \"slide-0\": {\n       \"shape-0\": {\n         \"paragraphs\": [...] // This shape gets new\
        \ text\n       }\n       // shape-1 and shape-2 from inventory will be cleared automatically\n     }\n   }\n   ```\n\
        \n   **Common formatting patterns for presentations**:\n   - Title slides: Bold text, sometimes centered\n   - Section\
        \ headers within slides: Bold text\n   - Bullet lists: Each item needs `\"bullet\": true, \"level\": 0`\n   - Body\
        \ text: Usually no special properties needed\n   - Quotes: May have special alignment or font properties\n\n7. **Apply\
        \ replacements using the `replace.py` script**\n   ```bash\n   python scripts/replace.py working.pptx replacement-text.json\
        \ output.pptx\n   ```\n\n   The script will:\n   - First extract the inventory of ALL text shapes using functions\
        \ from inventory.py\n   - Validate that all shapes in the replacement JSON exist in the inventory\n   - Clear text\
        \ from ALL shapes identified in the inventory\n   - Apply new text only to shapes with \"paragraphs\" defined in the\
        \ replacement JSON\n   - Preserve formatting by applying paragraph properties from the JSON\n   - Handle bullets,\
        \ alignment, font properties, and colors automatically\n   - Save the updated presentation\n\n   Example validation\
        \ errors:\n   ```\n   ERROR: Invalid shapes in replacement JSON:\n     - Shape 'shape-99' not found on 'slide-0'.\
        \ Available shapes: shape-0, shape-1, shape-4\n     - Slide 'slide-999' not found in inventory\n   ```\n\n   ```\n\
        \   ERROR: Replacement text made overflow worse in these shapes:\n     - slide-0/shape-2: overflow worsened by 1.25\"\
        \ (was 0.00\", now 1.25\")\n   ```\n\n## Creating Thumbnail Grids\n\nTo create visual thumbnail grids of PowerPoint\
        \ slides for quick analysis and reference:\n\n```bash\npython scripts/thumbnail.py template.pptx [output_prefix]\n\
        ```\n\n**Features**:\n- Creates: `thumbnails.jpg` (or `thumbnails-1.jpg`, `thumbnails-2.jpg`, etc. for large decks)\n\
        - Default: 5 columns, max 30 slides per grid (5×6)\n- Custom prefix: `python scripts/thumbnail.py template.pptx my-grid`\n\
        \  - Note: The output prefix should include the path if you want output in a specific directory (e.g., `workspace/my-grid`)\n\
        - Adjust columns: `--cols 4` (range: 3-6, affects slides per grid)\n- Grid limits: 3 cols = 12 slides/grid, 4 cols\
        \ = 20, 5 cols = 30, 6 cols = 42\n- Slides are zero-indexed (Slide 0, Slide 1, etc.)\n\n**Use cases**:\n- Template\
        \ analysis: Quickly understand slide layouts and design patterns\n- Content review: Visual overview of entire presentation\n\
        - Navigation reference: Find specific slides by their visual appearance\n- Quality check: Verify all slides are properly\
        \ formatted\n\n**Examples**:\n```bash\n# Basic usage\npython scripts/thumbnail.py presentation.pptx\n\n# Combine options:\
        \ custom name, columns\npython scripts/thumbnail.py template.pptx analysis --cols 4\n```\n\n## Converting Slides to\
        \ Images\n\nTo visually analyze PowerPoint slides, convert them to images using a two-step process:\n\n1. **Convert\
        \ PPTX to PDF**:\n   ```bash\n   soffice --headless --convert-to pdf template.pptx\n   ```\n\n2. **Convert PDF pages\
        \ to JPEG images**:\n   ```bash\n   pdftoppm -jpeg -r 150 template.pdf slide\n   ```\n   This creates files like `slide-1.jpg`,\
        \ `slide-2.jpg`, etc.\n\nOptions:\n- `-r 150`: Sets resolution to 150 DPI (adjust for quality/size balance)\n- `-jpeg`:\
        \ Output JPEG format (use `-png` for PNG if preferred)\n- `-f N`: First page to convert (e.g., `-f 2` starts from\
        \ page 2)\n- `-l N`: Last page to convert (e.g., `-l 5` stops at page 5)\n- `slide`: Prefix for output files\n\nExample\
        \ for specific range:\n```bash\npdftoppm -jpeg -r 150 -f 2 -l 5 template.pdf slide  # Converts only pages 2-5\n```\n\
        \n## Code Style Guidelines\n**IMPORTANT**: When generating code for PPTX operations:\n- Write concise code\n- Avoid\
        \ verbose variable names and redundant operations\n- Avoid unnecessary print statements\n\n## Dependencies\n\nRequired\
        \ dependencies (should already be installed):\n\n- **markitdown**: `pip install \"markitdown[pptx]\"` (for text extraction\
        \ from presentations)\n- **pptxgenjs**: `npm install -g pptxgenjs` (for creating presentations via html2pptx)\n- **playwright**:\
        \ `npm install -g playwright` (for HTML rendering in html2pptx)\n- **react-icons**: `npm install -g react-icons react\
        \ react-dom` (for icons)\n- **sharp**: `npm install -g sharp` (for SVG rasterization and image processing)\n- **LibreOffice**:\
        \ `sudo apt-get install libreoffice` (for PDF conversion)\n- **Poppler**: `sudo apt-get install poppler-utils` (for\
        \ pdftoppm to convert PDF to images)\n- **defusedxml**: `pip install defusedxml` (for secure XML parsing)"
