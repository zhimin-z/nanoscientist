  - id: tooluniverse
    name: tooluniverse
    description: Use this skill when working with scientific research tools and workflows across bioinformatics, cheminformatics,
      genomics, structural biology, proteomics, and drug discovery. This skill provides access to 600+ scientific tools including
      machine learning models, datasets, APIs, and analysis packages. Use when searching for scientific tools, executing computational
      biology workflows, composing multi-step research pipelines, accessing databases like OpenTargets/PubChem/UniProt/PDB/ChEMBL,
      performing tool discovery for research tasks, or integrating scientific computational resources into LLM workflows.
    skill_path: data/skill_seeds/tooluniverse/SKILL.md
    content: "# ToolUniverse\n\n## Overview\n\nToolUniverse is a unified ecosystem that enables AI agents to function as research\
      \ scientists by providing standardized access to 600+ scientific resources. Use this skill to discover, execute, and\
      \ compose scientific tools across multiple research domains including bioinformatics, cheminformatics, genomics, structural\
      \ biology, proteomics, and drug discovery.\n\n**Key Capabilities:**\n- Access 600+ scientific tools, models, datasets,\
      \ and APIs\n- Discover tools using natural language, semantic search, or keywords\n- Execute tools through standardized\
      \ AI-Tool Interaction Protocol\n- Compose multi-step workflows for complex research problems\n- Integration with Claude\
      \ Desktop/Code via Model Context Protocol (MCP)\n\n## When to Use This Skill\n\nUse this skill when:\n- Searching for\
      \ scientific tools by function or domain (e.g., \"find protein structure prediction tools\")\n- Executing computational\
      \ biology workflows (e.g., disease target identification, drug discovery, genomics analysis)\n- Accessing scientific\
      \ databases (OpenTargets, PubChem, UniProt, PDB, ChEMBL, KEGG, etc.)\n- Composing multi-step research pipelines (e.g.,\
      \ target discovery → structure prediction → virtual screening)\n- Working with bioinformatics, cheminformatics, or structural\
      \ biology tasks\n- Analyzing gene expression, protein sequences, molecular structures, or clinical data\n- Performing\
      \ literature searches, pathway enrichment, or variant annotation\n- Building automated scientific research workflows\n\
      \n## Quick Start\n\n### Basic Setup\n```python\nfrom tooluniverse import ToolUniverse\n\n# Initialize and load tools\n\
      tu = ToolUniverse()\ntu.load_tools()  # Loads 600+ scientific tools\n\n# Discover tools\ntools = tu.run({\n    \"name\"\
      : \"Tool_Finder_Keyword\",\n    \"arguments\": {\n        \"description\": \"disease target associations\",\n      \
      \  \"limit\": 10\n    }\n})\n\n# Execute a tool\nresult = tu.run({\n    \"name\": \"OpenTargets_get_associated_targets_by_disease_efoId\"\
      ,\n    \"arguments\": {\"efoId\": \"EFO_0000537\"}  # Hypertension\n})\n```\n\n### Model Context Protocol (MCP)\nFor\
      \ Claude Desktop/Code integration:\n```bash\ntooluniverse-smcp\n```\n\n## Core Workflows\n\n### 1. Tool Discovery\n\n\
      Find relevant tools for your research task:\n\n**Three discovery methods:**\n- `Tool_Finder` - Embedding-based semantic\
      \ search (requires GPU)\n- `Tool_Finder_LLM` - LLM-based semantic search (no GPU required)\n- `Tool_Finder_Keyword`\
      \ - Fast keyword search\n\n**Example:**\n```python\n# Search by natural language description\ntools = tu.run({\n   \
      \ \"name\": \"Tool_Finder_LLM\",\n    \"arguments\": {\n        \"description\": \"Find tools for RNA sequencing differential\
      \ expression analysis\",\n        \"limit\": 10\n    }\n})\n\n# Review available tools\nfor tool in tools:\n    print(f\"\
      {tool['name']}: {tool['description']}\")\n```\n\n**See `references/tool-discovery.md` for:**\n- Detailed discovery methods\
      \ and search strategies\n- Domain-specific keyword suggestions\n- Best practices for finding tools\n\n### 2. Tool Execution\n\
      \nExecute individual tools through the standardized interface:\n\n**Example:**\n```python\n# Execute disease-target\
      \ lookup\ntargets = tu.run({\n    \"name\": \"OpenTargets_get_associated_targets_by_disease_efoId\",\n    \"arguments\"\
      : {\"efoId\": \"EFO_0000616\"}  # Breast cancer\n})\n\n# Get protein structure\nstructure = tu.run({\n    \"name\":\
      \ \"AlphaFold_get_structure\",\n    \"arguments\": {\"uniprot_id\": \"P12345\"}\n})\n\n# Calculate molecular properties\n\
      properties = tu.run({\n    \"name\": \"RDKit_calculate_descriptors\",\n    \"arguments\": {\"smiles\": \"CCO\"}  # Ethanol\n\
      })\n```\n\n**See `references/tool-execution.md` for:**\n- Real-world execution examples across domains\n- Tool parameter\
      \ handling and validation\n- Result processing and error handling\n- Best practices for production use\n\n### 3. Tool\
      \ Composition and Workflows\n\nCompose multiple tools for complex research workflows:\n\n**Drug Discovery Example:**\n\
      ```python\n# 1. Find disease targets\ntargets = tu.run({\n    \"name\": \"OpenTargets_get_associated_targets_by_disease_efoId\"\
      ,\n    \"arguments\": {\"efoId\": \"EFO_0000616\"}\n})\n\n# 2. Get protein structures\nstructures = []\nfor target in\
      \ targets[:5]:\n    structure = tu.run({\n        \"name\": \"AlphaFold_get_structure\",\n        \"arguments\": {\"\
      uniprot_id\": target['uniprot_id']}\n    })\n    structures.append(structure)\n\n# 3. Screen compounds\nhits = []\n\
      for structure in structures:\n    compounds = tu.run({\n        \"name\": \"ZINC_virtual_screening\",\n        \"arguments\"\
      : {\n            \"structure\": structure,\n            \"library\": \"lead-like\",\n            \"top_n\": 100\n  \
      \      }\n    })\n    hits.extend(compounds)\n\n# 4. Evaluate drug-likeness\ndrug_candidates = []\nfor compound in hits:\n\
      \    props = tu.run({\n        \"name\": \"RDKit_calculate_drug_properties\",\n        \"arguments\": {\"smiles\": compound['smiles']}\n\
      \    })\n    if props['lipinski_pass']:\n        drug_candidates.append(compound)\n```\n\n**See `references/tool-composition.md`\
      \ for:**\n- Complete workflow examples (drug discovery, genomics, clinical)\n- Sequential and parallel tool composition\
      \ patterns\n- Output processing hooks\n- Workflow best practices\n\n## Scientific Domains\n\nToolUniverse supports 600+\
      \ tools across major scientific domains:\n\n**Bioinformatics:**\n- Sequence analysis, alignment, BLAST\n- Gene expression\
      \ (RNA-seq, DESeq2)\n- Pathway enrichment (KEGG, Reactome, GO)\n- Variant annotation (VEP, ClinVar)\n\n**Cheminformatics:**\n\
      - Molecular descriptors and fingerprints\n- Drug discovery and virtual screening\n- ADMET prediction and drug-likeness\n\
      - Chemical databases (PubChem, ChEMBL, ZINC)\n\n**Structural Biology:**\n- Protein structure prediction (AlphaFold)\n\
      - Structure retrieval (PDB)\n- Binding site detection\n- Protein-protein interactions\n\n**Proteomics:**\n- Mass spectrometry\
      \ analysis\n- Protein databases (UniProt, STRING)\n- Post-translational modifications\n\n**Genomics:**\n- Genome assembly\
      \ and annotation\n- Copy number variation\n- Clinical genomics workflows\n\n**Medical/Clinical:**\n- Disease databases\
      \ (OpenTargets, OMIM)\n- Clinical trials and FDA data\n- Variant classification\n\n**See `references/domains.md` for:**\n\
      - Complete domain categorization\n- Tool examples by discipline\n- Cross-domain applications\n- Search strategies by\
      \ domain\n\n## Reference Documentation\n\nThis skill includes comprehensive reference files that provide detailed information\
      \ for specific aspects:\n\n- **`references/installation.md`** - Installation, setup, MCP configuration, platform integration\n\
      - **`references/tool-discovery.md`** - Discovery methods, search strategies, listing tools\n- **`references/tool-execution.md`**\
      \ - Execution patterns, real-world examples, error handling\n- **`references/tool-composition.md`** - Workflow composition,\
      \ complex pipelines, parallel execution\n- **`references/domains.md`** - Tool categorization by domain, use case examples\n\
      - **`references/api_reference.md`** - Python API documentation, hooks, protocols\n\n**Workflow:** When helping with\
      \ specific tasks, reference the appropriate file for detailed instructions. For example, if searching for tools, consult\
      \ `references/tool-discovery.md` for search strategies.\n\n## Example Scripts\n\nTwo executable example scripts demonstrate\
      \ common use cases:\n\n**`scripts/example_tool_search.py`** - Demonstrates all three discovery methods:\n- Keyword-based\
      \ search\n- LLM-based search\n- Domain-specific searches\n- Getting detailed tool information\n\n**`scripts/example_workflow.py`**\
      \ - Complete workflow examples:\n- Drug discovery pipeline (disease → targets → structures → screening → candidates)\n\
      - Genomics analysis (expression data → differential analysis → pathways)\n\nRun examples to understand typical usage\
      \ patterns and workflow composition.\n\n## Best Practices\n\n1. **Tool Discovery:**\n   - Start with broad searches,\
      \ then refine based on results\n   - Use `Tool_Finder_Keyword` for fast searches with known terms\n   - Use `Tool_Finder_LLM`\
      \ for complex semantic queries\n   - Set appropriate `limit` parameter (default: 10)\n\n2. **Tool Execution:**\n   -\
      \ Always verify tool parameters before execution\n   - Implement error handling for production workflows\n   - Validate\
      \ input data formats (SMILES, UniProt IDs, gene symbols)\n   - Check result types and structures\n\n3. **Workflow Composition:**\n\
      \   - Test each step individually before composing full workflows\n   - Implement checkpointing for long workflows\n\
      \   - Consider rate limits for remote APIs\n   - Use parallel execution when tools are independent\n\n4. **Integration:**\n\
      \   - Initialize ToolUniverse once and reuse the instance\n   - Call `load_tools()` once at startup\n   - Cache frequently\
      \ used tool information\n   - Enable logging for debugging\n\n## Key Terminology\n\n- **Tool**: A scientific resource\
      \ (model, dataset, API, package) accessible through ToolUniverse\n- **Tool Discovery**: Finding relevant tools using\
      \ search methods (Finder, LLM, Keyword)\n- **Tool Execution**: Running a tool with specific arguments via `tu.run()`\n\
      - **Tool Composition**: Chaining multiple tools for multi-step workflows\n- **MCP**: Model Context Protocol for integration\
      \ with Claude Desktop/Code\n- **AI-Tool Interaction Protocol**: Standardized interface for LLM-tool communication\n\n\
      ## Resources\n\n- **Official Website**: https://aiscientist.tools\n- **GitHub**: https://github.com/mims-harvard/ToolUniverse\n\
      - **Documentation**: https://zitniklab.hms.harvard.edu/ToolUniverse/\n- **Installation**: `uv uv pip install tooluniverse`\n\
      - **MCP Server**: `tooluniverse-smcp`"
