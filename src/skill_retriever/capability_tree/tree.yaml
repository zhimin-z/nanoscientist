  - id: architecture-and-skill-design
    name: Architecture & Skill Design
    description: Use this group when you need to communicate or formalize how a system (or reusable assistant capability)
      should work. It includes diagramming for architectures/flows/ERDs and guidance for defining and packaging new skills
      with clear triggers, scopes, and workflows. Look here when the primary output is a design artifact/specification rather
