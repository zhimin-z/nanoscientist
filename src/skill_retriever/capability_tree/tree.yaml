  - id: statistical-analysis
    name: statistical-analysis
    description: Statistical analysis toolkit. Hypothesis tests (t-test, ANOVA, chi-square), regression, correlation, Bayesian
      stats, power analysis, assumption checks, APA reporting, for academic research.
    skill_path: data/skill_seeds/statistical-analysis/SKILL.md
    content: "# Statistical Analysis\n\n## Overview\n\nStatistical analysis is a systematic process for testing hypotheses\
      \ and quantifying relationships. Conduct hypothesis tests (t-test, ANOVA, chi-square), regression, correlation, and\
      \ Bayesian analyses with assumption checks and APA reporting. Apply this skill for academic research.\n\n## When to\
      \ Use This Skill\n\nThis skill should be used when:\n- Conducting statistical hypothesis tests (t-tests, ANOVA, chi-square)\n\
      - Performing regression or correlation analyses\n- Running Bayesian statistical analyses\n- Checking statistical assumptions\
      \ and diagnostics\n- Calculating effect sizes and conducting power analyses\n- Reporting statistical results in APA\
      \ format\n- Analyzing experimental or observational data for research\n\n---\n\n## Core Capabilities\n\n### 1. Test\
      \ Selection and Planning\n- Choose appropriate statistical tests based on research questions and data characteristics\n\
      - Conduct a priori power analyses to determine required sample sizes\n- Plan analysis strategies including multiple\
      \ comparison corrections\n\n### 2. Assumption Checking\n- Automatically verify all relevant assumptions before running\
      \ tests\n- Provide diagnostic visualizations (Q-Q plots, residual plots, box plots)\n- Recommend remedial actions when\
      \ assumptions are violated\n\n### 3. Statistical Testing\n- Hypothesis testing: t-tests, ANOVA, chi-square, non-parametric\
      \ alternatives\n- Regression: linear, multiple, logistic, with diagnostics\n- Correlations: Pearson, Spearman, with\
      \ confidence intervals\n- Bayesian alternatives: Bayesian t-tests, ANOVA, regression with Bayes Factors\n\n### 4. Effect\
      \ Sizes and Interpretation\n- Calculate and interpret appropriate effect sizes for all analyses\n- Provide confidence\
      \ intervals for effect estimates\n- Distinguish statistical from practical significance\n\n### 5. Professional Reporting\n\
      - Generate APA-style statistical reports\n- Create publication-ready figures and tables\n- Provide complete interpretation\
      \ with all required statistics\n\n---\n\n## Workflow Decision Tree\n\nUse this decision tree to determine your analysis\
      \ path:\n\n```\nSTART\n│\n├─ Need to SELECT a statistical test?\n│  └─ YES → See \"Test Selection Guide\"\n│  └─ NO\
      \ → Continue\n│\n├─ Ready to check ASSUMPTIONS?\n│  └─ YES → See \"Assumption Checking\"\n│  └─ NO → Continue\n│\n├─\
      \ Ready to run ANALYSIS?\n│  └─ YES → See \"Running Statistical Tests\"\n│  └─ NO → Continue\n│\n└─ Need to REPORT results?\n\
      \   └─ YES → See \"Reporting Results\"\n```\n\n---\n\n## Test Selection Guide\n\n### Quick Reference: Choosing the Right\
      \ Test\n\nUse `references/test_selection_guide.md` for comprehensive guidance. Quick reference:\n\n**Comparing Two Groups:**\n\
      - Independent, continuous, normal → Independent t-test\n- Independent, continuous, non-normal → Mann-Whitney U test\n\
      - Paired, continuous, normal → Paired t-test\n- Paired, continuous, non-normal → Wilcoxon signed-rank test\n- Binary\
      \ outcome → Chi-square or Fisher's exact test\n\n**Comparing 3+ Groups:**\n- Independent, continuous, normal → One-way\
      \ ANOVA\n- Independent, continuous, non-normal → Kruskal-Wallis test\n- Paired, continuous, normal → Repeated measures\
      \ ANOVA\n- Paired, continuous, non-normal → Friedman test\n\n**Relationships:**\n- Two continuous variables → Pearson\
      \ (normal) or Spearman correlation (non-normal)\n- Continuous outcome with predictor(s) → Linear regression\n- Binary\
      \ outcome with predictor(s) → Logistic regression\n\n**Bayesian Alternatives:**\nAll tests have Bayesian versions that\
      \ provide:\n- Direct probability statements about hypotheses\n- Bayes Factors quantifying evidence\n- Ability to support\
      \ null hypothesis\n- See `references/bayesian_statistics.md`\n\n---\n\n## Assumption Checking\n\n### Systematic Assumption\
      \ Verification\n\n**ALWAYS check assumptions before interpreting test results.**\n\nUse the provided `scripts/assumption_checks.py`\
      \ module for automated checking:\n\n```python\nfrom scripts.assumption_checks import comprehensive_assumption_check\n\
      \n# Comprehensive check with visualizations\nresults = comprehensive_assumption_check(\n    data=df,\n    value_col='score',\n\
      \    group_col='group',  # Optional: for group comparisons\n    alpha=0.05\n)\n```\n\nThis performs:\n1. **Outlier detection**\
      \ (IQR and z-score methods)\n2. **Normality testing** (Shapiro-Wilk test + Q-Q plots)\n3. **Homogeneity of variance**\
      \ (Levene's test + box plots)\n4. **Interpretation and recommendations**\n\n### Individual Assumption Checks\n\nFor\
      \ targeted checks, use individual functions:\n\n```python\nfrom scripts.assumption_checks import (\n    check_normality,\n\
      \    check_normality_per_group,\n    check_homogeneity_of_variance,\n    check_linearity,\n    detect_outliers\n)\n\n\
      # Example: Check normality with visualization\nresult = check_normality(\n    data=df['score'],\n    name='Test Score',\n\
      \    alpha=0.05,\n    plot=True\n)\nprint(result['interpretation'])\nprint(result['recommendation'])\n```\n\n### What\
      \ to Do When Assumptions Are Violated\n\n**Normality violated:**\n- Mild violation + n > 30 per group → Proceed with\
      \ parametric test (robust)\n- Moderate violation → Use non-parametric alternative\n- Severe violation → Transform data\
      \ or use non-parametric test\n\n**Homogeneity of variance violated:**\n- For t-test → Use Welch's t-test\n- For ANOVA\
      \ → Use Welch's ANOVA or Brown-Forsythe ANOVA\n- For regression → Use robust standard errors or weighted least squares\n\
      \n**Linearity violated (regression):**\n- Add polynomial terms\n- Transform variables\n- Use non-linear models or GAM\n\
      \nSee `references/assumptions_and_diagnostics.md` for comprehensive guidance.\n\n---\n\n## Running Statistical Tests\n\
      \n### Python Libraries\n\nPrimary libraries for statistical analysis:\n- **scipy.stats**: Core statistical tests\n-\
      \ **statsmodels**: Advanced regression and diagnostics\n- **pingouin**: User-friendly statistical testing with effect\
      \ sizes\n- **pymc**: Bayesian statistical modeling\n- **arviz**: Bayesian visualization and diagnostics\n\n### Example\
      \ Analyses\n\n#### T-Test with Complete Reporting\n\n```python\nimport pingouin as pg\nimport numpy as np\n\n# Run independent\
      \ t-test\nresult = pg.ttest(group_a, group_b, correction='auto')\n\n# Extract results\nt_stat = result['T'].values[0]\n\
      df = result['dof'].values[0]\np_value = result['p-val'].values[0]\ncohens_d = result['cohen-d'].values[0]\nci_lower\
      \ = result['CI95%'].values[0][0]\nci_upper = result['CI95%'].values[0][1]\n\n# Report\nprint(f\"t({df:.0f}) = {t_stat:.2f},\
      \ p = {p_value:.3f}\")\nprint(f\"Cohen's d = {cohens_d:.2f}, 95% CI [{ci_lower:.2f}, {ci_upper:.2f}]\")\n```\n\n####\
      \ ANOVA with Post-Hoc Tests\n\n```python\nimport pingouin as pg\n\n# One-way ANOVA\naov = pg.anova(dv='score', between='group',\
      \ data=df, detailed=True)\nprint(aov)\n\n# If significant, conduct post-hoc tests\nif aov['p-unc'].values[0] < 0.05:\n\
      \    posthoc = pg.pairwise_tukey(dv='score', between='group', data=df)\n    print(posthoc)\n\n# Effect size\neta_squared\
      \ = aov['np2'].values[0]  # Partial eta-squared\nprint(f\"Partial η² = {eta_squared:.3f}\")\n```\n\n#### Linear Regression\
      \ with Diagnostics\n\n```python\nimport statsmodels.api as sm\nfrom statsmodels.stats.outliers_influence import variance_inflation_factor\n\
      \n# Fit model\nX = sm.add_constant(X_predictors)  # Add intercept\nmodel = sm.OLS(y, X).fit()\n\n# Summary\nprint(model.summary())\n\
      \n# Check multicollinearity (VIF)\nvif_data = pd.DataFrame()\nvif_data[\"Variable\"] = X.columns\nvif_data[\"VIF\"]\
      \ = [variance_inflation_factor(X.values, i) for i in range(X.shape[1])]\nprint(vif_data)\n\n# Check assumptions\nresiduals\
      \ = model.resid\nfitted = model.fittedvalues\n\n# Residual plots\nimport matplotlib.pyplot as plt\nfig, axes = plt.subplots(2,\
      \ 2, figsize=(12, 10))\n\n# Residuals vs fitted\naxes[0, 0].scatter(fitted, residuals, alpha=0.6)\naxes[0, 0].axhline(y=0,\
      \ color='r', linestyle='--')\naxes[0, 0].set_xlabel('Fitted values')\naxes[0, 0].set_ylabel('Residuals')\naxes[0, 0].set_title('Residuals\
      \ vs Fitted')\n\n# Q-Q plot\nfrom scipy import stats\nstats.probplot(residuals, dist=\"norm\", plot=axes[0, 1])\naxes[0,\
      \ 1].set_title('Normal Q-Q')\n\n# Scale-Location\naxes[1, 0].scatter(fitted, np.sqrt(np.abs(residuals / residuals.std())),\
      \ alpha=0.6)\naxes[1, 0].set_xlabel('Fitted values')\naxes[1, 0].set_ylabel('√|Standardized residuals|')\naxes[1, 0].set_title('Scale-Location')\n\
      \n# Residuals histogram\naxes[1, 1].hist(residuals, bins=20, edgecolor='black', alpha=0.7)\naxes[1, 1].set_xlabel('Residuals')\n\
      axes[1, 1].set_ylabel('Frequency')\naxes[1, 1].set_title('Histogram of Residuals')\n\nplt.tight_layout()\nplt.show()\n\
      ```\n\n#### Bayesian T-Test\n\n```python\nimport pymc as pm\nimport arviz as az\nimport numpy as np\n\nwith pm.Model()\
      \ as model:\n    # Priors\n    mu1 = pm.Normal('mu_group1', mu=0, sigma=10)\n    mu2 = pm.Normal('mu_group2', mu=0,\
      \ sigma=10)\n    sigma = pm.HalfNormal('sigma', sigma=10)\n\n    # Likelihood\n    y1 = pm.Normal('y1', mu=mu1, sigma=sigma,\
      \ observed=group_a)\n    y2 = pm.Normal('y2', mu=mu2, sigma=sigma, observed=group_b)\n\n    # Derived quantity\n   \
      \ diff = pm.Deterministic('difference', mu1 - mu2)\n\n    # Sample\n    trace = pm.sample(2000, tune=1000, return_inferencedata=True)\n\
      \n# Summarize\nprint(az.summary(trace, var_names=['difference']))\n\n# Probability that group1 > group2\nprob_greater\
      \ = np.mean(trace.posterior['difference'].values > 0)\nprint(f\"P(μ₁ > μ₂ | data) = {prob_greater:.3f}\")\n\n# Plot\
      \ posterior\naz.plot_posterior(trace, var_names=['difference'], ref_val=0)\n```\n\n---\n\n## Effect Sizes\n\n### Always\
      \ Calculate Effect Sizes\n\n**Effect sizes quantify magnitude, while p-values only indicate existence of an effect.**\n\
      \nSee `references/effect_sizes_and_power.md` for comprehensive guidance.\n\n### Quick Reference: Common Effect Sizes\n\
      \n| Test | Effect Size | Small | Medium | Large |\n|------|-------------|-------|--------|-------|\n| T-test | Cohen's\
      \ d | 0.20 | 0.50 | 0.80 |\n| ANOVA | η²_p | 0.01 | 0.06 | 0.14 |\n| Correlation | r | 0.10 | 0.30 | 0.50 |\n| Regression\
      \ | R² | 0.02 | 0.13 | 0.26 |\n| Chi-square | Cramér's V | 0.07 | 0.21 | 0.35 |\n\n**Important**: Benchmarks are guidelines.\
      \ Context matters!\n\n### Calculating Effect Sizes\n\nMost effect sizes are automatically calculated by pingouin:\n\n\
      ```python\n# T-test returns Cohen's d\nresult = pg.ttest(x, y)\nd = result['cohen-d'].values[0]\n\n# ANOVA returns partial\
      \ eta-squared\naov = pg.anova(dv='score', between='group', data=df)\neta_p2 = aov['np2'].values[0]\n\n# Correlation:\
      \ r is already an effect size\ncorr = pg.corr(x, y)\nr = corr['r'].values[0]\n```\n\n### Confidence Intervals for Effect\
      \ Sizes\n\nAlways report CIs to show precision:\n\n```python\nfrom pingouin import compute_effsize_from_t\n\n# For t-test\n\
      d, ci = compute_effsize_from_t(\n    t_statistic,\n    nx=len(group1),\n    ny=len(group2),\n    eftype='cohen'\n)\n\
      print(f\"d = {d:.2f}, 95% CI [{ci[0]:.2f}, {ci[1]:.2f}]\")\n```\n\n---\n\n## Power Analysis\n\n### A Priori Power Analysis\
      \ (Study Planning)\n\nDetermine required sample size before data collection:\n\n```python\nfrom statsmodels.stats.power\
      \ import (\n    tt_ind_solve_power,\n    FTestAnovaPower\n)\n\n# T-test: What n is needed to detect d = 0.5?\nn_required\
      \ = tt_ind_solve_power(\n    effect_size=0.5,\n    alpha=0.05,\n    power=0.80,\n    ratio=1.0,\n    alternative='two-sided'\n\
      )\nprint(f\"Required n per group: {n_required:.0f}\")\n\n# ANOVA: What n is needed to detect f = 0.25?\nanova_power\
      \ = FTestAnovaPower()\nn_per_group = anova_power.solve_power(\n    effect_size=0.25,\n    ngroups=3,\n    alpha=0.05,\n\
      \    power=0.80\n)\nprint(f\"Required n per group: {n_per_group:.0f}\")\n```\n\n### Sensitivity Analysis (Post-Study)\n\
      \nDetermine what effect size you could detect:\n\n```python\n# With n=50 per group, what effect could we detect?\ndetectable_d\
      \ = tt_ind_solve_power(\n    effect_size=None,  # Solve for this\n    nobs1=50,\n    alpha=0.05,\n    power=0.80,\n\
      \    ratio=1.0,\n    alternative='two-sided'\n)\nprint(f\"Study could detect d ≥ {detectable_d:.2f}\")\n```\n\n**Note**:\
      \ Post-hoc power analysis (calculating power after study) is generally not recommended. Use sensitivity analysis instead.\n\
      \nSee `references/effect_sizes_and_power.md` for detailed guidance.\n\n---\n\n## Reporting Results\n\n### APA Style\
      \ Statistical Reporting\n\nFollow guidelines in `references/reporting_standards.md`.\n\n### Essential Reporting Elements\n\
      \n1. **Descriptive statistics**: M, SD, n for all groups/variables\n2. **Test statistics**: Test name, statistic, df,\
      \ exact p-value\n3. **Effect sizes**: With confidence intervals\n4. **Assumption checks**: Which tests were done, results,\
      \ actions taken\n5. **All planned analyses**: Including non-significant findings\n\n### Example Report Templates\n\n\
      #### Independent T-Test\n\n```\nGroup A (n = 48, M = 75.2, SD = 8.5) scored significantly higher than\nGroup B (n =\
      \ 52, M = 68.3, SD = 9.2), t(98) = 3.82, p < .001, d = 0.77,\n95% CI [0.36, 1.18], two-tailed. Assumptions of normality\
      \ (Shapiro-Wilk:\nGroup A W = 0.97, p = .18; Group B W = 0.96, p = .12) and homogeneity\nof variance (Levene's F(1,\
      \ 98) = 1.23, p = .27) were satisfied.\n```\n\n#### One-Way ANOVA\n\n```\nA one-way ANOVA revealed a significant main\
      \ effect of treatment condition\non test scores, F(2, 147) = 8.45, p < .001, η²_p = .10. Post hoc\ncomparisons using\
      \ Tukey's HSD indicated that Condition A (M = 78.2,\nSD = 7.3) scored significantly higher than Condition B (M = 71.5,\n\
      SD = 8.1, p = .002, d = 0.87) and Condition C (M = 70.1, SD = 7.9,\np < .001, d = 1.07). Conditions B and C did not\
      \ differ significantly\n(p = .52, d = 0.18).\n```\n\n#### Multiple Regression\n\n```\nMultiple linear regression was\
      \ conducted to predict exam scores from\nstudy hours, prior GPA, and attendance. The overall model was significant,\n\
      F(3, 146) = 45.2, p < .001, R² = .48, adjusted R² = .47. Study hours\n(B = 1.80, SE = 0.31, β = .35, t = 5.78, p < .001,\
      \ 95% CI [1.18, 2.42])\nand prior GPA (B = 8.52, SE = 1.95, β = .28, t = 4.37, p < .001,\n95% CI [4.66, 12.38]) were\
      \ significant predictors, while attendance was\nnot (B = 0.15, SE = 0.12, β = .08, t = 1.25, p = .21, 95% CI [-0.09,\
      \ 0.39]).\nMulticollinearity was not a concern (all VIF < 1.5).\n```\n\n#### Bayesian Analysis\n\n```\nA Bayesian independent\
      \ samples t-test was conducted using weakly\ninformative priors (Normal(0, 1) for mean difference). The posterior\n\
      distribution indicated that Group A scored higher than Group B\n(M_diff = 6.8, 95% credible interval [3.2, 10.4]). The\
      \ Bayes Factor\nBF₁₀ = 45.3 provided very strong evidence for a difference between\ngroups, with a 99.8% posterior probability\
      \ that Group A's mean exceeded\nGroup B's mean. Convergence diagnostics were satisfactory (all R̂ < 1.01,\nESS > 1000).\n\
      ```\n\n---\n\n## Bayesian Statistics\n\n### When to Use Bayesian Methods\n\nConsider Bayesian approaches when:\n- You\
      \ have prior information to incorporate\n- You want direct probability statements about hypotheses\n- Sample size is\
      \ small or planning sequential data collection\n- You need to quantify evidence for the null hypothesis\n- The model\
      \ is complex (hierarchical, missing data)\n\nSee `references/bayesian_statistics.md` for comprehensive guidance on:\n\
      - Bayes' theorem and interpretation\n- Prior specification (informative, weakly informative, non-informative)\n- Bayesian\
      \ hypothesis testing with Bayes Factors\n- Credible intervals vs. confidence intervals\n- Bayesian t-tests, ANOVA, regression,\
      \ and hierarchical models\n- Model convergence checking and posterior predictive checks\n\n### Key Advantages\n\n1.\
      \ **Intuitive interpretation**: \"Given the data, there is a 95% probability the parameter is in this interval\"\n2.\
      \ **Evidence for null**: Can quantify support for no effect\n3. **Flexible**: No p-hacking concerns; can analyze data\
      \ as it arrives\n4. **Uncertainty quantification**: Full posterior distribution\n\n---\n\n## Resources\n\nThis skill\
      \ includes comprehensive reference materials:\n\n### References Directory\n\n- **test_selection_guide.md**: Decision\
      \ tree for choosing appropriate statistical tests\n- **assumptions_and_diagnostics.md**: Detailed guidance on checking\
      \ and handling assumption violations\n- **effect_sizes_and_power.md**: Calculating, interpreting, and reporting effect\
      \ sizes; conducting power analyses\n- **bayesian_statistics.md**: Complete guide to Bayesian analysis methods\n- **reporting_standards.md**:\
      \ APA-style reporting guidelines with examples\n\n### Scripts Directory\n\n- **assumption_checks.py**: Automated assumption\
      \ checking with visualizations\n  - `comprehensive_assumption_check()`: Complete workflow\n  - `check_normality()`:\
      \ Normality testing with Q-Q plots\n  - `check_homogeneity_of_variance()`: Levene's test with box plots\n  - `check_linearity()`:\
      \ Regression linearity checks\n  - `detect_outliers()`: IQR and z-score outlier detection\n\n---\n\n## Best Practices\n\
      \n1. **Pre-register analyses** when possible to distinguish confirmatory from exploratory\n2. **Always check assumptions**\
      \ before interpreting results\n3. **Report effect sizes** with confidence intervals\n4. **Report all planned analyses**\
      \ including non-significant results\n5. **Distinguish statistical from practical significance**\n6. **Visualize data**\
      \ before and after analysis\n7. **Check diagnostics** for regression/ANOVA (residual plots, VIF, etc.)\n8. **Conduct\
      \ sensitivity analyses** to assess robustness\n9. **Share data and code** for reproducibility\n10. **Be transparent**\
      \ about violations, transformations, and decisions\n\n---\n\n## Common Pitfalls to Avoid\n\n1. **P-hacking**: Don't\
      \ test multiple ways until something is significant\n2. **HARKing**: Don't present exploratory findings as confirmatory\n\
      3. **Ignoring assumptions**: Check them and report violations\n4. **Confusing significance with importance**: p < .05\
      \ ≠ meaningful effect\n5. **Not reporting effect sizes**: Essential for interpretation\n6. **Cherry-picking results**:\
      \ Report all planned analyses\n7. **Misinterpreting p-values**: They're NOT probability that hypothesis is true\n8.\
      \ **Multiple comparisons**: Correct for family-wise error when appropriate\n9. **Ignoring missing data**: Understand\
      \ mechanism (MCAR, MAR, MNAR)\n10. **Overinterpreting non-significant results**: Absence of evidence ≠ evidence of absence\n\
      \n---\n\n## Getting Started Checklist\n\nWhen beginning a statistical analysis:\n\n- [ ] Define research question and\
      \ hypotheses\n- [ ] Determine appropriate statistical test (use test_selection_guide.md)\n- [ ] Conduct power analysis\
      \ to determine sample size\n- [ ] Load and inspect data\n- [ ] Check for missing data and outliers\n- [ ] Verify assumptions\
      \ using assumption_checks.py\n- [ ] Run primary analysis\n- [ ] Calculate effect sizes with confidence intervals\n-\
      \ [ ] Conduct post-hoc tests if needed (with corrections)\n- [ ] Create visualizations\n- [ ] Write results following\
      \ reporting_standards.md\n- [ ] Conduct sensitivity analyses\n- [ ] Share data and code\n\n---\n\n## Support and Further\
      \ Reading\n\nFor questions about:\n- **Test selection**: See references/test_selection_guide.md\n- **Assumptions**:\
      \ See references/assumptions_and_diagnostics.md\n- **Effect sizes**: See references/effect_sizes_and_power.md\n- **Bayesian\
      \ methods**: See references/bayesian_statistics.md\n- **Reporting**: See references/reporting_standards.md\n\n**Key\
      \ textbooks**:\n- Cohen, J. (1988). *Statistical Power Analysis for the Behavioral Sciences*\n- Field, A. (2013). *Discovering\
      \ Statistics Using IBM SPSS Statistics*\n- Gelman, A., & Hill, J. (2006). *Data Analysis Using Regression and Multilevel/Hierarchical\
      \ Models*\n- Kruschke, J. K. (2014). *Doing Bayesian Data Analysis*\n\n**Online resources**:\n- APA Style Guide: https://apastyle.apa.org/\n\
      - Statistical Consulting: Cross Validated (stats.stackexchange.com)"
