  - id: markitdown
    name: markitdown
    description: Convert files and office documents to Markdown. Supports PDF, DOCX, PPTX, XLSX, images (with OCR), audio
      (with transcription), HTML, CSV, JSON, XML, ZIP, YouTube URLs, EPubs and more.
    skill_path: data/skill_seeds/markitdown/SKILL.md
    content: "# MarkItDown - File to Markdown Conversion\n\n## Overview\n\nMarkItDown is a Python tool developed by Microsoft\
      \ for converting various file formats to Markdown. It's particularly useful for converting documents into LLM-friendly\
      \ text format, as Markdown is token-efficient and well-understood by modern language models.\n\n**Key Benefits**:\n\
      - Convert documents to clean, structured Markdown\n- Token-efficient format for LLM processing\n- Supports 15+ file\
      \ formats\n- Optional AI-enhanced image descriptions\n- OCR for images and scanned documents\n- Speech transcription\
      \ for audio files\n\n## Visual Enhancement with Scientific Schematics\n\n**When creating documents with this skill,\
      \ always consider adding scientific diagrams and schematics to enhance visual communication.**\n\nIf your document does\
      \ not already contain schematics or diagrams:\n- Use the **scientific-schematics** skill to generate AI-powered publication-quality\
      \ diagrams\n- Simply describe your desired diagram in natural language\n- Nano Banana Pro will automatically generate,\
      \ review, and refine the schematic\n\n**For new documents:** Scientific schematics should be generated by default to\
      \ visually represent key concepts, workflows, architectures, or relationships described in the text.\n\n**How to generate\
      \ schematics:**\n```bash\npython scripts/generate_schematic.py \"your diagram description\" -o figures/output.png\n\
      ```\n\nThe AI will automatically:\n- Create publication-quality images with proper formatting\n- Review and refine through\
      \ multiple iterations\n- Ensure accessibility (colorblind-friendly, high contrast)\n- Save outputs in the figures/ directory\n\
      \n**When to add schematics:**\n- Document conversion workflow diagrams\n- File format architecture illustrations\n-\
      \ OCR processing pipeline diagrams\n- Integration workflow visualizations\n- System architecture diagrams\n- Data flow\
      \ diagrams\n- Any complex concept that benefits from visualization\n\nFor detailed guidance on creating schematics,\
      \ refer to the scientific-schematics skill documentation.\n\n---\n\n## Supported Formats\n\n| Format | Description |\
      \ Notes |\n|--------|-------------|-------|\n| **PDF** | Portable Document Format | Full text extraction |\n| **DOCX**\
      \ | Microsoft Word | Tables, formatting preserved |\n| **PPTX** | PowerPoint | Slides with notes |\n| **XLSX** | Excel\
      \ spreadsheets | Tables and data |\n| **Images** | JPEG, PNG, GIF, WebP | EXIF metadata + OCR |\n| **Audio** | WAV,\
      \ MP3 | Metadata + transcription |\n| **HTML** | Web pages | Clean conversion |\n| **CSV** | Comma-separated values\
      \ | Table format |\n| **JSON** | JSON data | Structured representation |\n| **XML** | XML documents | Structured format\
      \ |\n| **ZIP** | Archive files | Iterates contents |\n| **EPUB** | E-books | Full text extraction |\n| **YouTube** |\
      \ Video URLs | Fetch transcriptions |\n\n## Quick Start\n\n### Installation\n\n```bash\n# Install with all features\n\
      pip install 'markitdown[all]'\n\n# Or from source\ngit clone https://github.com/microsoft/markitdown.git\ncd markitdown\n\
      pip install -e 'packages/markitdown[all]'\n```\n\n### Command-Line Usage\n\n```bash\n# Basic conversion\nmarkitdown\
      \ document.pdf > output.md\n\n# Specify output file\nmarkitdown document.pdf -o output.md\n\n# Pipe content\ncat document.pdf\
      \ | markitdown > output.md\n\n# Enable plugins\nmarkitdown --list-plugins  # List available plugins\nmarkitdown --use-plugins\
      \ document.pdf -o output.md\n```\n\n### Python API\n\n```python\nfrom markitdown import MarkItDown\n\n# Basic usage\n\
      md = MarkItDown()\nresult = md.convert(\"document.pdf\")\nprint(result.text_content)\n\n# Convert from stream\nwith\
      \ open(\"document.pdf\", \"rb\") as f:\n    result = md.convert_stream(f, file_extension=\".pdf\")\n    print(result.text_content)\n\
      ```\n\n## Advanced Features\n\n### 1. AI-Enhanced Image Descriptions\n\nUse LLMs via OpenRouter to generate detailed\
      \ image descriptions (for PPTX and image files):\n\n```python\nfrom markitdown import MarkItDown\nfrom openai import\
      \ OpenAI\n\n# Initialize OpenRouter client (OpenAI-compatible API)\nclient = OpenAI(\n    api_key=\"your-openrouter-api-key\"\
      ,\n    base_url=\"https://openrouter.ai/api/v1\"\n)\n\nmd = MarkItDown(\n    llm_client=client,\n    llm_model=\"anthropic/claude-sonnet-4.5\"\
      ,  # recommended for scientific vision\n    llm_prompt=\"Describe this image in detail for scientific documentation\"\
      \n)\n\nresult = md.convert(\"presentation.pptx\")\nprint(result.text_content)\n```\n\n### 2. Azure Document Intelligence\n\
      \nFor enhanced PDF conversion with Microsoft Document Intelligence:\n\n```bash\n# Command line\nmarkitdown document.pdf\
      \ -o output.md -d -e \"<document_intelligence_endpoint>\"\n```\n\n```python\n# Python API\nfrom markitdown import MarkItDown\n\
      \nmd = MarkItDown(docintel_endpoint=\"<document_intelligence_endpoint>\")\nresult = md.convert(\"complex_document.pdf\"\
      )\nprint(result.text_content)\n```\n\n### 3. Plugin System\n\nMarkItDown supports 3rd-party plugins for extending functionality:\n\
      \n```bash\n# List installed plugins\nmarkitdown --list-plugins\n\n# Enable plugins\nmarkitdown --use-plugins file.pdf\
      \ -o output.md\n```\n\nFind plugins on GitHub with hashtag: `#markitdown-plugin`\n\n## Optional Dependencies\n\nControl\
      \ which file formats you support:\n\n```bash\n# Install specific formats\npip install 'markitdown[pdf, docx, pptx]'\n\
      \n# All available options:\n# [all]                  - All optional dependencies\n# [pptx]                 - PowerPoint\
      \ files\n# [docx]                 - Word documents\n# [xlsx]                 - Excel spreadsheets\n# [xls]         \
      \         - Older Excel files\n# [pdf]                  - PDF documents\n# [outlook]              - Outlook messages\n\
      # [az-doc-intel]         - Azure Document Intelligence\n# [audio-transcription]  - WAV and MP3 transcription\n# [youtube-transcription]\
      \ - YouTube video transcription\n```\n\n## Common Use Cases\n\n### 1. Convert Scientific Papers to Markdown\n\n```python\n\
      from markitdown import MarkItDown\n\nmd = MarkItDown()\n\n# Convert PDF paper\nresult = md.convert(\"research_paper.pdf\"\
      )\nwith open(\"paper.md\", \"w\") as f:\n    f.write(result.text_content)\n```\n\n### 2. Extract Data from Excel for\
      \ Analysis\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown()\nresult = md.convert(\"data.xlsx\")\n\
      \n# Result will be in Markdown table format\nprint(result.text_content)\n```\n\n### 3. Process Multiple Documents\n\n\
      ```python\nfrom markitdown import MarkItDown\nimport os\nfrom pathlib import Path\n\nmd = MarkItDown()\n\n# Process\
      \ all PDFs in a directory\npdf_dir = Path(\"papers/\")\noutput_dir = Path(\"markdown_output/\")\noutput_dir.mkdir(exist_ok=True)\n\
      \nfor pdf_file in pdf_dir.glob(\"*.pdf\"):\n    result = md.convert(str(pdf_file))\n    output_file = output_dir / f\"\
      {pdf_file.stem}.md\"\n    output_file.write_text(result.text_content)\n    print(f\"Converted: {pdf_file.name}\")\n\
      ```\n\n### 4. Convert PowerPoint with AI Descriptions\n\n```python\nfrom markitdown import MarkItDown\nfrom openai import\
      \ OpenAI\n\n# Use OpenRouter for access to multiple AI models\nclient = OpenAI(\n    api_key=\"your-openrouter-api-key\"\
      ,\n    base_url=\"https://openrouter.ai/api/v1\"\n)\n\nmd = MarkItDown(\n    llm_client=client,\n    llm_model=\"anthropic/claude-sonnet-4.5\"\
      ,  # recommended for presentations\n    llm_prompt=\"Describe this slide image in detail, focusing on key visual elements\
      \ and data\"\n)\n\nresult = md.convert(\"presentation.pptx\")\nwith open(\"presentation.md\", \"w\") as f:\n    f.write(result.text_content)\n\
      ```\n\n### 5. Batch Convert with Different Formats\n\n```python\nfrom markitdown import MarkItDown\nfrom pathlib import\
      \ Path\n\nmd = MarkItDown()\n\n# Files to convert\nfiles = [\n    \"document.pdf\",\n    \"spreadsheet.xlsx\",\n   \
      \ \"presentation.pptx\",\n    \"notes.docx\"\n]\n\nfor file in files:\n    try:\n        result = md.convert(file)\n\
      \        output = Path(file).stem + \".md\"\n        with open(output, \"w\") as f:\n            f.write(result.text_content)\n\
      \        print(f\"✓ Converted {file}\")\n    except Exception as e:\n        print(f\"✗ Error converting {file}: {e}\"\
      )\n```\n\n### 6. Extract YouTube Video Transcription\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown()\n\
      \n# Convert YouTube video to transcript\nresult = md.convert(\"https://www.youtube.com/watch?v=VIDEO_ID\")\nprint(result.text_content)\n\
      ```\n\n## Docker Usage\n\n```bash\n# Build image\ndocker build -t markitdown:latest .\n\n# Run conversion\ndocker run\
      \ --rm -i markitdown:latest < ~/document.pdf > output.md\n```\n\n## Best Practices\n\n### 1. Choose the Right Conversion\
      \ Method\n\n- **Simple documents**: Use basic `MarkItDown()`\n- **Complex PDFs**: Use Azure Document Intelligence\n\
      - **Visual content**: Enable AI image descriptions\n- **Scanned documents**: Ensure OCR dependencies are installed\n\
      \n### 2. Handle Errors Gracefully\n\n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown()\n\ntry:\n   \
      \ result = md.convert(\"document.pdf\")\n    print(result.text_content)\nexcept FileNotFoundError:\n    print(\"File\
      \ not found\")\nexcept Exception as e:\n    print(f\"Conversion error: {e}\")\n```\n\n### 3. Process Large Files Efficiently\n\
      \n```python\nfrom markitdown import MarkItDown\n\nmd = MarkItDown()\n\n# For large files, use streaming\nwith open(\"\
      large_file.pdf\", \"rb\") as f:\n    result = md.convert_stream(f, file_extension=\".pdf\")\n    \n    # Process in\
      \ chunks or save directly\n    with open(\"output.md\", \"w\") as out:\n        out.write(result.text_content)\n```\n\
      \n### 4. Optimize for Token Efficiency\n\nMarkdown output is already token-efficient, but you can:\n- Remove excessive\
      \ whitespace\n- Consolidate similar sections\n- Strip metadata if not needed\n\n```python\nfrom markitdown import MarkItDown\n\
      import re\n\nmd = MarkItDown()\nresult = md.convert(\"document.pdf\")\n\n# Clean up extra whitespace\nclean_text = re.sub(r'\\\
      n{3,}', '\\n\\n', result.text_content)\nclean_text = clean_text.strip()\n\nprint(clean_text)\n```\n\n## Integration\
      \ with Scientific Workflows\n\n### Convert Literature for Review\n\n```python\nfrom markitdown import MarkItDown\nfrom\
      \ pathlib import Path\n\nmd = MarkItDown()\n\n# Convert all papers in literature folder\npapers_dir = Path(\"literature/pdfs\"\
      )\noutput_dir = Path(\"literature/markdown\")\noutput_dir.mkdir(exist_ok=True)\n\nfor paper in papers_dir.glob(\"*.pdf\"\
      ):\n    result = md.convert(str(paper))\n    \n    # Save with metadata\n    output_file = output_dir / f\"{paper.stem}.md\"\
      \n    content = f\"# {paper.stem}\\n\\n\"\n    content += f\"**Source**: {paper.name}\\n\\n\"\n    content += \"---\\\
      n\\n\"\n    content += result.text_content\n    \n    output_file.write_text(content)\n\n# For AI-enhanced conversion\
      \ with figures\nfrom openai import OpenAI\n\nclient = OpenAI(\n    api_key=\"your-openrouter-api-key\",\n    base_url=\"\
      https://openrouter.ai/api/v1\"\n)\n\nmd_ai = MarkItDown(\n    llm_client=client,\n    llm_model=\"anthropic/claude-sonnet-4.5\"\
      ,\n    llm_prompt=\"Describe scientific figures with technical precision\"\n)\n```\n\n### Extract Tables for Analysis\n\
