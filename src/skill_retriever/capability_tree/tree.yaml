    - id: resolve-conflicts
      name: resolve-conflicts
      description: Use this skill immediately when the user mentions merge conflicts that need to be resolved. Do not attempt
        to resolve conflicts directly - invoke this skill first. This skill specializes in providing a structured framework
        for merging imports, tests, lock files (regeneration), configuration files, and handling deleted-but-modified files
        with backup and analysis.
      skill_path: data/skill_seeds/resolve-conflicts/SKILL.md
      content: "# Git Conflict Resolution\n\nResolve Git merge conflicts by intelligently combining changes from both branches\
        \ while preserving the intent of both changes. This skill follows a plan-first approach: assess conflicts, create\
        \ a detailed resolution plan, get approval, then execute.\n\n## Core Principles\n\n1. **Plan Before Executing**: Always\
        \ create a structured resolution plan and get user approval before making changes\n2. **Prefer Both Changes**: Default\
        \ to keeping both changes unless they directly contradict\n3. **Merge, Don't Choose**: Especially for imports, tests,\
        \ and configuration\n4. **Regenerate Generated Files**: Never manually merge generated files - always regenerate them\
        \ from their sources\n5. **Backup Before Resolving**: For deleted-modified files, create backups first\n6. **Validate\
        \ with Tests**: Always run tests after resolution\n7. **Explain All Resolutions**: For each conflict resolved, provide\
        \ a one-line explanation of the resolution strategy\n8. **Ask When Unclear**: When the correct resolution isn't clear\
        \ from the diff, present options to the user and ask for their choice\n\n## Workflow\n\n### Step 1: Assess the Conflict\
        \ Situation\n\nRun initial checks to understand the conflict scope:\n\n```bash\ngit status\n```\n\nIdentify and categorize\
        \ all conflicted files:\n\n- Regular file conflicts (both modified)\n- Deleted-modified conflicts (one deleted, one\
        \ modified)\n- Generated file conflicts (lock files, build artifacts, generated code)\n- Test file conflicts\n- Import/configuration\
        \ conflicts\n- Binary file conflicts\n\nFor each conflicted file, gather information:\n\n- File type and purpose\n\
        - Nature of the conflict (content, deletion, type change)\n- Scope of changes (lines changed, sections affected)\n\
        - Whether the file is generated or hand-written\n\n### Step 2: Create Merge Resolution Plan\n\nBased on the assessment,\
        \ create a structured plan before resolving any conflicts. Present the plan in the following markdown format:\n\n\
        ```markdown\n## Merge Resolution Plan\n\n### Conflict Summary\n\n- **Total conflicted files**: [N]\n- **Deleted-modified\
        \ conflicts**: [N]\n- **Generated files**: [N]\n- **Regular conflicts**: [N]\n\n### Resolution Strategy by File\n\n\
        #### 1. [File Path]\n\n**Conflict Type**: [deleted-modified / generated / imports / tests / code logic / config /\
        \ struct / binary]\n**Strategy**: [Brief description of resolution approach]\n**Rationale**: [Why this strategy is\
        \ appropriate]\n**Risk**: [Low/Medium/High] - [Brief risk description]\n**Action Items**:\n\n- [ ] [Specific action\
        \ 1]\n- [ ] [Specific action 2]\n\n#### 2. [File Path]\n\n...\n\n### Execution Order\n\n1. **Phase 1: Deleted-Modified\
        \ Files** - Handle deletions and backups first\n2. **Phase 2: Generated Files** - Regenerate from source\n3. **Phase\
        \ 3: Low-Risk Merges** - Imports, tests, documentation\n4. **Phase 4: High-Risk Merges** - Code logic, configuration,\
        \ structs\n5. **Phase 5: Validation** - Compile, test, verify\n\n### Questions/Decisions Needed\n\n- [ ] **[File/Decision]**:\
        \ [Question for user] (Options: 1, 2, 3)\n\n### Validation Steps\n\n- [ ] Run conflict validation script\n- [ ] Compile\
        \ project\n- [ ] Run test suite\n- [ ] Manual verification of high-risk changes\n```\n\n**Present this plan to the\
        \ user** and wait for their approval before proceeding with resolution. If there are any unclear conflicts where you\
        \ need user input, list them in the \"Questions/Decisions Needed\" section.\n\n**For a complete example plan**, see\
        \ `references/sample-plan.md`.\n\n### Step 3: Handle Deleted-Modified Files\n\n**Execute this phase only after the\
        \ plan is approved.**\n\nIf there are deleted-but-modified files (status: DU, UD, DD, UA, AU):\n\n```bash\n.forge/skills/resolve-conflicts/scripts/handle-deleted-modified.sh\n\
        ```\n\nThis script will:\n\n- Create timestamped backups of modified content\n- Analyze potential relocation targets\n\
        - Generate analysis reports for each file\n- Automatically resolve the deletion status\n\nReview the backup directory\
        \ and analysis files to understand where changes should be applied.\n\n### Step 4: Execute Resolution Plan\n\n**Follow\
        \ the execution order defined in your plan.** For each conflicted file, apply the appropriate resolution pattern according\
        \ to your plan. **For every conflict you resolve, provide a one-line explanation** of how you're resolving it.\n\n\
        As you complete each action item in your plan, mark it as done and report progress to the user.\n\n#### When Resolution\
        \ is Unclear\n\nWhen you cannot determine the correct resolution from the diff alone (these should already be listed\
        \ in your plan's \"Questions/Decisions Needed\" section):\n\n1. **Present the conflict** to the user with the conflicting\
        \ code from both sides\n2. **Provide numbered options** for resolution (Option 1, Option 2, etc.)\n3. **Explain each\
        \ option** clearly with what it would do\n4. **Ask the user to choose** an option number or provide additional information\n\
        5. **Remember their choice** and apply similar reasoning to subsequent related conflicts\n\n**Example interaction:**\n\
        \n```\nI found a conflict in src/main.rs where both branches modify the `calculate_price` function:\n\n<<<<<<< HEAD\
        \ (Current Branch)\nfn calculate_price(item: &Item) -> f64 {\n    item.base_price * (1.0 + item.tax_rate)\n}\n=======\n\
        fn calculate_price(item: &Item) -> f64 {\n    item.base_price + item.tax_amount\n}\n>>>>>>> feature-branch (Incoming\
        \ Branch)\n\nI'm not sure which calculation is correct. Please select an option:\n\n**Option 1**: Keep current branch\
        \ (multiplies base_price by tax_rate)\n**Option 2**: Keep incoming branch (adds tax_amount to base_price)\n**Option\
        \ 3**: Keep both approaches with a new parameter\n**Option 4**: Provide more context to help me decide\n\nPlease respond\
        \ with \"Option 1\", \"Option 2\", \"Option 3\", or \"Option 4\", or provide additional information.\n```\n\nOnce\
        \ the user responds, apply their decision and similar logic to related conflicts.\n\n#### Resolution Patterns\n\n\
        For each conflicted file, apply the appropriate resolution pattern:\n\n#### Imports/Dependencies\n\n**Goal**: Merge\
        \ all unique imports from both branches.\n\n**One-line explanation**: \"Merging imports by combining unique imports\
        \ from both branches, removing duplicates, and grouping by module.\"\n\nRead `references/patterns.md` section \"Import\
        \ Conflicts\" for detailed examples.\n\n**Quick approach:**\n\n1. Extract all imports from both sides\n2. Remove duplicates\n\
        3. Group by module/package\n4. Follow language-specific style (alphabetize, group std/external/internal)\n\n#### Tests\n\
        \n**Goal**: Include all test cases and test data from both branches.\n\n**One-line explanation**: \"Merging tests\
        \ by including all test cases from both branches, combining fixtures, and renaming if necessary to avoid conflicts.\"\
        \n\nRead `references/patterns.md` section \"Test Conflicts\" for detailed examples.\n\n**Quick approach:**\n\n1. Keep\
        \ all test functions unless they test the exact same thing\n2. Merge test fixtures and setup functions\n3. Combine\
        \ assertions from both sides\n4. If test names conflict but test different behaviors, rename to clarify\n\n#### Generated\
        \ Files\n\n**Goal**: Regenerate any generated files to include changes from both branches.\n\n**One-line explanation**:\
        \ \"Resolving generated file by regenerating it from source files to incorporate changes from both branches.\"\n\n\
        **Recognition**: A file is generated if it:\n\n- Is produced by a build tool, compiler, or code generator\n- Has a\
        \ source file or configuration that defines it\n- Contains headers/comments indicating it's auto-generated\n- Is listed\
        \ in `.gitattributes` as generated\n- Common examples: lock files, protobuf outputs, GraphQL schema files, compiled\
        \ assets, auto-generated docs\n\n**Approach:**\n\n1. **Identify the generation source**: Determine what command or\
        \ tool generates the file\n2. **Choose either version** temporarily (doesn't matter which):\n\n   ```bash\n   git\
        \ checkout --ours <generated-file>    # or --theirs\n   ```\n\n3. **Regenerate from source**: Run the appropriate\
        \ generation command:\n\n   ```bash\n   # Package manager lock files\n   cargo update                       # for\
        \ Cargo.lock\n   npm install                        # for package-lock.json\n   yarn install                     \
        \  # for yarn.lock\n   bundle install                     # for Gemfile.lock\n   poetry lock --no-update         \
        \   # for poetry.lock\n\n   # Code generation\n   protoc ...                         # for protobuf files\n   graphql-codegen\
        \                    # for GraphQL generated code\n   make generate                      # for Makefile-based generation\n\
        \   npm run generate                   # for npm script-based generation\n\n   # Build artifacts\n   npm run build\
        \                      # for compiled/bundled assets\n   cargo build                        # for Rust build artifacts\n\
        \   ```\n\n4. **Stage the regenerated file**:\n   ```bash\n   git add <generated-file>\n   ```\n\n**When unsure if\
        \ a file is generated**: Check for auto-generation markers in the file header, or ask the user if you should regenerate\
        \ or manually merge the file.\n\n#### Configuration Files\n\n**Goal**: Merge configuration values from both branches.\n\
        \n**One-line explanation**: \"Merging configuration by including all keys from both branches and choosing appropriate\
        \ values for conflicts.\"\n\nRead `references/patterns.md` section \"Configuration File Conflicts\" for detailed examples.\n\
        \n**Quick approach:**\n\n1. Include all keys from both sides\n2. For conflicting values, choose based on:\n   - Newer/more\
        \ recent value\n   - Safer/more conservative value\n   - Production requirements\n3. Document choice in commit message\n\
        \n**When unclear**: Ask the user which configuration value to prefer (current vs incoming)\n\n#### Code Logic\n\n\
        **Goal**: Understand intent of both changes and combine if possible.\n\n**One-line explanation**: \"Resolving code\
        \ logic by analyzing intent: merging if changes are orthogonal, or choosing one approach if they conflict.\"\n\nRead\
        \ `references/patterns.md` section \"Code Logic Conflicts\" for detailed examples.\n\n**Quick approach:**\n\n1. Analyze\
        \ what each branch is trying to achieve\n2. If changes are orthogonal (different concerns), merge both\n3. If changes\
        \ conflict (same concern, different approach):\n   - Review commit messages/PRs for context\n   - Choose the approach\
        \ that matches requirements\n   - Test both approaches if unclear\n   - Document the decision\n\n**When unclear**:\
        \ Present both approaches as options to the user with context about what each does\n\n#### Struct/Type Definitions\n\
        \n**Goal**: Include all fields from both branches.\n\n**One-line explanation**: \"Merging struct by including all\
        \ fields from both branches and choosing appropriate types for any conflicting field definitions.\"\n\n**Quick approach:**\n\
        \n1. Merge all fields\n2. If field types conflict, analyze which is more appropriate\n3. Fix all compilation errors\
        \ from updated struct\n4. Update tests to use new fields\n\n**When unclear**: Ask the user which type definition is\
        \ correct if field types conflict\n\n### Step 5: Validate Resolution\n\nAfter completing all resolution phases in\
        \ your plan, validate that all conflicts are resolved:\n\n```bash\n.forge/skills/resolve-conflicts/scripts/validate-conflicts.sh\n\
        ```\n\nThis script checks for:\n\n- Remaining conflict markers (<<<<<<<, =======, >>>>>>>)\n- Unmerged paths in git\
        \ status\n- Deleted-modified conflicts\n- Merge state files\n\n### Step 6: Compile and Test\n\nBuild and test to ensure\
        \ the resolution is correct (as defined in your plan's validation steps):\n\n```bash\n# For Rust projects\ncargo test\n\
        \n# For other projects, use appropriate test command\n# npm test\n# pytest\n# etc.\n```\n\nIf tests fail:\n\n1. Review\
        \ the failure - is it from merged code or conflict resolution?\n2. Check if both branches' tests pass individually\n\
        3. Fix integration issues between the merged changes\n4. Re-run tests until all pass\n\n### Step 7: Finalize\n\nOnce\
        \ all conflicts are resolved and tests pass, review your completed plan and commit:\n\n```bash\n# Review the changes\n\
        git diff --cached\n\n# Commit with descriptive message that references the plan\ngit commit -m \"Resolve merge conflicts:\
        \ [describe key decisions]\n\nExecuted merge resolution plan:\n- [Phase 1 summary]\n- [Phase 2 summary]\n- [Phase\
        \ 3+ summaries]\n\nKey decisions:\n- Merged imports from both branches\n- Combined test cases\n- Regenerated lock\
        \ files\n- [other significant decisions from plan]\n\nCo-Authored-By: ForgeCode <noreply@forgecode.dev>\"\n```\n\n\
        ## Decision Tracking\n\nWhen you ask the user to choose between options, track their decision and apply similar reasoning\
        \ to subsequent conflicts:\n\n**Example scenario:**\n\n1. First conflict: User chooses Option 1 (prefer current branch's\
        \ validation logic)\n2. Second similar conflict: Apply the same reasoning (prefer current branch's validation approach)\n\
        3. Mention: \"Resolving by keeping current branch's approach (consistent with your earlier choice)\"\n\n**Key principles:**\n\
        \n- Remember user preferences within the same conflict resolution session\n- Apply consistent patterns when conflicts\
        \ are similar\n- Mention the consistency: \"Following the same pattern as before...\"\n- Ask again if a new conflict\
        \ is sufficiently different from previous ones\n\n## Common Patterns Reference\n\nFor detailed resolution patterns,\
        \ read:\n\n- `references/patterns.md` - Comprehensive examples for all conflict types\n\n**Quick pattern lookup:**\n\
        \n- **Imports**: Combine all unique imports, group by module\n- **Tests**: Keep all tests unless identical, merge\
        \ fixtures\n- **Generated files**: Choose either version, regenerate from source\n- **Config**: Merge all keys, choose\
        \ newer/safer values for conflicts\n- **Code**: Analyze intent, merge if orthogonal, choose one if conflicting\n-\
        \ **Structs**: Include all fields from both branches\n- **Docs**: Combine all documentation sections\n\n## Special\
        \ Scenarios\n\n### Binary Files in Conflict\n\nBinary files cannot be merged. Choose one version:\n\n```bash\ngit\
        \ checkout --ours path/to/binary    # keep our version\n# or\ngit checkout --theirs path/to/binary  # keep their version\n\
        ```\n\n### Mass Rename/Refactoring Conflicts\n\nIf one branch renamed/refactored many files while another modified\
        \ them:\n\n1. Accept the rename/refactoring (structural change)\n2. Apply the modifications to the new structure\n\
        3. Use backups from `handle-deleted-modified.sh` to guide the application\n\n### Submodule Conflicts\n\n```bash\n\
        # Check submodule status\ngit submodule status\n\n# Update to the correct commit\ncd path/to/submodule\ngit checkout\
        \ <desired-commit>\ncd ../..\ngit add path/to/submodule\n```\n\n## Troubleshooting\n\n### \"Both Added\" Conflicts\
        \ (AA)\n\nBoth branches added a new file with the same name but different content:\n\n1. Review both versions\n2.\
        \ If they serve the same purpose, merge their content\n3. If they serve different purposes, rename one\n\n### Whitespace-Only\
        \ Conflicts\n\nIf conflicts are only whitespace differences:\n\n```bash\ngit merge -Xignore-space-change <branch>\n\
        ```\n\n### Persistent Conflict Markers\n\nIf validation shows conflict markers but you think you resolved them:\n\n\
        1. Search for the exact marker strings: `git grep -n \"<<<<<<< HEAD\"`\n2. Some markers might be in strings or comments\
        \ - resolve those too\n3. Check for hidden characters or encoding issues\n\n### Tests Fail After Resolution\n\n1.\
        \ Test each branch individually to confirm they pass\n2. The failure is likely from interaction between the merged\
        \ changes\n3. Debug the interaction issue, not the individual changes\n4. Update code to make both changes work together\n\
        \n## Quick Reference Card\n\n| Conflict Type    | Strategy                                | One-line Explanation Template\
        \                                                                                    |\n| ---------------- | ---------------------------------------\
        \ | ----------------------------------------------------------------------------------------------------------------\
        \ |\n| Imports          | Merge all, deduplicate, group by module | \"Merging imports by combining unique imports\
        \ from both branches and grouping by module\"                          |\n| Tests            | Keep all, merge fixtures\
        \                | \"Including all test cases from both branches and combining test fixtures\"                   \
        \                     |\n| Generated files  | Regenerate from source                  | \"Regenerating [file] from\
        \ source to include changes from both branches\"                                          |\n| Config           |\
        \ Merge keys, choose newer values         | \"Merging all config keys and choosing [current/incoming] value for [key]\"\
        \                                        |\n| Code logic       | Analyze intent, merge if orthogonal     | \"Merging\
        \ both changes as they address different concerns\" OR \"Choosing [current/incoming] approach for [reason]\" |\n|\
        \ Structs          | Include all fields                      | \"Including all fields from both branches in struct\
        \ definition\"                                                   |\n| Docs             | Combine all sections    \
        \                | \"Combining documentation from both branches\"                                                \
        \                     |\n| Deleted-modified | Backup, analyze, apply to new location  | \"Applying modifications to\
        \ new location after file was moved/renamed\"                                            |\n| Binary files     | Choose\
        \ one version                      | \"Keeping [current/incoming] version of binary file\"                       \
        \                                       |\n\n**Remember:**\n\n- Always provide a one-line explanation for each conflict\
        \ resolution\n- When unclear, present numbered options to the user\n- Track user decisions and apply consistently\
        \ to similar conflicts\n- The goal is to preserve the intent and functionality of both branches while creating a cohesive\
        \ merged result"
