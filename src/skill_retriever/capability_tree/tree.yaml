    name: LLM Prompting & ML Modeling
    description: Use this group when developing with LLMs or modern ML models as core building blocks. It covers production
      prompt design patterns for reliability/controllability and hands-on use of HuggingFace Transformers for inference, fine-tuning,
      and task-specific NLP/vision workflows. Look here when the output is prompts, model usage code, or ML training/inference
