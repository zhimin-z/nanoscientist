    - id: social-media-generator
      name: social-media-generator
      description: This skill should be used when the user requests social media content creation for Twitter, Instagram,
        LinkedIn, or Facebook. It generates platform-optimized posts and saves them in an organized folder structure with
        meaningful filenames based on event details.
      skill_path: data/skill_seeds/social-media-generator/SKILL.md
      content: "# Social Media Generator\n\n## Overview\n\nThis skill enables creation of platform-optimized social media\
        \ content for Twitter, Instagram, LinkedIn, and Facebook. It automatically generates posts tailored to each platform's\
        \ best practices and saves them in an organized directory structure.\n\n## When to Use This Skill\n\nUse this skill\
        \ when the user requests:\n- Creation of social media posts for multiple platforms\n- Content generation for specific\
        \ events, announcements, or campaigns\n- Platform-specific content optimization\n- Organized storage of social media\
        \ content\n\n## Core Workflow\n\n### Step 1: Gather Information\n\nCollect the following details from the user (ask\
        \ if not provided):\n- Event/content name\n- Date and time (format: DD-MM-YYYY-HHMM)\n- Main message or announcement\n\
        - Target audience\n- Key details to include\n- Call-to-action\n- Any specific hashtags or mentions\n- Brand voice/tone\
        \ preferences\n\n### Step 2: Generate Platform-Specific Content\n\nCreate content for each platform using the templates\
        \ in `assets/`:\n\n**Twitter** (`assets/twitter_template.md`)\n- Keep under 280 characters\n- Concise and punchy\n\
        - 1-3 relevant hashtags\n- Clear call-to-action\n- Consider emojis for engagement\n\n**Instagram** (`assets/instagram_template.md`)\n\
        - Engaging caption with hook in first line\n- More detailed description\n- 5-15 relevant hashtags\n- Visual-focused\
        \ messaging\n- Line breaks for readability\n- Encourage engagement\n\n**LinkedIn** (`assets/linkedin_template.md`)\n\
        - Professional and informative tone\n- Value-driven content\n- Industry insights or takeaways\n- 3-5 professional\
        \ hashtags\n- Bullet points for key information\n- Discussion-prompting questions\n\n**Facebook** (`assets/facebook_template.md`)\n\
        - Conversational and engaging\n- Keep concise (under 250 chars for best engagement)\n- 2-3 relevant hashtags\n- Visual-focused\n\
        - Encourage comments and shares\n- Include event details if applicable\n\n### Step 3: Create Organized File Structure\n\
        \nCreate the following directory structure in the project:\n\n```\nsocial-media/\n├── twitter/\n│   └── event-name-DD-MM-YYYY-HHMM.md\n\
        ├── instagram/\n│   └── event-name-DD-MM-YYYY-HHMM.md\n├── linkedin/\n│   └── event-name-DD-MM-YYYY-HHMM.md\n└── facebook/\n\
        \    └── event-name-DD-MM-YYYY-HHMM.md\n```\n\n**Filename Format:** `event-name-DD-MM-YYYY-HHMM.md`\n- Use lowercase\
        \ with hyphens for spaces\n- Include date in format: day-month-year-time\n- Example: `product-launch-15-03-2025-1400.md`\n\
        \n### Step 4: Write Content to Files\n\nFor each platform:\n1. Generate platform-optimized content based on the templates\n\
        2. Create the platform-specific subdirectory if it doesn't exist\n3. Write the content to the appropriately named\
        \ markdown file\n4. Include metadata at the bottom (platform, date, character count)\n\n### Step 5: Review and Confirm\n\
        \nAfter generating all posts:\n1. Provide a summary of created files\n2. Highlight key points for each platform\n\
        3. Note any character count warnings\n4. Offer to make revisions if needed\n\n## Content Optimization Guidelines\n\
        \n### Character Limits\n- Twitter: 280 characters\n- Instagram: 2,200 characters (but concise is better)\n- LinkedIn:\
        \ 3,000 characters\n- Facebook: Unlimited (but under 250 for best engagement)\n\n### Hashtag Strategy\n- Twitter:\
        \ 1-3 focused hashtags\n- Instagram: 5-15 relevant hashtags\n- LinkedIn: 3-5 professional hashtags\n- Facebook: 2-3\
        \ hashtags\n\n### Tone Adaptation\n- Twitter: Casual, conversational, timely\n- Instagram: Visual-first, engaging,\
        \ lifestyle-focused\n- LinkedIn: Professional, insightful, value-driven\n- Facebook: Friendly, community-focused,\
        \ conversational\n\n### Call-to-Action Best Practices\n- Make it clear and specific\n- Use action verbs\n- Create\
        \ urgency when appropriate\n- Match platform conventions\n\n## Example Usage\n\n**User Request:**\n\"Create social\
        \ media posts for our product launch event on March 15, 2025 at 2 PM. The product is an AI-powered productivity tool\
        \ called TaskFlow.\"\n\n**Execution:**\n1. Gather additional details (key features, target audience, website link)\n\
        2. Generate four platform-specific posts\n3. Create directory structure: `social-media/twitter/`, `social-media/instagram/`,\
        \ etc.\n4. Write files: `taskflow-launch-15-03-2025-1400.md` in each platform folder\n5. Provide summary with file\
        \ locations and key points\n\n## Assets\n\nThis skill includes template files in the `assets/` directory:\n- `twitter_template.md`\
        \ - Twitter post structure and best practices\n- `instagram_template.md` - Instagram caption format and guidelines\n\
        - `linkedin_template.md` - LinkedIn post structure and professional tone guide\n- `facebook_template.md` - Facebook\
        \ post format and engagement tips\n\nThese templates serve as reference for platform-specific requirements and best\
        \ practices when generating content."
