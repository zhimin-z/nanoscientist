    - id: canvas-design
      name: canvas-design
      description: Create beautiful visual art in .png and .pdf documents using design philosophy. You should use this skill
        when the user asks to create a poster, piece of art, design, or other static piece. Create original visual designs,
        never copying existing artists' work to avoid copyright violations.
      skill_path: data/skill_seeds/canvas-design/SKILL.md
      content: "These are instructions for creating design philosophies - aesthetic movements that are then EXPRESSED VISUALLY.\
        \ Output only .md files, .pdf files, and .png files.\n\nComplete this in two steps:\n1. Design Philosophy Creation\
        \ (.md file)\n2. Express by creating it on a canvas (.pdf file or .png file)\n\nFirst, undertake this task:\n\n##\
        \ DESIGN PHILOSOPHY CREATION\n\nTo begin, create a VISUAL PHILOSOPHY (not layouts or templates) that will be interpreted\
        \ through:\n- Form, space, color, composition\n- Images, graphics, shapes, patterns\n- Minimal text as visual accent\n\
        \n### THE CRITICAL UNDERSTANDING\n- What is received: Some subtle input or instructions by the user that should be\
        \ taken into account, but used as a foundation; it should not constrain creative freedom.\n- What is created: A design\
        \ philosophy/aesthetic movement.\n- What happens next: Then, the same version receives the philosophy and EXPRESSES\
        \ IT VISUALLY - creating artifacts that are 90% visual design, 10% essential text.\n\nConsider this approach:\n- Write\
        \ a manifesto for an art movement\n- The next phase involves making the artwork\n\nThe philosophy must emphasize:\
        \ Visual expression. Spatial communication. Artistic interpretation. Minimal words.\n\n### HOW TO GENERATE A VISUAL\
        \ PHILOSOPHY\n\n**Name the movement** (1-2 words): \"Brutalist Joy\" / \"Chromatic Silence\" / \"Metabolist Dreams\"\
        \n\n**Articulate the philosophy** (4-6 paragraphs - concise but complete):\n\nTo capture the VISUAL essence, express\
        \ how the philosophy manifests through:\n- Space and form\n- Color and material\n- Scale and rhythm\n- Composition\
        \ and balance\n- Visual hierarchy\n\n**CRITICAL GUIDELINES:**\n- **Avoid redundancy**: Each design aspect should be\
        \ mentioned once. Avoid repeating points about color theory, spatial relationships, or typographic principles unless\
        \ adding new depth.\n- **Emphasize craftsmanship REPEATEDLY**: The philosophy MUST stress multiple times that the\
        \ final work should appear as though it took countless hours to create, was labored over with care, and comes from\
        \ someone at the absolute top of their field. This framing is essential - repeat phrases like \"meticulously crafted,\"\
        \ \"the product of deep expertise,\" \"painstaking attention,\" \"master-level execution.\"\n- **Leave creative space**:\
        \ Remain specific about the aesthetic direction, but concise enough that the next Claude has room to make interpretive\
        \ choices also at a extremely high level of craftmanship.\n\nThe philosophy must guide the next version to express\
        \ ideas VISUALLY, not through text. Information lives in design, not paragraphs.\n\n### PHILOSOPHY EXAMPLES\n\n**\"\
        Concrete Poetry\"**\nPhilosophy: Communication through monumental form and bold geometry.\nVisual expression: Massive\
        \ color blocks, sculptural typography (huge single words, tiny labels), Brutalist spatial divisions, Polish poster\
        \ energy meets Le Corbusier. Ideas expressed through visual weight and spatial tension, not explanation. Text as rare,\
        \ powerful gesture - never paragraphs, only essential words integrated into the visual architecture. Every element\
        \ placed with the precision of a master craftsman.\n\n**\"Chromatic Language\"**\nPhilosophy: Color as the primary\
        \ information system.\nVisual expression: Geometric precision where color zones create meaning. Typography minimal\
        \ - small sans-serif labels letting chromatic fields communicate. Think Josef Albers' interaction meets data visualization.\
        \ Information encoded spatially and chromatically. Words only to anchor what color already shows. The result of painstaking\
        \ chromatic calibration.\n\n**\"Analog Meditation\"**\nPhilosophy: Quiet visual contemplation through texture and\
        \ breathing room.\nVisual expression: Paper grain, ink bleeds, vast negative space. Photography and illustration dominate.\
        \ Typography whispered (small, restrained, serving the visual). Japanese photobook aesthetic. Images breathe across\
        \ pages. Text appears sparingly - short phrases, never explanatory blocks. Each composition balanced with the care\
        \ of a meditation practice.\n\n**\"Organic Systems\"**\nPhilosophy: Natural clustering and modular growth patterns.\n\
        Visual expression: Rounded forms, organic arrangements, color from nature through architecture. Information shown\
        \ through visual diagrams, spatial relationships, iconography. Text only for key labels floating in space. The composition\
        \ tells the story through expert spatial orchestration.\n\n**\"Geometric Silence\"**\nPhilosophy: Pure order and restraint.\n\
        Visual expression: Grid-based precision, bold photography or stark graphics, dramatic negative space. Typography precise\
        \ but minimal - small essential text, large quiet zones. Swiss formalism meets Brutalist material honesty. Structure\
        \ communicates, not words. Every alignment the work of countless refinements.\n\n*These are condensed examples. The\
        \ actual design philosophy should be 4-6 substantial paragraphs.*\n\n### ESSENTIAL PRINCIPLES\n- **VISUAL PHILOSOPHY**:\
        \ Create an aesthetic worldview to be expressed through design\n- **MINIMAL TEXT**: Always emphasize that text is\
        \ sparse, essential-only, integrated as visual element - never lengthy\n- **SPATIAL EXPRESSION**: Ideas communicate\
        \ through space, form, color, composition - not paragraphs\n- **ARTISTIC FREEDOM**: The next Claude interprets the\
        \ philosophy visually - provide creative room\n- **PURE DESIGN**: This is about making ART OBJECTS, not documents\
        \ with decoration\n- **EXPERT CRAFTSMANSHIP**: Repeatedly emphasize the final work must look meticulously crafted,\
        \ labored over with care, the product of countless hours by someone at the top of their field\n\n**The design philosophy\
        \ should be 4-6 paragraphs long.** Fill it with poetic design philosophy that brings together the core vision. Avoid\
        \ repeating the same points. Keep the design philosophy generic without mentioning the intention of the art, as if\
        \ it can be used wherever. Output the design philosophy as a .md file.\n\n---\n\n## DEDUCING THE SUBTLE REFERENCE\n\
        \n**CRITICAL STEP**: Before creating the canvas, identify the subtle conceptual thread from the original request.\n\
        \n**THE ESSENTIAL PRINCIPLE**:\nThe topic is a **subtle, niche reference embedded within the art itself** - not always\
        \ literal, always sophisticated. Someone familiar with the subject should feel it intuitively, while others simply\
        \ experience a masterful abstract composition. The design philosophy provides the aesthetic language. The deduced\
        \ topic provides the soul - the quiet conceptual DNA woven invisibly into form, color, and composition.\n\nThis is\
        \ **VERY IMPORTANT**: The reference must be refined so it enhances the work's depth without announcing itself. Think\
        \ like a jazz musician quoting another song - only those who know will catch it, but everyone appreciates the music.\n\
        \n---\n\n## CANVAS CREATION\n\nWith both the philosophy and the conceptual framework established, express it on a\
        \ canvas. Take a moment to gather thoughts and clear the mind. Use the design philosophy created and the instructions\
        \ below to craft a masterpiece, embodying all aspects of the philosophy with expert craftsmanship.\n\n**IMPORTANT**:\
        \ For any type of content, even if the user requests something for a movie/game/book, the approach should still be\
        \ sophisticated. Never lose sight of the idea that this should be art, not something that's cartoony or amateur.\n\
        \nTo create museum or magazine quality work, use the design philosophy as the foundation. Create one single page,\
        \ highly visual, design-forward PDF or PNG output (unless asked for more pages). Generally use repeating patterns\
        \ and perfect shapes. Treat the abstract philosophical design as if it were a scientific bible, borrowing the visual\
        \ language of systematic observation—dense accumulation of marks, repeated elements, or layered patterns that build\
        \ meaning through patient repetition and reward sustained viewing. Add sparse, clinical typography and systematic\
        \ reference markers that suggest this could be a diagram from an imaginary discipline, treating the invisible subject\
        \ with the same reverence typically reserved for documenting observable phenomena. Anchor the piece with simple phrase(s)\
        \ or details positioned subtly, using a limited color palette that feels intentional and cohesive. Embrace the paradox\
        \ of using analytical visual language to express ideas about human experience: the result should feel like an artifact\
        \ that proves something ephemeral can be studied, mapped, and understood through careful attention. This is true art.\
        \ \n\n**Text as a contextual element**: Text is always minimal and visual-first, but let context guide whether that\
        \ means whisper-quiet labels or bold typographic gestures. A punk venue poster might have larger, more aggressive\
        \ type than a minimalist ceramics studio identity. Most of the time, font should be thin. All use of fonts must be\
        \ design-forward and prioritize visual communication. Regardless of text scale, nothing falls off the page and nothing\
        \ overlaps. Every element must be contained within the canvas boundaries with proper margins. Check carefully that\
        \ all text, graphics, and visual elements have breathing room and clear separation. This is non-negotiable for professional\
        \ execution. **IMPORTANT: Use different fonts if writing text. Search the `./canvas-fonts` directory. Regardless of\
        \ approach, sophistication is non-negotiable.**\n\nDownload and use whatever fonts are needed to make this a reality.\
        \ Get creative by making the typography actually part of the art itself -- if the art is abstract, bring the font\
        \ onto the canvas, not typeset digitally.\n\nTo push boundaries, follow design instinct/intuition while using the\
        \ philosophy as a guiding principle. Embrace ultimate design freedom and choice. Push aesthetics and design to the\
        \ frontier. \n\n**CRITICAL**: To achieve human-crafted quality (not AI-generated), create work that looks like it\
        \ took countless hours. Make it appear as though someone at the absolute top of their field labored over every detail\
        \ with painstaking care. Ensure the composition, spacing, color choices, typography - everything screams expert-level\
        \ craftsmanship. Double-check that nothing overlaps, formatting is flawless, every detail perfect. Create something\
        \ that could be shown to people to prove expertise and rank as undeniably impressive.\n\nOutput the final result as\
        \ a single, downloadable .pdf or .png file, alongside the design philosophy used as a .md file.\n\n---\n\n## FINAL\
        \ STEP\n\n**IMPORTANT**: The user ALREADY said \"It isn't perfect enough. It must be pristine, a masterpiece if craftsmanship,\
        \ as if it were about to be displayed in a museum.\"\n\n**CRITICAL**: To refine the work, avoid adding more graphics;\
        \ instead refine what has been created and make it extremely crisp, respecting the design philosophy and the principles\
        \ of minimalism entirely. Rather than adding a fun filter or refactoring a font, consider how to make the existing\
        \ composition more cohesive with the art. If the instinct is to call a new function or draw a new shape, STOP and\
        \ instead ask: \"How can I make what's already here more of a piece of art?\"\n\nTake a second pass. Go back to the\
        \ code and refine/polish further to make this a philosophically designed masterpiece.\n\n## MULTI-PAGE OPTION\n\n\
        To create additional pages when requested, create more creative pages along the same lines as the design philosophy\
        \ but distinctly different as well. Bundle those pages in the same .pdf or many .pngs. Treat the first page as just\
        \ a single page in a whole coffee table book waiting to be filled. Make the next pages unique twists and memories\
        \ of the original. Have them almost tell a story in a very tasteful way. Exercise full creative freedom."
      github_url: https://github.com/anthropics/skills/tree/main/skills/canvas-design
