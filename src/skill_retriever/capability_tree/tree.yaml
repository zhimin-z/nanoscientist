  - id: dev-browser
    name: dev-browser
    description: Browser automation with persistent page state. Use when users ask to navigate websites, fill forms, take
      screenshots, extract web data, test web apps, or automate browser workflows. Trigger phrases include "go to [url]",
      "click on", "fill out the form", "take a screenshot", "scrape", "automate", "test the website", "log into", or any browser
      interaction request.
    skill_path: data/skill_seeds/dev-browser/SKILL.md
    content: "# Dev Browser Skill\n\nBrowser automation that maintains page state across script executions. Write small, focused\
      \ scripts to accomplish tasks incrementally. Once you've proven out part of a workflow and there is repeated work to\
      \ be done, you can write a script to do the repeated work in a single execution.\n\n## Choosing Your Approach\n\n- **Local/source-available\
      \ sites**: Read the source code first to write selectors directly\n- **Unknown page layouts**: Use `getAISnapshot()`\
      \ to discover elements and `selectSnapshotRef()` to interact with them\n- **Visual feedback**: Take screenshots to see\
      \ what the user sees\n\n## Setup\n\nTwo modes available. Ask the user if unclear which to use.\n\n### Standalone Mode\
      \ (Default)\n\nLaunches a new Chromium browser for fresh automation sessions.\n\n```bash\n./skills/dev-browser/server.sh\
      \ &\n```\n\nAdd `--headless` flag if user requests it. **Wait for the `Ready` message before running scripts.**\n\n\
      ### Extension Mode\n\nConnects to user's existing Chrome browser. Use this when:\n\n- The user is already logged into\
      \ sites and wants you to do things behind an authed experience that isn't local dev.\n- The user asks you to use the\
      \ extension\n\n**Important**: The core flow is still the same. You create named pages inside of their browser.\n\n**Start\
      \ the relay server:**\n\n```bash\ncd skills/dev-browser && npm i && npm run start-extension &\n```\n\nWait for `Waiting\
      \ for extension to connect...` followed by `Extension connected` in the console. To know that a client has connected\
      \ and the browser is ready to be controlled.\n**Workflow:**\n\n1. Scripts call `client.page(\"name\")` just like the\
      \ normal mode to create new pages / connect to existing ones.\n2. Automation runs on the user's actual browser session\n\
      \nIf the extension hasn't connected yet, tell the user to launch and activate it. Download link: https://github.com/SawyerHood/dev-browser/releases\n\
      \n## Writing Scripts\n\n> **Run all scripts from `skills/dev-browser/` directory.** The `@/` import alias requires this\
      \ directory's config.\n\nExecute scripts inline using heredocs:\n\n```bash\ncd skills/dev-browser && npx tsx <<'EOF'\n\
      import { connect, waitForPageLoad } from \"@/client.js\";\n\nconst client = await connect();\n// Create page with custom\
      \ viewport size (optional)\nconst page = await client.page(\"example\", { viewport: { width: 1920, height: 1080 } });\n\
      \nawait page.goto(\"https://example.com\");\nawait waitForPageLoad(page);\n\nconsole.log({ title: await page.title(),\
      \ url: page.url() });\nawait client.disconnect();\nEOF\n```\n\n**Write to `tmp/` files only when** the script needs\
      \ reuse, is complex, or user explicitly requests it.\n\n### Key Principles\n\n1. **Small scripts**: Each script does\
      \ ONE thing (navigate, click, fill, check)\n2. **Evaluate state**: Log/return state at the end to decide next steps\n\
      3. **Descriptive page names**: Use `\"checkout\"`, `\"login\"`, not `\"main\"`\n4. **Disconnect to exit**: `await client.disconnect()`\
      \ - pages persist on server\n5. **Plain JS in evaluate**: `page.evaluate()` runs in browser - no TypeScript syntax\n\
      \n## Workflow Loop\n\nFollow this pattern for complex tasks:\n\n1. **Write a script** to perform one action\n2. **Run\
      \ it** and observe the output\n3. **Evaluate** - did it work? What's the current state?\n4. **Decide** - is the task\
      \ complete or do we need another script?\n5. **Repeat** until task is done\n\n### No TypeScript in Browser Context\n\
      \nCode passed to `page.evaluate()` runs in the browser, which doesn't understand TypeScript:\n\n```typescript\n// ✅\
      \ Correct: plain JavaScript\nconst text = await page.evaluate(() => {\n  return document.body.innerText;\n});\n\n//\
      \ ❌ Wrong: TypeScript syntax will fail at runtime\nconst text = await page.evaluate(() => {\n  const el: HTMLElement\
      \ = document.body; // Type annotation breaks in browser!\n  return el.innerText;\n});\n```\n\n## Scraping Data\n\nFor\
      \ scraping large datasets, intercept and replay network requests rather than scrolling the DOM. See [references/scraping.md](references/scraping.md)\
      \ for the complete guide covering request capture, schema discovery, and paginated API replay.\n\n## Client API\n\n\
      ```typescript\nconst client = await connect();\n\n// Get or create named page (viewport only applies to new pages)\n\
      const page = await client.page(\"name\");\nconst pageWithSize = await client.page(\"name\", { viewport: { width: 1920,\
      \ height: 1080 } });\n\nconst pages = await client.list(); // List all page names\nawait client.close(\"name\"); //\
      \ Close a page\nawait client.disconnect(); // Disconnect (pages persist)\n\n// ARIA Snapshot methods\nconst snapshot\
      \ = await client.getAISnapshot(\"name\"); // Get accessibility tree\nconst element = await client.selectSnapshotRef(\"\
      name\", \"e5\"); // Get element by ref\n```\n\nThe `page` object is a standard Playwright Page.\n\n## Waiting\n\n```typescript\n\
      import { waitForPageLoad } from \"@/client.js\";\n\nawait waitForPageLoad(page); // After navigation\nawait page.waitForSelector(\"\
      .results\"); // For specific elements\nawait page.waitForURL(\"**/success\"); // For specific URL\n```\n\n## Inspecting\
      \ Page State\n\n### Screenshots\n\n```typescript\nawait page.screenshot({ path: \"tmp/screenshot.png\" });\nawait page.screenshot({\
      \ path: \"tmp/full.png\", fullPage: true });\n```\n\n### ARIA Snapshot (Element Discovery)\n\nUse `getAISnapshot()`\
      \ to discover page elements. Returns YAML-formatted accessibility tree:\n\n```yaml\n- banner:\n  - link \"Hacker News\"\
      \ [ref=e1]\n  - navigation:\n    - link \"new\" [ref=e2]\n- main:\n  - list:\n    - listitem:\n      - link \"Article\
      \ Title\" [ref=e8]\n      - link \"328 comments\" [ref=e9]\n- contentinfo:\n  - textbox [ref=e10]\n    - /placeholder:\
      \ \"Search\"\n```\n\n**Interpreting refs:**\n\n- `[ref=eN]` - Element reference for interaction (visible, clickable\
      \ elements only)\n- `[checked]`, `[disabled]`, `[expanded]` - Element states\n- `[level=N]` - Heading level\n- `/url:`,\
      \ `/placeholder:` - Element properties\n\n**Interacting with refs:**\n\n```typescript\nconst snapshot = await client.getAISnapshot(\"\
      hackernews\");\nconsole.log(snapshot); // Find the ref you need\n\nconst element = await client.selectSnapshotRef(\"\
      hackernews\", \"e2\");\nawait element.click();\n```\n\n## Error Recovery\n\nPage state persists after failures. Debug\
      \ with:\n\n```bash\ncd skills/dev-browser && npx tsx <<'EOF'\nimport { connect } from \"@/client.js\";\n\nconst client\
      \ = await connect();\nconst page = await client.page(\"hackernews\");\n\nawait page.screenshot({ path: \"tmp/debug.png\"\
      \ });\nconsole.log({\n  url: page.url(),\n  title: await page.title(),\n  bodyText: await page.textContent(\"body\"\
      ).then((t) => t?.slice(0, 200)),\n});\n\nawait client.disconnect();\nEOF\n```"
