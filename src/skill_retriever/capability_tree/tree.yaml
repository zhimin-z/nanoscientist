  - id: frontend-and-interactive-experiences
    name: Frontend & Interactive Experiences
    description: Use this group when building user-facing web UI or interactive educational/visual artifacts. It includes
      production-grade frontend design and complex multi-component web artifacts, plus end-to-end MicroSim generation with
      appropriate visualization libraries. Look here when the primary output is UI code, interactive demos, or polished web
