    - id: transformers
      name: transformers
      description: Work with state-of-the-art machine learning models for NLP, computer vision, audio, and multimodal tasks
        using HuggingFace Transformers. This skill should be used when fine-tuning pre-trained models, performing inference
        with pipelines, generating text, training sequence models, or working with BERT, GPT, T5, ViT, and other transformer
        architectures. Covers model loading, tokenization, training with Trainer API, text generation strategies, and task-specific
        patterns for classification, NER, QA, summarization, translation, and image tasks. (plugin:scientific-packages@claude-scientific-skills)
      skill_path: data/skill_seeds/transformers/SKILL.md
      content: "# Transformers\n\n## Overview\n\nThe Transformers library provides state-of-the-art machine learning models\
        \ for NLP, computer vision, audio, and multimodal tasks. Apply this skill for quick inference through pipelines, comprehensive\
        \ training via the Trainer API, and flexible text generation with various decoding strategies.\n\n## Core Capabilities\n\
        \n### 1. Quick Inference with Pipelines\n\nFor rapid inference without complex setup, use the `pipeline()` API. Pipelines\
        \ abstract away tokenization, model invocation, and post-processing.\n\n```python\nfrom transformers import pipeline\n\
        \n# Text classification\nclassifier = pipeline(\"text-classification\")\nresult = classifier(\"This product is amazing!\"\
        )\n\n# Named entity recognition\nner = pipeline(\"token-classification\")\nentities = ner(\"Sarah works at Microsoft\
        \ in Seattle\")\n\n# Question answering\nqa = pipeline(\"question-answering\")\nanswer = qa(question=\"What is the\
        \ capital?\", context=\"Paris is the capital of France.\")\n\n# Text generation\ngenerator = pipeline(\"text-generation\"\
        , model=\"gpt2\")\ntext = generator(\"Once upon a time\", max_length=50)\n\n# Image classification\nimage_classifier\
        \ = pipeline(\"image-classification\")\npredictions = image_classifier(\"image.jpg\")\n```\n\n**When to use pipelines:**\n\
        - Quick prototyping and testing\n- Simple inference tasks without custom logic\n- Demonstrations and examples\n- Production\
        \ inference for standard tasks\n\n**Available pipeline tasks:**\n- **NLP**: text-classification, token-classification,\
        \ question-answering, summarization, translation, text-generation, fill-mask, zero-shot-classification\n- **Vision**:\
        \ image-classification, object-detection, image-segmentation, depth-estimation, zero-shot-image-classification\n-\
        \ **Audio**: automatic-speech-recognition, audio-classification, text-to-audio\n- **Multimodal**: image-to-text, visual-question-answering,\
        \ image-text-to-text\n\nFor comprehensive pipeline documentation, see `references/pipelines.md`.\n\n### 2. Model Training\
        \ and Fine-Tuning\n\nUse the Trainer API for comprehensive model training with support for distributed training, mixed\
        \ precision, and advanced optimization.\n\n**Basic training workflow:**\n\n```python\nfrom transformers import (\n\
        \    AutoTokenizer,\n    AutoModelForSequenceClassification,\n    TrainingArguments,\n    Trainer\n)\nfrom datasets\
        \ import load_dataset\n\n# 1. Load and tokenize data\ndataset = load_dataset(\"imdb\")\ntokenizer = AutoTokenizer.from_pretrained(\"\
        bert-base-uncased\")\n\ndef tokenize_function(examples):\n    return tokenizer(examples[\"text\"], padding=\"max_length\"\
        , truncation=True)\n\ntokenized_datasets = dataset.map(tokenize_function, batched=True)\n\n# 2. Load model\nmodel\
        \ = AutoModelForSequenceClassification.from_pretrained(\n    \"bert-base-uncased\",\n    num_labels=2\n)\n\n# 3. Configure\
        \ training\ntraining_args = TrainingArguments(\n    output_dir=\"./results\",\n    num_train_epochs=3,\n    per_device_train_batch_size=16,\n\
        \    eval_strategy=\"epoch\",\n    save_strategy=\"epoch\",\n    load_best_model_at_end=True,\n)\n\n# 4. Create trainer\
        \ and train\ntrainer = Trainer(\n    model=model,\n    args=training_args,\n    train_dataset=tokenized_datasets[\"\
        train\"],\n    eval_dataset=tokenized_datasets[\"test\"],\n)\n\ntrainer.train()\n```\n\n**Key training features:**\n\
        - Mixed precision training (fp16/bf16)\n- Distributed training (multi-GPU, multi-node)\n- Gradient accumulation\n\
        - Learning rate scheduling with warmup\n- Checkpoint management\n- Hyperparameter search\n- Push to Hugging Face Hub\n\
        \nFor detailed training documentation, see `references/training.md`.\n\n### 3. Text Generation\n\nGenerate text using\
        \ various decoding strategies including greedy decoding, beam search, sampling, and more.\n\n**Generation strategies:**\n\
        \n```python\nfrom transformers import AutoModelForCausalLM, AutoTokenizer\n\nmodel = AutoModelForCausalLM.from_pretrained(\"\
        gpt2\")\ntokenizer = AutoTokenizer.from_pretrained(\"gpt2\")\ninputs = tokenizer(\"Once upon a time\", return_tensors=\"\
        pt\")\n\n# Greedy decoding (deterministic)\noutputs = model.generate(**inputs, max_new_tokens=50)\n\n# Beam search\
        \ (explores multiple hypotheses)\noutputs = model.generate(\n    **inputs,\n    max_new_tokens=50,\n    num_beams=5,\n\
        \    early_stopping=True\n)\n\n# Sampling (creative, diverse)\noutputs = model.generate(\n    **inputs,\n    max_new_tokens=50,\n\
        \    do_sample=True,\n    temperature=0.7,\n    top_p=0.9,\n    top_k=50\n)\n```\n\n**Generation parameters:**\n-\
        \ `temperature`: Controls randomness (0.1-2.0)\n- `top_k`: Sample from top-k tokens\n- `top_p`: Nucleus sampling threshold\n\
        - `num_beams`: Number of beams for beam search\n- `repetition_penalty`: Discourage repetition\n- `no_repeat_ngram_size`:\
        \ Prevent repeating n-grams\n\nFor comprehensive generation documentation, see `references/generation_strategies.md`.\n\
        \n### 4. Task-Specific Patterns\n\nCommon task patterns with appropriate model classes:\n\n**Text Classification:**\n\
        ```python\nfrom transformers import AutoModelForSequenceClassification\n\nmodel = AutoModelForSequenceClassification.from_pretrained(\n\
        \    \"bert-base-uncased\",\n    num_labels=3,\n    id2label={0: \"negative\", 1: \"neutral\", 2: \"positive\"}\n\
        )\n```\n\n**Named Entity Recognition (Token Classification):**\n```python\nfrom transformers import AutoModelForTokenClassification\n\
        \nmodel = AutoModelForTokenClassification.from_pretrained(\n    \"bert-base-uncased\",\n    num_labels=9  # Number\
        \ of entity types\n)\n```\n\n**Question Answering:**\n```python\nfrom transformers import AutoModelForQuestionAnswering\n\
        \nmodel = AutoModelForQuestionAnswering.from_pretrained(\"bert-base-uncased\")\n```\n\n**Summarization and Translation\
        \ (Seq2Seq):**\n```python\nfrom transformers import AutoModelForSeq2SeqLM\n\nmodel = AutoModelForSeq2SeqLM.from_pretrained(\"\
        t5-base\")\n```\n\n**Image Classification:**\n```python\nfrom transformers import AutoModelForImageClassification\n\
        \nmodel = AutoModelForImageClassification.from_pretrained(\n    \"google/vit-base-patch16-224\",\n    num_labels=num_classes\n\
        )\n```\n\nFor detailed task-specific workflows including data preprocessing, training, and evaluation, see `references/task_patterns.md`.\n\
        \n## Auto Classes\n\nUse Auto classes for automatic architecture selection based on model checkpoints:\n\n```python\n\
        from transformers import (\n    AutoTokenizer,           # Tokenization\n    AutoModel,               # Base model\
        \ (hidden states)\n    AutoModelForSequenceClassification,\n    AutoModelForTokenClassification,\n    AutoModelForQuestionAnswering,\n\
        \    AutoModelForCausalLM,    # GPT-style\n    AutoModelForMaskedLM,    # BERT-style\n    AutoModelForSeq2SeqLM, \
        \  # T5, BART\n    AutoProcessor,           # For multimodal models\n    AutoImageProcessor,      # For vision models\n\
        )\n\n# Load any model by name\ntokenizer = AutoTokenizer.from_pretrained(\"bert-base-uncased\")\nmodel = AutoModelForSequenceClassification.from_pretrained(\"\
        bert-base-uncased\")\n```\n\nFor comprehensive API documentation, see `references/api_reference.md`.\n\n## Model Loading\
        \ and Optimization\n\n**Device placement:**\n```python\nmodel = AutoModel.from_pretrained(\"bert-base-uncased\", device_map=\"\
        auto\")\n```\n\n**Mixed precision:**\n```python\nmodel = AutoModel.from_pretrained(\n    \"model-name\",\n    torch_dtype=torch.float16\
        \  # or torch.bfloat16\n)\n```\n\n**Quantization:**\n```python\nfrom transformers import BitsAndBytesConfig\n\nquantization_config\
        \ = BitsAndBytesConfig(\n    load_in_4bit=True,\n    bnb_4bit_compute_dtype=torch.float16\n)\n\nmodel = AutoModelForCausalLM.from_pretrained(\n\
        \    \"meta-llama/Llama-2-7b-hf\",\n    quantization_config=quantization_config,\n    device_map=\"auto\"\n)\n```\n\
        \n## Common Workflows\n\n### Quick Inference Workflow\n1. Choose appropriate pipeline for task\n2. Load pipeline with\
        \ optional model specification\n3. Pass inputs and get results\n4. For batch processing, pass list of inputs\n\n**See:**\
        \ `scripts/quick_inference.py` for comprehensive pipeline examples\n\n### Training Workflow\n1. Load and preprocess\
        \ dataset using \U0001F917 Datasets\n2. Tokenize data with appropriate tokenizer\n3. Load pre-trained model for specific\
        \ task\n4. Configure TrainingArguments\n5. Create Trainer with model, data, and compute_metrics\n6. Train with `trainer.train()`\n\
        7. Evaluate with `trainer.evaluate()`\n8. Save model and optionally push to Hub\n\n**See:** `scripts/fine_tune_classifier.py`\
        \ for complete training example\n\n### Text Generation Workflow\n1. Load causal or seq2seq language model\n2. Load\
        \ tokenizer and tokenize prompt\n3. Choose generation strategy (greedy, beam search, sampling)\n4. Configure generation\
        \ parameters\n5. Generate with `model.generate()`\n6. Decode output tokens to text\n\n**See:** `scripts/generate_text.py`\
        \ for generation strategy examples\n\n## Best Practices\n\n1. **Use Auto classes** for flexibility across different\
        \ model architectures\n2. **Batch processing** for efficiency - process multiple inputs at once\n3. **Device management**\
        \ - use `device_map=\"auto\"` for automatic placement\n4. **Memory optimization** - enable fp16/bf16 or quantization\
        \ for large models\n5. **Checkpoint management** - save checkpoints regularly and load best model\n6. **Pipeline for\
        \ quick tasks** - use pipelines for standard inference tasks\n7. **Custom metrics** - define compute_metrics for task-specific\
        \ evaluation\n8. **Gradient accumulation** - use for large effective batch sizes on limited memory\n9. **Learning\
        \ rate warmup** - typically 5-10% of total training steps\n10. **Hub integration** - push trained models to Hub for\
        \ sharing and versioning\n\n## Resources\n\n### scripts/\nExecutable Python scripts demonstrating common Transformers\
        \ workflows:\n\n- `quick_inference.py` - Pipeline examples for NLP, vision, audio, and multimodal tasks\n- `fine_tune_classifier.py`\
        \ - Complete fine-tuning workflow with Trainer API\n- `generate_text.py` - Text generation with various decoding strategies\n\
        \nRun scripts directly to see examples in action:\n```bash\npython scripts/quick_inference.py\npython scripts/fine_tune_classifier.py\n\
        python scripts/generate_text.py\n```\n\n### references/\nComprehensive reference documentation loaded into context\
        \ as needed:\n\n- `api_reference.md` - Core classes and APIs (Auto classes, Trainer, GenerationConfig, etc.)\n- `pipelines.md`\
        \ - All available pipelines organized by modality with examples\n- `training.md` - Training patterns, TrainingArguments,\
        \ distributed training, callbacks\n- `generation_strategies.md` - Text generation methods, decoding strategies, parameters\n\
        - `task_patterns.md` - Complete workflows for common tasks (classification, NER, QA, summarization, etc.)\n\nWhen\
        \ working on specific tasks or features, load the relevant reference file for detailed guidance.\n\n## Additional\
        \ Information\n\n- **Official Documentation**: https://huggingface.co/docs/transformers/index\n- **Model Hub**: https://huggingface.co/models\
        \ (1M+ pre-trained models)\n- **Datasets Hub**: https://huggingface.co/datasets\n- **Installation**: `pip install\
        \ transformers datasets evaluate accelerate`\n- **GPU Support**: Requires PyTorch or TensorFlow with CUDA\n- **Framework\
        \ Support**: PyTorch (primary), TensorFlow, JAX/Flax"
