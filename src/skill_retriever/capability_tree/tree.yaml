  skills:
  - id: browser-automation
    name: browser-automation
    description: Non-testing browser automation - web scraping, form filling, screenshot capture, PDF generation, workflow
      automation. For TESTING with Playwright, use e2e-playwright skill instead. Activates for web scraping, form automation,
      screenshot, PDF, headless browser, Puppeteer, Selenium, automation scripts, data extraction.
    skill_path: data/skill_seeds/browser-automation/SKILL.md
    content: "# Browser Automation Skill\n\nExpert in browser automation using Playwright, Puppeteer, and Selenium. Specializes\
      \ in UI testing, web scraping, form automation, and automated workflows.\n\n## Expertise Areas\n\n### 1. Playwright\
      \ Automation\n- **Browser Control**: Launch, navigate, interact with pages\n- **Element Selection**: CSS selectors,\
      \ XPath, text-based, data-testid\n- **Actions**: Click, fill, select, hover, drag-and-drop\n- **Waiting Strategies**:\
      \ waitForSelector, waitForNavigation, waitForTimeout\n- **Network Interception**: Mock APIs, block resources, modify\
      \ requests\n- **Screenshots & Videos**: Full page, element-specific, video recording\n\n### 2. Testing Frameworks\n\
      - **End-to-End Testing**: Playwright Test, Cypress-like workflows\n- **Visual Regression**: Screenshot comparison, pixel\
      \ diff analysis\n- **Accessibility Testing**: ARIA validation, keyboard navigation\n- **Performance Testing**: Page\
      \ load times, Core Web Vitals\n- **Mobile Testing**: Emulate devices, touch gestures\n\n### 3. Web Scraping\n- **Data\
      \ Extraction**: Parse HTML, extract structured data\n- **Pagination**: Navigate through multi-page results\n- **Dynamic\
      \ Content**: Handle lazy loading, infinite scroll\n- **Authentication**: Login flows, session management\n- **Rate Limiting**:\
      \ Throttle requests, respect robots.txt\n\n### 4. Form Automation\n- **Input Fields**: Text, email, password, number\
      \ inputs\n- **Selections**: Dropdowns, radio buttons, checkboxes\n- **File Uploads**: Single and multiple file uploads\n\
      - **Date Pickers**: Custom date widgets\n- **Multi-Step Forms**: Wizard-style form flows\n\n## Code Examples\n\n###\
      \ Basic Page Navigation\n```typescript\nimport { chromium } from 'playwright';\n\nconst browser = await chromium.launch({\
      \ headless: true });\nconst page = await browser.newPage();\nawait page.goto('https://example.com', { waitUntil: 'networkidle'\
      \ });\nawait page.screenshot({ path: 'screenshot.png', fullPage: true });\nawait browser.close();\n```\n\n### Form Automation\
      \ with Validation\n```typescript\n// Fill and submit form\nawait page.fill('input[name=\"email\"]', 'test@example.com');\n\
      await page.fill('input[name=\"password\"]', 'SecurePass123!');\nawait page.click('button[type=\"submit\"]');\n\n// Wait\
      \ for success message\nconst success = await page.waitForSelector('.success-message', { timeout: 5000 });\nconst message\
      \ = await success.textContent();\nconsole.log('Success:', message);\n```\n\n### Data Extraction from Multiple Pages\n\
      ```typescript\nconst products = [];\nlet page = 1;\n\nwhile (page <= 10) {\n  await browser.goto(`https://example.com/products?page=${page}`);\n\
      \n  const items = await browser.$$eval('.product-item', (elements) =>\n    elements.map((el) => ({\n      title: el.querySelector('.title')?.textContent,\n\
      \      price: el.querySelector('.price')?.textContent,\n      image: el.querySelector('img')?.src,\n    }))\n  );\n\n\
      \  products.push(...items);\n  page++;\n}\n```\n\n### Network Interception\n```typescript\nawait page.route('**/api/analytics',\
      \ (route) => route.abort());\nawait page.route('**/api/user', (route) =>\n  route.fulfill({\n    status: 200,\n    body:\
      \ JSON.stringify({ id: 1, name: 'Test User' }),\n  })\n);\n```\n\n### Visual Regression Testing\n```typescript\nimport\
      \ { expect } from '@playwright/test';\n\n// Capture baseline\nawait page.screenshot({ path: 'baseline.png' });\n\n//\
      \ After changes, compare\nconst screenshot = await page.screenshot();\nexpect(screenshot).toMatchSnapshot('homepage.png');\n\
      ```\n\n## Selector Strategies\n\n### 1. CSS Selectors (Preferred)\n```typescript\n// ID selector (most reliable)\nawait\
      \ page.click('#submit-button');\n\n// Data attribute (best practice)\nawait page.click('[data-testid=\"login-button\"\
      ]');\n\n// Class selector\nawait page.click('.btn-primary');\n\n// Combined selector\nawait page.click('button.submit[type=\"\
      submit\"]');\n```\n\n### 2. XPath (When CSS isn't enough)\n```typescript\n// Text-based selection\nawait page.click('//button[contains(text(),\
      \ \"Submit\")]');\n\n// Complex hierarchy\nawait page.click('//div[@class=\"form\"]//input[@name=\"email\"]');\n```\n\
      \n### 3. Playwright-Specific\n```typescript\n// Text-based\nawait page.getByText('Submit').click();\n\n// Role-based\
      \ (accessibility)\nawait page.getByRole('button', { name: 'Submit' }).click();\n\n// Label-based\nawait page.getByLabel('Email\
      \ address').fill('test@example.com');\n\n// Placeholder-based\nawait page.getByPlaceholder('Enter your email').fill('test@example.com');\n\
      ```\n\n## Best Practices\n\n### 1. Use Stable Selectors\n❌ **Bad**: `.css-4j6h2k-button` (auto-generated class)\n✅ **Good**:\
      \ `[data-testid=\"submit-button\"]`\n\n### 2. Add Explicit Waits\n❌ **Bad**: `await page.waitForTimeout(3000);`\n✅ **Good**:\
      \ `await page.waitForSelector('.results', { state: 'visible' });`\n\n### 3. Handle Errors Gracefully\n```typescript\n\
      try {\n  await page.click('button', { timeout: 5000 });\n} catch (error) {\n  await page.screenshot({ path: 'error.png'\
      \ });\n  console.error('Click failed:', error.message);\n  throw error;\n}\n```\n\n### 4. Clean Up Resources\n```typescript\n\
      try {\n  // automation code\n} finally {\n  await browser.close();\n}\n```\n\n### 5. Use Page Object Model (POM)\n```typescript\n\
      class LoginPage {\n  constructor(private page: Page) {}\n\n  async login(email: string, password: string) {\n    await\
      \ this.page.fill('[data-testid=\"email\"]', email);\n    await this.page.fill('[data-testid=\"password\"]', password);\n\
      \    await this.page.click('[data-testid=\"submit\"]');\n  }\n\n  async isLoggedIn() {\n    return this.page.locator('[data-testid=\"\
      dashboard\"]').isVisible();\n  }\n}\n```\n\n## Common Pitfalls\n\n### 1. Race Conditions\n```typescript\n// ❌ Race condition\n\
      await page.click('button');\nconst text = await page.textContent('.result'); // May fail!\n\n// ✅ Wait for element\n\
      await page.click('button');\nawait page.waitForSelector('.result');\nconst text = await page.textContent('.result');\n\
      ```\n\n### 2. Stale Element References\n```typescript\n// ❌ Element may become stale\nconst element = await page.$('button');\n\
      await page.reload();\nawait element.click(); // Error: element detached from DOM\n\n// ✅ Re-query after page changes\n\
      await page.reload();\nawait page.click('button');\n```\n\n### 3. Timing Issues with Dynamic Content\n```typescript\n\
      // ❌ Assumes immediate load\nawait page.goto('https://example.com');\nawait page.click('.dynamic-content'); // May fail!\n\
      \n// ✅ Wait for dynamic content\nawait page.goto('https://example.com');\nawait page.waitForLoadState('networkidle');\n\
      await page.click('.dynamic-content');\n```\n\n## Debugging Tools\n\n### 1. Headful Mode\n```typescript\nconst browser\
      \ = await chromium.launch({ headless: false, slowMo: 100 });\n```\n\n### 2. Screenshot on Failure\n```typescript\ntest.afterEach(async\
      \ ({ page }, testInfo) => {\n  if (testInfo.status !== 'passed') {\n    await page.screenshot({ path: `failure-${testInfo.title}.png`\
      \ });\n  }\n});\n```\n\n### 3. Trace Recording\n```typescript\nawait context.tracing.start({ screenshots: true, snapshots:\
      \ true });\nawait page.goto('https://example.com');\n// ... automation steps\nawait context.tracing.stop({ path: 'trace.zip'\
      \ });\n```\n\n### 4. Console Logs\n```typescript\npage.on('console', (msg) => console.log('Browser log:', msg.text()));\n\
      ```\n\n## Performance Optimization\n\n### 1. Block Unnecessary Resources\n```typescript\nawait page.route('**/*.{png,jpg,jpeg,gif,svg,css}',\
      \ (route) => route.abort());\n```\n\n### 2. Reuse Browser Contexts\n```typescript\nconst context = await browser.newContext();\n\
      const page1 = await context.newPage();\nconst page2 = await context.newPage();\n// Share cookies, storage, etc.\n```\n\
      \n### 3. Parallel Execution\n```typescript\nawait Promise.all([\n  page1.goto('https://example.com/page1'),\n  page2.goto('https://example.com/page2'),\n\
      \  page3.goto('https://example.com/page3'),\n]);\n```\n\n## Activation Keywords\n\nAsk me about:\n- \"How do I automate\
      \ browser testing with Playwright?\"\n- \"Web scraping with Playwright/Puppeteer\"\n- \"Screenshot automation and visual\
      \ regression\"\n- \"Form filling automation\"\n- \"Element selection strategies\"\n- \"Handling dynamic content in web\
      \ automation\"\n- \"Best practices for UI testing\"\n- \"Debugging Playwright tests\"\n\n## Related Skills\n\n- **E2E\
      \ Testing**: `e2e-playwright` skill\n- **Frontend Development**: `frontend` skill for understanding DOM structure\n\
      - **API Testing**: `api-testing` skill for mocking network requests\n\n## Tools & Frameworks\n\n- **Playwright**: Modern\
      \ browser automation (recommended)\n- **Puppeteer**: Chrome/Chromium-specific automation\n- **Selenium**: Legacy cross-browser\
      \ automation\n- **Playwright Test**: Full testing framework\n- **Cypress**: Alternative E2E testing framework"
