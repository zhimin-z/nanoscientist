    content: "# Firecrawl Web Scraper Skill\n\n**Status**: Production Ready ✅\n**Last Updated**: 2025-10-24\n**Official Docs**:\
      \ https://docs.firecrawl.dev\n**API Version**: v2\n\n---\n\n## What is Firecrawl?\n\nFirecrawl is a **Web Data API for\
      \ AI** that turns entire websites into LLM-ready markdown or structured data. It handles:\n\n- **JavaScript rendering**\
      \ - Executes client-side JavaScript to capture dynamic content\n- **Anti-bot bypass** - Gets past CAPTCHA and bot detection\
      \ systems\n- **Format conversion** - Outputs as markdown, JSON, or structured data\n- **Screenshot capture** - Saves\
      \ visual representations of pages\n- **Browser automation** - Full headless browser capabilities\n\n---\n\n## API Endpoints\n\
      \n### 1. `/v2/scrape` - Single Page Scraping\nScrapes a single webpage and returns clean, structured content.\n\n**Use\
      \ Cases**:\n- Extract article content\n- Get product details\n- Scrape specific pages\n- Convert HTML to markdown\n\n\
      **Key Options**:\n- `formats`: [\"markdown\", \"html\", \"screenshot\"]\n- `onlyMainContent`: true/false (removes nav,\
      \ footer, ads)\n- `waitFor`: milliseconds to wait before scraping\n- `actions`: browser automation actions (click, scroll,\
      \ etc.)\n\n### 2. `/v2/crawl` - Full Site Crawling\nCrawls all accessible pages from a starting URL.\n\n**Use Cases**:\n\
      - Index entire documentation sites\n- Archive website content\n- Build knowledge bases\n- Scrape multi-page content\n\
      \n**Key Options**:\n- `limit`: max pages to crawl\n- `maxDepth`: how many links deep to follow\n- `allowedDomains`:\
      \ restrict to specific domains\n- `excludePaths`: skip certain URL patterns\n\n### 3. `/v2/map` - URL Discovery\nMaps\
      \ all URLs on a website without scraping content.\n\n**Use Cases**:\n- Find sitemap\n- Discover all pages\n- Plan crawling\
      \ strategy\n- Audit website structure\n\n### 4. `/v2/extract` - Structured Data Extraction\nUses AI to extract specific\
      \ data fields from pages.\n\n**Use Cases**:\n- Extract product prices and names\n- Parse contact information\n- Build\
      \ structured datasets\n- Custom data schemas\n\n**Key Options**:\n- `schema`: Zod or JSON schema defining desired structure\n\
      - `systemPrompt`: guide AI extraction behavior\n\n---\n\n## Authentication\n\nFirecrawl requires an API key for all\
      \ requests.\n\n### Get API Key\n1. Sign up at https://www.firecrawl.dev\n2. Go to dashboard → API Keys\n3. Copy your\
      \ API key (starts with `fc-`)\n\n### Store Securely\n**NEVER hardcode API keys in code!**\n\n```bash\n# .env file\n\
      FIRECRAWL_API_KEY=fc-your-api-key-here\n```\n\n```bash\n# .env.local (for local development)\nFIRECRAWL_API_KEY=fc-your-api-key-here\n\
      ```\n\n---\n\n## Python SDK Usage\n\n### Installation\n\n```bash\npip install firecrawl-py\n```\n\n**Latest Version**:\
      \ `firecrawl-py v4.5.0+`\n\n### Basic Scrape\n\n```python\nimport os\nfrom firecrawl import FirecrawlApp\n\n# Initialize\
      \ client\napp = FirecrawlApp(api_key=os.environ.get(\"FIRECRAWL_API_KEY\"))\n\n# Scrape a single page\nresult = app.scrape_url(\n\
      \    url=\"https://example.com/article\",\n    params={\n        \"formats\": [\"markdown\", \"html\"],\n        \"\
      onlyMainContent\": True\n    }\n)\n\n# Access markdown content\nmarkdown = result.get(\"markdown\")\nprint(markdown)\n\
      ```\n\n### Crawl Multiple Pages\n\n```python\nimport os\nfrom firecrawl import FirecrawlApp\n\napp = FirecrawlApp(api_key=os.environ.get(\"\
      FIRECRAWL_API_KEY\"))\n\n# Start crawl\ncrawl_result = app.crawl_url(\n    url=\"https://docs.example.com\",\n    params={\n\
      \        \"limit\": 100,\n        \"scrapeOptions\": {\n            \"formats\": [\"markdown\"]\n        }\n    },\n\
      \    poll_interval=5  # Check status every 5 seconds\n)\n\n# Process results\nfor page in crawl_result.get(\"data\"\
      , []):\n    url = page.get(\"url\")\n    markdown = page.get(\"markdown\")\n    print(f\"Scraped: {url}\")\n```\n\n\
      ### Extract Structured Data\n\n```python\nimport os\nfrom firecrawl import FirecrawlApp\n\napp = FirecrawlApp(api_key=os.environ.get(\"\
      FIRECRAWL_API_KEY\"))\n\n# Define schema\nschema = {\n    \"type\": \"object\",\n    \"properties\": {\n        \"company_name\"\
      : {\"type\": \"string\"},\n        \"product_price\": {\"type\": \"number\"},\n        \"availability\": {\"type\":\
      \ \"string\"}\n    },\n    \"required\": [\"company_name\", \"product_price\"]\n}\n\n# Extract data\nresult = app.extract(\n\
      \    urls=[\"https://example.com/product\"],\n    params={\n        \"schema\": schema,\n        \"systemPrompt\": \"\
      Extract product information from the page\"\n    }\n)\n\nprint(result)\n```\n\n---\n\n## TypeScript/Node.js SDK Usage\n\
      \n### Installation\n\n```bash\nnpm install @mendable/firecrawl-js\n# or\npnpm add @mendable/firecrawl-js\n# or use the\
      \ unscoped package:\nnpm install firecrawl\n```\n\n**Latest Version**: `@mendable/firecrawl-js v4.4.1+` (or `firecrawl\
      \ v4.4.1+`)\n\n### Basic Scrape\n\n```typescript\nimport FirecrawlApp from '@mendable/firecrawl-js';\n\n// Initialize\
      \ client\nconst app = new FirecrawlApp({\n  apiKey: process.env.FIRECRAWL_API_KEY\n});\n\n// Scrape a single page\n\
      const result = await app.scrapeUrl('https://example.com/article', {\n  formats: ['markdown', 'html'],\n  onlyMainContent:\
      \ true\n});\n\n// Access markdown content\nconst markdown = result.markdown;\nconsole.log(markdown);\n```\n\n### Crawl\
      \ Multiple Pages\n\n```typescript\nimport FirecrawlApp from '@mendable/firecrawl-js';\n\nconst app = new FirecrawlApp({\n\
      \  apiKey: process.env.FIRECRAWL_API_KEY\n});\n\n// Start crawl\nconst crawlResult = await app.crawlUrl('https://docs.example.com',\
      \ {\n  limit: 100,\n  scrapeOptions: {\n    formats: ['markdown']\n  }\n});\n\n// Process results\nfor (const page of\
      \ crawlResult.data) {\n  console.log(`Scraped: ${page.url}`);\n  console.log(page.markdown);\n}\n```\n\n### Extract\
      \ Structured Data with Zod\n\n```typescript\nimport FirecrawlApp from '@mendable/firecrawl-js';\nimport { z } from 'zod';\n\
      \nconst app = new FirecrawlApp({\n  apiKey: process.env.FIRECRAWL_API_KEY\n});\n\n// Define schema with Zod\nconst schema\
      \ = z.object({\n  company_name: z.string(),\n  product_price: z.number(),\n  availability: z.string()\n});\n\n// Extract\
      \ data\nconst result = await app.extract({\n  urls: ['https://example.com/product'],\n  schema: schema,\n  systemPrompt:\
      \ 'Extract product information from the page'\n});\n\nconsole.log(result);\n```\n\n---\n\n## Common Use Cases\n\n###\
      \ 1. Documentation Scraping\n\n**Scenario**: Convert entire documentation site to markdown for RAG/chatbot\n\n```python\n\
      app = FirecrawlApp(api_key=os.environ.get(\"FIRECRAWL_API_KEY\"))\n\ndocs = app.crawl_url(\n    url=\"https://docs.myapi.com\"\
      ,\n    params={\n        \"limit\": 500,\n        \"scrapeOptions\": {\n            \"formats\": [\"markdown\"],\n \
      \           \"onlyMainContent\": True\n        },\n        \"allowedDomains\": [\"docs.myapi.com\"]\n    }\n)\n\n# Save\
      \ to files\nfor page in docs.get(\"data\", []):\n    filename = page[\"url\"].replace(\"https://\", \"\").replace(\"\
      /\", \"_\") + \".md\"\n    with open(f\"docs/{filename}\", \"w\") as f:\n        f.write(page[\"markdown\"])\n```\n\n\
      ### 2. Product Data Extraction\n\n**Scenario**: Extract structured product data for e-commerce\n\n```typescript\nconst\
      \ schema = z.object({\n  title: z.string(),\n  price: z.number(),\n  description: z.string(),\n  images: z.array(z.string()),\n\
      \  in_stock: z.boolean()\n});\n\nconst products = await app.extract({\n  urls: productUrls,\n  schema: schema,\n  systemPrompt:\
      \ 'Extract all product details including price and availability'\n});\n```\n\n### 3. News Article Scraping\n\n**Scenario**:\
      \ Extract clean article content without ads/navigation\n\n```python\narticle = app.scrape_url(\n    url=\"https://news.com/article\"\
      ,\n    params={\n        \"formats\": [\"markdown\"],\n        \"onlyMainContent\": True,\n        \"removeBase64Images\"\
      : True\n    }\n)\n\n# Get clean markdown\ncontent = article.get(\"markdown\")\n```\n\n---\n\n## Error Handling\n\n###\
      \ Python\n\n```python\nfrom firecrawl import FirecrawlApp\nfrom firecrawl.exceptions import FirecrawlException\n\napp\
      \ = FirecrawlApp(api_key=os.environ.get(\"FIRECRAWL_API_KEY\"))\n\ntry:\n    result = app.scrape_url(\"https://example.com\"\
      )\nexcept FirecrawlException as e:\n    print(f\"Firecrawl error: {e}\")\nexcept Exception as e:\n    print(f\"Unexpected\
      \ error: {e}\")\n```\n\n### TypeScript\n\n```typescript\nimport FirecrawlApp from '@mendable/firecrawl-js';\n\nconst\
      \ app = new FirecrawlApp({\n  apiKey: process.env.FIRECRAWL_API_KEY\n});\n\ntry {\n  const result = await app.scrapeUrl('https://example.com');\n\
      } catch (error) {\n  if (error.response) {\n    // API error\n    console.error('API Error:', error.response.data);\n\
      \  } else {\n    // Network or other error\n    console.error('Error:', error.message);\n  }\n}\n```\n\n---\n\n## Rate\
      \ Limits & Best Practices\n\n### Rate Limits\n- **Free tier**: 500 credits/month\n- **Paid tiers**: Higher limits based\
      \ on plan\n- Credits consumed vary by endpoint and options\n\n### Best Practices\n\n1. **Use `onlyMainContent: true`**\
      \ to reduce credits and get cleaner data\n2. **Set reasonable limits** on crawls to avoid excessive costs\n3. **Handle\
      \ retries** with exponential backoff for transient errors\n4. **Cache results** locally to avoid re-scraping same content\n\
      5. **Use `map` endpoint first** to plan crawling strategy\n6. **Batch extract calls** when processing multiple URLs\n\
      7. **Monitor credit usage** in dashboard\n\n---\n\n## Cloudflare Workers Integration\n\n### ⚠️ Important: SDK Compatibility\n\
      \n**The Firecrawl SDK cannot run in Cloudflare Workers** due to Node.js dependencies (specifically `axios` which uses\
      \ Node.js `http` module). Workers require Web Standard APIs.\n\n**✅ Use the direct REST API with `fetch` instead** (see\
      \ example below).\n\n**Alternative**: Self-host with [workers-firecrawl](https://github.com/G4brym/workers-firecrawl)\
      \ - a Workers-native implementation (requires Workers Paid Plan, only implements `/search` endpoint).\n\n---\n\n###\
      \ Workers Example: Direct REST API\n\nThis example uses the `fetch` API to call Firecrawl directly - works perfectly\
      \ in Cloudflare Workers:\n\n```typescript\ninterface Env {\n  FIRECRAWL_API_KEY: string;\n  SCRAPED_CACHE?: KVNamespace;\
      \ // Optional: for caching results\n}\n\ninterface FirecrawlScrapeResponse {\n  success: boolean;\n  data: {\n    markdown?:\
      \ string;\n    html?: string;\n    metadata: {\n      title?: string;\n      description?: string;\n      language?:\
      \ string;\n      sourceURL: string;\n    };\n  };\n}\n\nexport default {\n  async fetch(request: Request, env: Env):\
      \ Promise<Response> {\n    if (request.method !== 'POST') {\n      return Response.json({ error: 'Method not allowed'\
      \ }, { status: 405 });\n    }\n\n    try {\n      const { url } = await request.json<{ url: string }>();\n\n      if\
      \ (!url) {\n        return Response.json({ error: 'URL is required' }, { status: 400 });\n      }\n\n      // Check\
      \ cache (optional)\n      if (env.SCRAPED_CACHE) {\n        const cached = await env.SCRAPED_CACHE.get(url, 'json');\n\
      \        if (cached) {\n          return Response.json({ cached: true, data: cached });\n        }\n      }\n\n    \
      \  // Call Firecrawl API directly using fetch\n      const response = await fetch('https://api.firecrawl.dev/v2/scrape',\
      \ {\n        method: 'POST',\n        headers: {\n          'Authorization': `Bearer ${env.FIRECRAWL_API_KEY}`,\n  \
      \        'Content-Type': 'application/json',\n        },\n        body: JSON.stringify({\n          url: url,\n    \
      \      formats: ['markdown'],\n          onlyMainContent: true,\n          removeBase64Images: true\n        })\n  \
      \    });\n\n      if (!response.ok) {\n        const errorText = await response.text();\n        throw new Error(`Firecrawl\
      \ API error (${response.status}): ${errorText}`);\n      }\n\n      const result = await response.json<FirecrawlScrapeResponse>();\n\
      \n      // Cache for 1 hour (optional)\n      if (env.SCRAPED_CACHE && result.success) {\n        await env.SCRAPED_CACHE.put(\n\
      \          url,\n          JSON.stringify(result.data),\n          { expirationTtl: 3600 }\n        );\n      }\n\n\
      \      return Response.json({\n        cached: false,\n        data: result.data\n      });\n\n    } catch (error) {\n\
      \      console.error('Scraping error:', error);\n      return Response.json(\n        { error: error instanceof Error\
      \ ? error.message : 'Unknown error' },\n        { status: 500 }\n      );\n    }\n  }\n};\n```\n\n**Environment Setup**:\
      \ Add `FIRECRAWL_API_KEY` in Wrangler secrets:\n\n```bash\nnpx wrangler secret put FIRECRAWL_API_KEY\n```\n\n**Optional\
      \ KV Binding** (for caching - add to `wrangler.jsonc`):\n\n```jsonc\n{\n  \"kv_namespaces\": [\n    {\n      \"binding\"\
      : \"SCRAPED_CACHE\",\n      \"id\": \"your-kv-namespace-id\"\n    }\n  ]\n}\n```\n\nSee `templates/firecrawl-worker-fetch.ts`\
      \ for a complete production-ready example.\n\n---\n\n## When to Use This Skill\n\n✅ **Use Firecrawl when:**\n- Scraping\
      \ modern websites with JavaScript\n- Need clean markdown output for LLMs\n- Building RAG systems from web content\n\
      - Extracting structured data at scale\n- Dealing with bot protection\n- Need reliable, production-ready scraping\n\n\
      ❌ **Don't use Firecrawl when:**\n- Scraping simple static HTML (use cheerio/beautifulsoup)\n- Have existing Puppeteer/Playwright\
      \ setup working well\n- Working with APIs (use direct API calls instead)\n- Budget constraints (free tier has limits)\n\
      \n---\n\n## Common Issues & Solutions\n\n### Issue: \"Invalid API Key\"\n**Cause**: API key not set or incorrect\n**Fix**:\n\
      ```bash\n# Check env variable is set\necho $FIRECRAWL_API_KEY\n\n# Verify key format (should start with fc-)\n```\n\n\
      ### Issue: \"Rate limit exceeded\"\n**Cause**: Exceeded monthly credits\n**Fix**:\n- Check usage in dashboard\n- Upgrade\
      \ plan or wait for reset\n- Use `onlyMainContent: true` to reduce credits\n\n### Issue: \"Timeout error\"\n**Cause**:\
      \ Page takes too long to load\n**Fix**:\n```python\nresult = app.scrape_url(url, params={\"waitFor\": 10000})  # Wait\
      \ 10s\n```\n\n### Issue: \"Content is empty\"\n**Cause**: Content loaded via JavaScript after initial render\n**Fix**:\n\
      ```python\nresult = app.scrape_url(url, params={\n    \"waitFor\": 5000,\n    \"actions\": [{\"type\": \"wait\", \"\
      milliseconds\": 3000}]\n})\n```\n\n---\n\n## Advanced Features\n\n### Browser Actions\n\nPerform interactions before\
      \ scraping:\n\n```python\nresult = app.scrape_url(\n    url=\"https://example.com\",\n    params={\n        \"actions\"\
      : [\n            {\"type\": \"click\", \"selector\": \"button.load-more\"},\n            {\"type\": \"wait\", \"milliseconds\"\
      : 2000},\n            {\"type\": \"scroll\", \"direction\": \"down\"}\n        ]\n    }\n)\n```\n\n### Custom Headers\n\
      \n```python\nresult = app.scrape_url(\n    url=\"https://example.com\",\n    params={\n        \"headers\": {\n    \
      \        \"User-Agent\": \"Custom Bot 1.0\",\n            \"Accept-Language\": \"en-US\"\n        }\n    }\n)\n```\n\
      \n### Webhooks for Long Crawls\n\nInstead of polling, receive results via webhook:\n\n```python\ncrawl = app.crawl_url(\n\
      \    url=\"https://docs.example.com\",\n    params={\n        \"limit\": 1000,\n        \"webhook\": \"https://your-domain.com/webhook\"\
      \n    }\n)\n```\n\n---\n\n## Package Versions\n\n| Package | Version | Last Checked |\n|---------|---------|--------------|\n\
      | firecrawl-py | 4.5.0+ | 2025-10-20 |\n| @mendable/firecrawl-js (or firecrawl) | 4.4.1+ | 2025-10-24 |\n| API Version\
      \ | v2 | Current |\n\n**Note**: The Node.js SDK requires Node.js >=22.0.0 and cannot run in Cloudflare Workers. Use\
      \ direct REST API calls in Workers (see Cloudflare Workers Integration section).\n\n---\n\n## Official Documentation\n\
      \n- **Docs**: https://docs.firecrawl.dev\n- **Python SDK**: https://docs.firecrawl.dev/sdks/python\n- **Node.js SDK**:\
      \ https://docs.firecrawl.dev/sdks/node\n- **API Reference**: https://docs.firecrawl.dev/api-reference\n- **GitHub**:\
      \ https://github.com/mendableai/firecrawl\n- **Dashboard**: https://www.firecrawl.dev/app\n\n---\n\n## Next Steps After\
      \ Using This Skill\n\n1. **Store scraped data**: Use Cloudflare D1, R2, or KV to persist results\n2. **Build RAG system**:\
      \ Combine with Vectorize for semantic search\n3. **Add scheduling**: Use Cloudflare Queues for recurring scrapes\n4.\
      \ **Process content**: Use Workers AI to analyze scraped data\n\n---\n\n**Token Savings**: ~60% vs manual integration\n\
      **Error Prevention**: API authentication, rate limiting, format handling\n**Production Ready**: ✅"
