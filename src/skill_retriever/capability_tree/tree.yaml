      content: "# Beads - Persistent Task Memory for AI Agents\n\nGraph-based issue tracker that survives conversation compaction.\
        \ Provides persistent memory for multi-session work with complex dependencies.\n\n## Overview\n\n**bd (beads)** replaces\
        \ markdown task lists with a dependency-aware graph stored in git. Unlike TodoWrite (session-scoped), bd persists\
        \ across compactions and tracks complex dependencies.\n\n**Key Distinction**:\n- **bd**: Multi-session work, dependencies,\
        \ survives compaction, git-backed\n- **TodoWrite**: Single-session tasks, linear execution, conversation-scoped\n\n\
        **Core Capabilities**:\n- \U0001F4CA **Dependency Graphs**: Track what blocks what (blocks, parent-child, discovered-from,\
        \ related)\n- \U0001F4BE **Compaction Survival**: Tasks persist when conversation history is compacted\n- \U0001F419\
        \ **Git Integration**: Issues versioned in `.beads/issues.jsonl`, sync with `bd sync`\n- \U0001F50D **Smart Discovery**:\
        \ Auto-finds ready work (`bd ready`), blocked work (`bd blocked`)\n- \U0001F4DD **Audit Trails**: Complete history\
        \ of status changes, notes, and decisions\n- \U0001F3F7️ **Rich Metadata**: Priority (P0-P4), types (bug/feature/task/epic),\
        \ labels, assignees\n\n**When to Use bd vs TodoWrite**:\n- ❓ \"Will I need this context in 2 weeks?\" → **YES** =\
        \ bd\n- ❓ \"Could conversation history get compacted?\" → **YES** = bd\n- ❓ \"Does this have blockers/dependencies?\"\
        \ → **YES** = bd\n- ❓ \"Is this fuzzy/exploratory work?\" → **YES** = bd\n- ❓ \"Will this be done in this session?\"\
        \ → **YES** = TodoWrite\n- ❓ \"Is this just a task list for me right now?\" → **YES** = TodoWrite\n\n**Decision Rule**:\
        \ If resuming in 2 weeks would be hard without bd, use bd.\n\n## Prerequisites\n\n**Required**:\n- **bd CLI**: Version\
        \ 0.34.0 or later installed and in PATH\n- **Git Repository**: Current directory must be a git repo\n- **Initialization**:\
        \ `bd init` must be run once (humans do this, not agents)\n\n**Verify Installation**:\n```bash\nbd --version  # Should\
        \ return 0.34.0 or later\n```\n\n**First-Time Setup** (humans run once):\n```bash\ncd /path/to/your/repo\nbd init\
        \  # Creates .beads/ directory with database\n```\n\n**Optional**:\n- **BEADS_DIR** environment variable for alternate\
        \ database location\n- **Daemon** for background sync: `bd daemon --start`\n\n## Instructions\n\n### Session Start\
        \ Protocol\n\n**Every session, start here:**\n\n#### Step 1: Check for Ready Work\n\n```bash\nbd ready\n```\n\nShows\
        \ tasks with no open blockers, sorted by priority (P0 → P4).\n\n**What this shows**:\n- Task ID (e.g., `myproject-abc`)\n\
        - Title\n- Priority level\n- Issue type (bug, feature, task, epic)\n\n**Example output**:\n```\nclaude-code-plugins-abc\
        \ [P1] [task] open\n  Implement user authentication\n\nclaude-code-plugins-xyz [P0] [epic] in_progress\n  Refactor\
        \ database layer\n```\n\n#### Step 2: Pick Highest Priority Task\n\nChoose the highest priority (P0 > P1 > P2 > P3\
        \ > P4) task that's ready.\n\n#### Step 3: Get Full Context\n\n```bash\nbd show <task-id>\n```\n\nDisplays:\n- Full\
        \ task description\n- Dependency graph (what blocks this, what this blocks)\n- Audit trail (all status changes, notes)\n\
        - Metadata (created, updated, assignee, labels)\n\n#### Step 4: Start Working\n\n```bash\nbd update <task-id> --status\
        \ in_progress\n```\n\nMarks task as actively being worked on.\n\n#### Step 5: Add Notes as You Work\n\n```bash\nbd\
        \ update <task-id> --notes \"Completed: X. In progress: Y. Blocked by: Z\"\n```\n\n**Critical for compaction survival**:\
        \ Write notes as if explaining to a future agent with zero conversation context.\n\n**Note Format** (best practice):\n\
        ```\nCOMPLETED: Specific deliverables (e.g., \"implemented JWT refresh endpoint + rate limiting\")\nIN PROGRESS: Current\
        \ state + next immediate step\nBLOCKERS: What's preventing progress\nKEY DECISIONS: Important context or user guidance\n\
        ```\n\n---\n\n### Task Creation Workflow\n\n#### When to Create Tasks\n\nCreate bd tasks when:\n- User mentions tracking\
        \ work across sessions\n- User says \"we should fix/build/add X\"\n- Work has dependencies or blockers\n- Exploratory/research\
        \ work with fuzzy boundaries\n\n#### Basic Task Creation\n\n```bash\nbd create \"Task title\" -p 1 --type task\n```\n\
        \n**Arguments**:\n- **Title**: Brief description (required)\n- **Priority**: 0-4 where 0=critical, 1=high, 2=medium,\
        \ 3=low, 4=backlog (default: 2)\n- **Type**: bug, feature, task, epic, chore (default: task)\n\n**Example**:\n```bash\n\
        bd create \"Fix authentication bug\" -p 0 --type bug\n```\n\n#### Create with Description\n\n```bash\nbd create \"\
        Implement OAuth\" -p 1 --description \"Add OAuth2 support for Google, GitHub, Microsoft. Use passport.js library.\"\
        \n```\n\n#### Epic with Children\n\n```bash\n# Create parent epic\nbd create \"Epic: OAuth Implementation\" -p 0 --type\
        \ epic\n# Returns: myproject-abc\n\n# Create child tasks\nbd create \"Research OAuth providers\" -p 1 --parent myproject-abc\n\
        bd create \"Implement auth endpoints\" -p 1 --parent myproject-abc\nbd create \"Add frontend login UI\" -p 2 --parent\
        \ myproject-abc\n```\n\n---\n\n### Update & Progress Workflow\n\n#### Change Status\n\n```bash\nbd update <task-id>\
        \ --status <new-status>\n```\n\n**Status Values**:\n- `open` - Not started\n- `in_progress` - Actively working\n-\
        \ `blocked` - Stuck, waiting on something\n- `closed` - Completed\n\n**Example**:\n```bash\nbd update myproject-abc\
        \ --status blocked\n```\n\n#### Add Progress Notes\n\n```bash\nbd update <task-id> --notes \"Progress update here\"\
        \n```\n\n**Appends** to existing notes field (doesn't replace).\n\n#### Change Priority\n\n```bash\nbd update <task-id>\
        \ -p 0  # Escalate to critical\n```\n\n#### Add Labels\n\n```bash\nbd label add <task-id> backend\nbd label add <task-id>\
        \ security\n```\n\nLabels provide cross-cutting categorization beyond status/type.\n\n---\n\n### Dependency Management\n\
        \n#### Add Dependencies\n\n```bash\nbd dep add <child-id> <parent-id>\n```\n\n**Meaning**: `<parent-id>` blocks `<child-id>`\
        \ (parent must be completed first).\n\n**Dependency Types**:\n- **blocks**: Parent must close before child becomes\
        \ ready\n- **parent-child**: Hierarchical relationship (epics and subtasks)\n- **discovered-from**: Task A led to\
        \ discovering task B\n- **related**: Tasks are related but not blocking\n\n**Example**:\n```bash\n# Deployment blocked\
        \ by tests passing\nbd dep add deploy-task test-task  # test-task blocks deploy-task\n```\n\n#### View Dependencies\n\
        \n```bash\nbd dep list <task-id>\n```\n\nShows:\n- What this task blocks (dependents)\n- What blocks this task (blockers)\n\
        \n#### Circular Dependency Prevention\n\nbd automatically prevents circular dependencies. If you try to create a cycle,\
        \ the command fails.\n\n---\n\n### Completion Workflow\n\n#### Close a Task\n\n```bash\nbd close <task-id> --reason\
        \ \"Completion summary\"\n```\n\n**Best Practice**: Always include a reason describing what was accomplished.\n\n\
        **Example**:\n```bash\nbd close myproject-abc --reason \"Completed: OAuth endpoints implemented with Google, GitHub\
        \ providers. Tests passing.\"\n```\n\n#### Check Newly Unblocked Work\n\nAfter closing a task, run:\n\n```bash\nbd\
        \ ready\n```\n\nClosing a task may unblock dependent tasks, making them newly ready.\n\n#### Close Epics When Children\
        \ Complete\n\n```bash\nbd epic close-eligible\n```\n\nAutomatically closes epics where all child tasks are closed.\n\
        \n---\n\n### Git Sync Workflow\n\n#### All-in-One Sync\n\n```bash\nbd sync\n```\n\n**Performs**:\n1. Export database\
        \ to `.beads/issues.jsonl`\n2. Commit changes to git\n3. Pull from remote (merge if needed)\n4. Import updated JSONL\
        \ back to database\n5. Push local commits to remote\n\n**Use when**: End of session, before handing off to teammate,\
        \ after major progress.\n\n#### Export Only\n\n```bash\nbd export -o backup.jsonl\n```\n\nCreates JSONL backup without\
        \ git operations.\n\n#### Import Only\n\n```bash\nbd import -i backup.jsonl\n```\n\nImports JSONL file into database.\n\
        \n#### Background Daemon\n\n```bash\nbd daemon --start  # Auto-sync in background\nbd daemon --status # Check daemon\
        \ health\nbd daemon --stop   # Stop auto-sync\n```\n\nDaemon watches for database changes and auto-exports to JSONL.\n\
        \n---\n\n### Find & Search Commands\n\n#### Find Ready Work\n\n```bash\nbd ready\n```\n\nShows tasks with no open\
        \ blockers.\n\n#### List All Tasks\n\n```bash\nbd list --status open           # Only open tasks\nbd list --priority\
        \ 0            # Only P0 (critical)\nbd list --type bug              # Only bugs\nbd list --label backend        \
        \ # Only labeled \"backend\"\nbd list --assignee alice        # Only assigned to alice\n```\n\n#### Show Task Details\n\
        \n```bash\nbd show <task-id>\n```\n\nFull details: description, dependencies, audit trail, metadata.\n\n#### Search\
        \ by Text\n\n```bash\nbd search \"authentication\"      # Search titles and descriptions\nbd search login --status\
        \ open   # Combine with filters\n```\n\n#### Find Blocked Work\n\n```bash\nbd blocked\n```\n\nShows all tasks that\
        \ have open blockers preventing them from being worked on.\n\n#### Project Statistics\n\n```bash\nbd stats\n```\n\n\
        Shows:\n- Total issues by status (open, in_progress, blocked, closed)\n- Issues by priority (P0-P4)\n- Issues by type\
        \ (bug, feature, task, epic, chore)\n- Completion rate\n\n---\n\n### Complete Command Reference\n\n| Command | When\
        \ to Use | Example |\n|---------|-------------|---------|\n| **FIND COMMANDS** | | |\n| `bd ready` | Find unblocked\
        \ tasks | User asks \"what should I work on?\" |\n| `bd list` | View all tasks (with filters) | \"Show me all open\
        \ bugs\" |\n| `bd show <id>` | Get task details | \"Show me task bd-42\" |\n| `bd search <query>` | Text search across\
        \ tasks | \"Find tasks about auth\" |\n| `bd blocked` | Find stuck work | \"What's blocking us?\" |\n| `bd stats`\
        \ | Project metrics | \"How many tasks are open?\" |\n| **CREATE COMMANDS** | | |\n| `bd create` | Track new work\
        \ | \"Create a task for this bug\" |\n| `bd template create` | Use issue template | \"Create task from bug template\"\
        \ |\n| `bd init` | Initialize beads | \"Set up beads in this repo\" (humans only) |\n| **UPDATE COMMANDS** | | |\n\
        | `bd update <id>` | Change status/priority/notes | \"Mark as in progress\" |\n| `bd dep add` | Link dependencies\
        \ | \"This blocks that\" |\n| `bd label add` | Tag with labels | \"Label this as backend\" |\n| `bd comments add`\
        \ | Add comment | \"Add comment to task\" |\n| `bd reopen <id>` | Reopen closed task | \"Reopen bd-42, found regression\"\
        \ |\n| `bd rename-prefix` | Rename issue prefix | \"Change prefix from bd- to proj-\" |\n| `bd epic status` | Check\
        \ epic progress | \"Show epic completion %\" |\n| **COMPLETE COMMANDS** | | |\n| `bd close <id>` | Mark task done\
        \ | \"Close this task, it's done\" |\n| `bd epic close-eligible` | Auto-close complete epics | \"Close epics where\
        \ all children done\" |\n| **SYNC COMMANDS** | | |\n| `bd sync` | Git sync (all-in-one) | \"Sync tasks to git\" |\n\
        | `bd export` | Export to JSONL | \"Backup all tasks\" |\n| `bd import` | Import from JSONL | \"Restore from backup\"\
        \ |\n| `bd daemon` | Background sync manager | \"Start auto-sync daemon\" |\n| **CLEANUP COMMANDS** | | |\n| `bd delete\
        \ <id>` | Delete issues | \"Delete test task\" (requires --force) |\n| `bd compact` | Archive old closed tasks | \"\
        Compress database\" |\n| **REPORTING COMMANDS** | | |\n| `bd stats` | Project metrics | \"Show project health\" |\n\
        | `bd audit record` | Log interactions | \"Record this LLM call\" |\n| `bd workflow` | Show workflow guide | \"How\
        \ do I use beads?\" |\n| **ADVANCED COMMANDS** | | |\n| `bd prime` | Refresh AI context | \"Load bd workflow rules\"\
        \ |\n| `bd quickstart` | Interactive tutorial | \"Teach me beads basics\" |\n| `bd daemons` | Multi-repo daemon mgmt\
        \ | \"Manage all beads daemons\" |\n| `bd version` | Version check | \"Check bd version\" |\n| `bd restore <id>` |\
        \ Restore compacted issue | \"Get full history from git\" |\n\n---\n\n## Output\n\nThis skill produces:\n\n**Task\
        \ IDs**: Format `<prefix>-<hash>` (e.g., `claude-code-plugins-abc`, `myproject-xyz`)\n\n**Status Summaries**:\n```\n\
        5 open, 2 in_progress, 1 blocked, 47 closed\n```\n\n**Dependency Graphs** (visual tree):\n```\nmyproject-abc: Deploy\
        \ to production [P0] [blocked]\n  Blocked by:\n    ↳ myproject-def: Run integration tests [P1] [in_progress]\n   \
        \ ↳ myproject-ghi: Fix failing tests [P1] [open]\n```\n\n**Audit Trails** (complete history):\n```\n2025-12-22 10:00\
        \ - Created by alice (P2, task)\n2025-12-22 10:15 - Priority changed: P2 → P0\n2025-12-22 10:30 - Status changed:\
        \ open → in_progress\n2025-12-22 11:00 - Notes added: \"Implemented JWT auth...\"\n2025-12-22 14:00 - Status changed:\
        \ in_progress → blocked\n2025-12-22 14:01 - Notes added: \"Blocked: API endpoint returns 503\"\n```\n\n---\n\n## Error\
        \ Handling\n\n### Common Failures\n\n#### 1. `bd: command not found`\n**Cause**: bd CLI not installed or not in PATH\n\
        **Solution**: Install from https://github.com/steveyegge/beads\n```bash\n# macOS/Linux\ncurl -fsSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh\
        \ | bash\n\n# Or via npm\nnpm install -g @beads/bd\n\n# Or via Homebrew\nbrew install steveyegge/beads/bd\n```\n\n\
        #### 2. `No .beads database found`\n**Cause**: beads not initialized in this repository\n**Solution**: Run `bd init`\
        \ (humans do this once, not agents)\n```bash\nbd init  # Creates .beads/ directory\n```\n\n#### 3. `Task not found:\
        \ <id>`\n**Cause**: Invalid task ID or task doesn't exist\n**Solution**: Use `bd list` to see all tasks and verify\
        \ ID format\n```bash\nbd list                    # See all tasks\nbd search <partial-title>  # Find task by title\n\
        ```\n\n#### 4. `Circular dependency detected`\n**Cause**: Attempting to create a dependency cycle (A blocks B, B blocks\
        \ A)\n**Solution**: bd prevents circular dependencies automatically. Restructure dependency graph.\n```bash\nbd dep\
        \ list <id>  # View current dependencies\n```\n\n#### 5. Git merge conflicts in `.beads/issues.jsonl`\n**Cause**:\
        \ Multiple users modified same issue\n**Solution**: bd sync handles JSONL conflicts automatically. If manual intervention\
        \ needed:\n```bash\n# View conflict\ngit status\n\n# bd provides conflict resolution tools\nbd sync --merge  # Attempt\
        \ auto-resolution\n```\n\n#### 6. `Database is locked`\n**Cause**: Daemon or another process has exclusive lock\n\
        **Solution**: Restart daemon or wait for lock to release\n```bash\nbd daemon --stop\nbd daemon --start\n```\n\n####\
        \ 7. Sync failures\n**Cause**: Network issues, authentication failures, or git configuration\n**Solution**: Check\
        \ git remote access and credentials\n```bash\ngit fetch  # Test connectivity\ngit status # Verify repo state\n```\n\
        \n---\n\n## Examples\n\n### Example 1: Multi-Session Feature (Epic with Children)\n\n**User Request**: \"We need to\
        \ implement OAuth, this will take multiple sessions\"\n\n**Agent Response**:\n```bash\n# Create epic\nbd create \"\
        Epic: OAuth Implementation\" -p 0 --type epic\n# Returns: claude-code-plugins-abc\n\n# Create child tasks\nbd create\
        \ \"Research OAuth providers (Google, GitHub, Microsoft)\" -p 1 --parent claude-code-plugins-abc\n# Returns: claude-code-plugins-abc.1\n\
        \nbd create \"Implement backend auth endpoints\" -p 1 --parent claude-code-plugins-abc\n# Returns: claude-code-plugins-abc.2\n\
        \nbd create \"Add frontend login UI components\" -p 2 --parent claude-code-plugins-abc\n# Returns: claude-code-plugins-abc.3\n\
        \n# Add dependencies (backend must complete before frontend)\nbd dep add claude-code-plugins-abc.3 claude-code-plugins-abc.2\n\
        \n# Start with research\nbd update claude-code-plugins-abc.1 --status in_progress\n```\n\n**Result**: Work structured,\
        \ ready to resume after compaction.\n\n---\n\n### Example 2: Tracking Blocked Work\n\n**Scenario**: Agent discovers\
        \ API is down during implementation\n\n**Agent Actions**:\n```bash\n# Mark current task as blocked\nbd update claude-code-plugins-xyz\
        \ --status blocked --notes \"API endpoint /auth returns 503, reported to backend team\"\n\n# Create blocker task\n\
        bd create \"Fix /auth endpoint 503 error\" -p 0 --type bug\n# Returns: claude-code-plugins-blocker\n\n# Link dependency\
        \ (blocker blocks original task)\nbd dep add claude-code-plugins-xyz claude-code-plugins-blocker\n\n# Find other ready\
        \ work\nbd ready\n# Shows tasks that aren't blocked - agent can switch to those\n```\n\n**Result**: Blocked work documented,\
        \ agent productive on other tasks.\n\n---\n\n### Example 3: Session Resume After Compaction\n\n**Session 1**:\n```bash\n\
        bd create \"Implement user authentication\" -p 1\nbd update myproject-auth --status in_progress\nbd update myproject-auth\
        \ --notes \"COMPLETED: JWT library integrated. IN PROGRESS: Testing token refresh. NEXT: Rate limiting\"\n# [Conversation\
        \ compacted - history deleted]\n```\n\n**Session 2** (weeks later):\n```bash\nbd ready\n# Shows: myproject-auth [P1]\
        \ [task] in_progress\n\nbd show myproject-auth\n# Full context preserved:\n#   - Title: Implement user authentication\n\
        #   - Status: in_progress\n#   - Notes: \"COMPLETED: JWT library integrated. IN PROGRESS: Testing token refresh. NEXT:\
        \ Rate limiting\"\n#   - No conversation history needed!\n\n# Agent continues exactly where it left off\nbd update\
        \ myproject-auth --notes \"COMPLETED: Token refresh working. IN PROGRESS: Rate limiting implementation\"\n```\n\n\
        **Result**: Zero context loss despite compaction.\n\n---\n\n### Example 4: Complex Dependencies (3-Level Graph)\n\n\
        **Scenario**: Build feature with prerequisites\n\n```bash\n# Create tasks\nbd create \"Deploy to production\" -p 0\n\
        # Returns: deploy-prod\n\nbd create \"Run integration tests\" -p 1\n# Returns: integration-tests\n\nbd create \"Fix\
        \ failing unit tests\" -p 1\n# Returns: fix-tests\n\n# Create dependency chain\nbd dep add deploy-prod integration-tests\
        \      # Integration blocks deploy\nbd dep add integration-tests fix-tests        # Fixes block integration\n\n# Check\
        \ what's ready\nbd ready\n# Shows: fix-tests (no blockers)\n# Hides: integration-tests (blocked by fix-tests)\n# Hides:\
        \ deploy-prod (blocked by integration-tests)\n\n# Work on ready task\nbd update fix-tests --status in_progress\n#\
        \ ... fix tests ...\nbd close fix-tests --reason \"All unit tests passing\"\n\n# Check ready again\nbd ready\n# Shows:\
        \ integration-tests (now unblocked!)\n# Still hides: deploy-prod (still blocked)\n```\n\n**Result**: Dependency chain\
        \ enforces correct order automatically.\n\n---\n\n### Example 5: Team Collaboration (Git Sync)\n\n**Alice's Session**:\n\
        ```bash\nbd create \"Refactor database layer\" -p 1\nbd update db-refactor --status in_progress\nbd update db-refactor\
        \ --notes \"Started: Migrating to Prisma ORM\"\n\n# End of day - sync to git\nbd sync\n# Commits tasks to git, pushes\
        \ to remote\n```\n\n**Bob's Session** (next day):\n```bash\n# Start of day - sync from git\nbd sync\n# Pulls latest\
        \ tasks from remote\n\nbd ready\n# Shows: db-refactor [P1] [in_progress] (assigned to alice)\n\n# Bob checks status\n\
        bd show db-refactor\n# Sees Alice's notes: \"Started: Migrating to Prisma ORM\"\n\n# Bob works on different task (no\
        \ conflicts)\nbd create \"Add API rate limiting\" -p 2\nbd update rate-limit --status in_progress\n\n# End of day\n\
        bd sync\n# Both Alice's and Bob's tasks synchronized\n```\n\n**Result**: Distributed team coordination through git.\n\
        \n---\n\n## Resources\n\n### When to Use bd vs TodoWrite (Decision Tree)\n\n**Use bd when**:\n- ✅ Work spans multiple\
        \ sessions or days\n- ✅ Tasks have dependencies or blockers\n- ✅ Need to survive conversation compaction\n- ✅ Exploratory/research\
        \ work with fuzzy boundaries\n- ✅ Collaboration with team (git sync)\n\n**Use TodoWrite when**:\n- ✅ Single-session\
        \ linear tasks\n- ✅ Simple checklist for immediate work\n- ✅ All context is in current conversation\n- ✅ Will complete\
        \ within current session\n\n**Decision Rule**: If resuming in 2 weeks would be hard without bd, use bd.\n\n---\n\n\
        ### Essential Commands Quick Reference\n\nTop 10 most-used commands:\n\n| Command | Purpose |\n|---------|---------|\n\
        | `bd ready` | Show tasks ready to work on |\n| `bd create \"Title\" -p 1` | Create new task |\n| `bd show <id>` |\
        \ View task details |\n| `bd update <id> --status in_progress` | Start working |\n| `bd update <id> --notes \"Progress\"\
        ` | Add progress notes |\n| `bd close <id> --reason \"Done\"` | Complete task |\n| `bd dep add <child> <parent>` |\
        \ Add dependency |\n| `bd list` | See all tasks |\n| `bd search <query>` | Find tasks by keyword |\n| `bd sync` |\
        \ Sync with git remote |\n\n---\n\n### Session Start Protocol (Every Session)\n\n1. **Run** `bd ready` first\n2. **Pick**\
        \ highest priority ready task\n3. **Run** `bd show <id>` to get full context\n4. **Update** status to `in_progress`\n\
        5. **Add notes** as you work (critical for compaction survival)\n\n---\n\n### Database Selection\n\nbd uses `.beads/`\
        \ directory by default.\n\n**Alternate Database**:\n```bash\nexport BEADS_DIR=/path/to/alternate/beads\nbd ready \
        \ # Uses alternate database\n```\n\n**Multiple Databases**: Use `BEADS_DIR` to switch between projects.\n\n---\n\n\
        ### Advanced Features\n\nFor complex scenarios, see references:\n\n- **Compaction Strategies**: `{baseDir}/references/ADVANCED_WORKFLOWS.md`\n\
        \  - Tier 1/2/ultra compaction for old closed issues\n  - Semantic summarization to reduce database size\n\n- **Epic\
        \ Management**: `{baseDir}/references/ADVANCED_WORKFLOWS.md`\n  - Nested epics (epics containing epics)\n  - Bulk\
        \ operations on epic children\n\n- **Template System**: `{baseDir}/references/ADVANCED_WORKFLOWS.md`\n  - Custom issue\
        \ templates\n  - Template variables and defaults\n\n- **Git Integration**: `{baseDir}/references/GIT_INTEGRATION.md`\n\
        \  - Merge conflict resolution\n  - Daemon architecture\n  - Branching strategies\n\n- **Team Collaboration**: `{baseDir}/references/TEAM_COLLABORATION.md`\n\
        \  - Multi-user workflows\n  - Worktree support\n  - Prefix strategies\n\n---\n\n### Full Documentation\n\nComplete\
        \ reference: https://github.com/steveyegge/beads\n\nExisting detailed guides:\n- `{baseDir}/references/CLI_REFERENCE.md`\
        \ - Complete command syntax\n- `{baseDir}/references/WORKFLOWS.md` - Detailed workflow patterns\n- `{baseDir}/references/DEPENDENCIES.md`\
